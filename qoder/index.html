<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qoder SVG Playground</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #09111b;
        --bg-2: #15253a;
        --text: #edf5ff;
        --muted: #9cb0cf;
        --accent: #78e7ff;
        --accent-2: #7ee787;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 16% 18%, rgba(120, 231, 255, 0.2), transparent 24%),
          radial-gradient(circle at 80% 0%, rgba(126, 231, 135, 0.16), transparent 28%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
        color: var(--text);
      }

      .panel {
        width: min(920px, 100%);
        border: 1px solid rgba(120, 231, 255, 0.18);
        border-radius: 28px;
        padding: 28px;
        background: rgba(10, 15, 24, 0.84);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
      }

      .head {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.95;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(120, 231, 255, 0.22);
        background: rgba(120, 231, 255, 0.08);
      }

      svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .ring {
        transform-origin: center;
        animation: spin 16s linear infinite;
      }

      .ring.slow {
        animation-direction: reverse;
        animation-duration: 26s;
      }

      .core {
        animation: pulse 3.2s ease-in-out infinite;
      }

      .spark {
        animation: blink 2.8s ease-in-out infinite;
      }

      .spark.delay {
        animation-delay: 1.1s;
      }

      .caption {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 14px;
      }

      code {
        color: var(--accent);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.95);
          opacity: 0.86;
        }

        50% {
          transform: scale(1.03);
          opacity: 1;
        }
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 0.4;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="head">
        <div>
          <h1>Qoder<br />SVG Lab</h1>
          <p>占位页已经就绪。后续可以直接替换这个文件，做你要的 SVG 视觉测评页面。</p>
        </div>
        <div class="badge">qoder/index.html</div>
      </div>

      <svg viewBox="0 0 960 560" aria-label="Qoder SVG placeholder">
        <defs>
          <linearGradient id="qoder-sky" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#13223a" />
            <stop offset="55%" stop-color="#10263b" />
            <stop offset="100%" stop-color="#09121d" />
          </linearGradient>
          <radialGradient id="qoder-core" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b6f6ff" />
            <stop offset="40%" stop-color="#78e7ff" />
            <stop offset="100%" stop-color="#173453" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <rect width="960" height="560" rx="28" fill="url(#qoder-sky)" />
        <g opacity="0.6">
          <circle cx="160" cy="120" r="4" fill="#7ee787" class="spark" />
          <circle cx="240" cy="420" r="5" fill="#78e7ff" class="spark delay" />
          <circle cx="800" cy="160" r="6" fill="#7ee787" class="spark delay" />
          <circle cx="720" cy="440" r="4" fill="#78e7ff" class="spark" />
        </g>

        <g transform="translate(480 280)" filter="url(#glow)">
          <g class="ring">
            <circle r="156" fill="none" stroke="#78e7ff" stroke-width="2" stroke-dasharray="10 18" opacity="0.8" />
            <circle r="126" fill="none" stroke="#7ee787" stroke-width="2" stroke-dasharray="6 12" opacity="0.65" />
          </g>
          <g class="ring slow">
            <rect x="-188" y="-188" width="376" height="376" rx="64" fill="none" stroke="#b6f6ff" stroke-width="1.5" opacity="0.25" />
            <rect x="-220" y="-220" width="440" height="440" rx="86" fill="none" stroke="#7ee787" stroke-width="1.2" opacity="0.16" />
          </g>
          <g class="core">
            <circle r="88" fill="url(#qoder-core)" />
            <circle r="54" fill="#08121c" opacity="0.82" />
            <circle r="18" fill="#d9fbff" />
          </g>
        </g>

        <path
          d="M80 450 C190 402 298 486 408 438 S640 372 760 420 S870 482 910 444"
          fill="none"
          stroke="#7ee787"
          stroke-width="4"
          stroke-linecap="round"
          opacity="0.72"
        />
        <path
          d="M96 474 C236 516 348 408 488 446 S752 514 860 430"
          fill="none"
          stroke="#78e7ff"
          stroke-width="3"
          stroke-linecap="round"
          opacity="0.8"
        />
      </svg>

      <div class="caption">
        <span>建议后续直接保留单文件结构，方便统一加载页即时预览。</span>
        <span>当前文件：<code>qoder/index.html</code></span>
      </div>
    </section>
  </body>
</html>
