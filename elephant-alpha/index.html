<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elephant-Alpha 时钟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#eee;font-family:sans-serif}
.container{position:relative;width:300px;height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center}
@media (min-width:400px){.container{width:390px;height:450px}}
.bg-layer{position:absolute;width:100%;height:100%;border-radius:24px;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 50%,#1e3c72 100%);transition:background 1.5s;z-index:0}
.bg-layer.night{background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)}
.dial{position:relative;width:220px;height:220px;border-radius:50%;border:4px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;z-index:2;flex-shrink:0}
@media (min-width:400px){.dial{width:280px;height:280px}}
.hand{position:absolute;transform-origin:bottom center;border-radius:4px;z-index:3;transition:transform 0.1s cubic-bezier(0.4,0,0.2,1)}
.hour{width:6px;height:50px;background:#e2e8f0;bottom:50%;left:50%;transform:translateX(-50%)}
.min{width:4px;height:70px;background:#cbd5e1;bottom:50%;left:50%;transform:translateX(-50%)}
.sec{width:2px;height:80px;background:#ff6b6b;bottom:50%;left:50%;transform:translateX(-50%);box-shadow:0 0 8px #ff6b6b}
.center{width:14px;height:14px;background:#e2e8f0;border-radius:50%;z-index:4;flex-shrink:0}
.dial-bg{position:absolute;width:100%;height:100%;border-radius:50%;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:inset 0 0 30px rgba(255,255,255,0.05)}50%{box-shadow:inset 0 0 60px rgba(255,255,255,0.12)}}
.digital{color:#e2e8f0;font-size:2rem;font-weight:700;margin-top:16px;letter-spacing:4px;text-shadow:0 0 20px rgba(255,255,255,0.3);z-index:2;position:relative}
@media (min-width:400px){.digital{font-size:2.6rem;margin-top:20px}}
</style>
</head>
<body>
<div class="container">
  <div class="bg-layer" id="bg"></div>
  <div class="dial" id="dial">
    <div class="dial-bg"></div>
    <div class="hour hand" id="h"></div>
    <div class="min hand" id="m"></div>
    <div class="sec hand" id="s"></div>
    <div class="center"></div>
  </div>
  <div class="digital" id="dt"></div>
</div>
<script>
const bg=document.getElementById('bg'),h=document.getElementById('h'),m=document.getElementById('m'),s=document.getElementById('s'),dt=document.getElementById('dt');
function tick(){
  const now=new Date();const hh=now.getHours(),mm=now.getMinutes(),ss=now.getSeconds();
  const hdeg=(hh%12/12)*360+mm*0.5,mdeg=(mm/60)*360,sdeg=Math.floor(ss/60*360);
  h.style.transform=`translateX(-50%) rotate(${hdeg}deg)`;
  m.style.transform=`translateX(-50%) rotate(${mdeg}deg)`;
  s.style.transform=`translateX(-50%) rotate(${sdeg}deg)`;
  const hr=hh.toString().padStart(2,'0'),mi=mm.toString().padStart(2,'0'),se=ss.toString().padStart(2,'0');
  const isNight=hh<6||hh>=20;bg.className=isNight?'bg-layer night':'bg-layer';
  dt.textContent=hr+':'+mi+':'+se;
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
