<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;
  font-family:'Segoe UI',system-ui,sans-serif;transition:background 1.5s, color 1.5s}
body.day{background:linear-gradient(135deg,#e8f4f8,#f0e6d3);color:#2c3e50}
body.night{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#e0e0e0}
.container{text-align:center;padding:20px}
.analog{position:relative;width:min(75vw,280px);height:min(75vw,280px);margin:0 auto 24px}
.face{width:100%;height:100%;border-radius:50%;position:relative;
  border:3px solid currentColor;box-shadow:0 0 30px rgba(0,0,0,.15)}
body.night .face{border-color:rgba(255,255,255,.25);box-shadow:0 0 40px rgba(100,100,255,.2)}
.mark{position:absolute;width:2px;height:10px;background:currentColor;
  top:6px;left:50%;transform-origin:50% calc(min(37.5vw,140px) - 6px)}
.mark.major{height:16px;width:3px;top:4px;transform-origin:50% calc(min(37.5vw,140px) - 4px)}
.center-dot{position:absolute;width:10px;height:10px;border-radius:50%;
  background:#e74c3c;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10}
.hand{position:absolute;bottom:50%;left:50%;transform-origin:50% 100%;
  border-radius:4px;transition:none}
.hour{width:4px;height:28%;background:currentColor;z-index:5}
.minute{width:3px;height:38%;background:currentColor;z-index:6}
.second{width:1.5px;height:42%;background:#e74c3c;z-index:7}
.digital{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:300;letter-spacing:4px;
  font-variant-numeric:tabular-nums}
.date{font-size:clamp(.75rem,2.5vw,1rem);opacity:.6;margin-top:8px}
.period{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;opacity:.5;margin-top:4px}
.breath{position:absolute;width:100%;height:100%;border-radius:50%;top:0;left:0;
  animation:breathe 4s ease-in-out infinite;pointer-events:none}
@keyframes breathe{0%,100%{box-shadow:inset 0 0 0 0 transparent}
  50%{box-shadow:inset 0 0 20px rgba(231,76,60,.12)}}
</style>
</head>
<body>
<div class="container">
  <div class="analog">
    <div class="face">
      <div class="breath"></div>
      <div class="center-dot"></div>
      <div class="hand hour" id="h"></div>
      <div class="hand minute" id="m"></div>
      <div class="hand second" id="s"></div>
    </div>
  </div>
  <div class="digital" id="dig">00:00:00</div>
  <div class="date" id="dt"></div>
  <div class="period" id="pd"></div>
</div>
<script>
const $=id=>document.getElementById(id);
const marks=document.querySelector('.face');
for(let i=0;i<60;i++){
  const m=document.createElement('div');
  m.className=i%5===0?'mark major':'mark';
  m.style.transform=`rotate(${i*6}deg)`;
  marks.appendChild(m);
}
function tick(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();
  const sd=(s+ms/1000)*6, md=(m+s/60)*6, hd=((h%12)+m/60)*30;
  $('s').style.transform=`rotate(${sd}deg)`;
  $('m').style.transform=`rotate(${md}deg)`;
  $('h').style.transform=`rotate(${hd}deg)`;
  $('dig').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const days=['日','一','二','三','四','五','六'];
  $('dt').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
  const isNight=h<6||h>=18;
  document.body.className=isNight?'night':'day';
  $('pd').textContent=isNight?'🌙 Night Mode':'☀️ Day Mode';
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
