<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glm-5.2 · 钟表</title>
<style>
  :root{
    --day-bg1:#2a5298;--day-bg2:#7eb8ff;--face:#fdfdfb;--ink:#1a1a1a;--accent:#ff5a3c;
    --night-bg1:#0b1026;--night-bg2:#1d2b50;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;transition:background 1.2s ease, color 1.2s ease;overflow:hidden;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));}
  .meta{color:rgba(255,255,255,.85);font-size:12px;letter-spacing:2px;margin-bottom:18px;
    text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.3)}
  .clock{position:relative;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#fff,var(--face) 60%,#e9e6df);
    box-shadow:0 30px 60px rgba(0,0,0,.45),inset 0 0 0 8px rgba(255,255,255,.6),
      inset 0 0 0 9px rgba(0,0,0,.08),inset 0 -14px 30px rgba(0,0,0,.08);}
  .tick{position:absolute;left:50%;top:50%;width:2px;height:140px;
    transform-origin:50% 100%;transform:translate(-50%,-100%);pointer-events:none}
  .tick::before{content:"";display:block;width:2px;height:12px;margin:0 auto;background:var(--ink);border-radius:2px}
  .tick.major::before{height:18px;width:3px;background:var(--accent)}
  .hand{position:absolute;left:50%;top:50%;transform-origin:50% 100%;border-radius:6px}
  .h-hour{width:7px;height:80px;background:var(--ink);transform:translate(-50%,-100%) rotate(0deg)}
  .h-min{width:5px;height:110px;background:#333;transform:translate(-50%,-100%) rotate(0deg)}
  .h-sec{width:2px;height:124px;background:var(--accent);transform:translate(-50%,-85%) rotate(0deg);transition:transform .12s cubic-bezier(.4,2.6,.6,1)}
  .h-sec::after{content:"";position:absolute;left:50%;bottom:-16px;transform:translateX(-50%);
    width:8px;height:24px;background:var(--accent);border-radius:4px}
  .pin{position:absolute;left:50%;top:50%;width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff,var(--accent));transform:translate(-50%,-50%);
    box-shadow:0 2px 4px rgba(0,0,0,.4)}
  .digital{margin-top:26px;color:#fff;font-size:40px;font-weight:300;letter-spacing:3px;
    text-shadow:0 2px 10px rgba(0,0,0,.4);font-variant-numeric:tabular-nums}
  .date{color:rgba(255,255,255,.75);font-size:13px;margin-top:6px;letter-spacing:1px}
  body.night{--bg1:var(--night-bg1);--bg2:var(--night-bg2)}
  .star{position:absolute;background:#fff;border-radius:50%;opacity:.6;animation:tw 3s infinite ease-in-out}
  @keyframes tw{0%,100%{opacity:.2}50%{opacity:.9}}
</style>
</head>
<body class="day">
  <div class="meta" id="phase">白天 · DAY</div>
  <div class="clock">
    <div id="ticks"></div>
    <div class="hand h-hour" id="hour"></div>
    <div class="hand h-min" id="min"></div>
    <div class="hand h-sec" id="sec"></div>
    <div class="pin"></div>
  </div>
  <div class="digital" id="time">00:00:00</div>
  <div class="date" id="date">—</div>
<script>
  const ticks=document.getElementById('ticks');
  for(let i=0;i<60;i++){
    const t=document.createElement('div');
    t.className='tick'+(i%5===0?' major':'');
    t.style.transform=`translate(-50%,-100%) rotate(${i*6}deg)`;
    ticks.appendChild(t);
  }
  const elH=document.getElementById('hour'),elM=document.getElementById('min'),
    elS=document.getElementById('sec'),elT=document.getElementById('time'),
    elD=document.getElementById('date'),elP=document.getElementById('phase'),body=document.body;
  function pad(n){return String(n).padStart(2,'0')}
  const wdays=['周日','周一','周二','周三','周四','周五','周六'];
  function tick(){
    const d=new Date(),h=d.getHours(),m=d.getMinutes(),s=d.getSeconds(),ms=d.getMilliseconds();
    const sa=(s+ms/1000)*6,ma=(m+s/60)*6,ha=((h%12)+m/60)*30;
    elS.style.transform=`translate(-50%,-85%) rotate(${sa}deg)`;
    elM.style.transform=`translate(-50%,-100%) rotate(${ma}deg)`;
    elH.style.transform=`translate(-50%,-100%) rotate(${ha}deg)`;
    elT.textContent=`${pad(h)}:${pad(m)}:${pad(s)}`;
    elD.textContent=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} · ${wdays[d.getDay()]}`;
    const night=h<6||h>=18;
    if(night!==body.classList.contains('night')){
      body.classList.toggle('night',night);
      body.classList.toggle('day',!night);
      elP.textContent=night?'夜晚 · NIGHT':'白天 · DAY';
    }
  }
  function stars(){
    const night=true;
    for(let i=0;i<40;i++){
      const st=document.createElement('div');st.className='star';
      st.style.left=Math.random()*100+'vw';st.style.top=Math.random()*60+'vh';
      const sz=Math.random()*2+1;st.style.width=sz+'px';st.style.height=sz+'px';
      st.style.animationDelay=Math.random()*3+'s';document.body.appendChild(st);
    }
  }
  stars();tick();setInterval(tick,50);
</script>
</body>
</html>
