<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healer Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;transition:background .8s,color .8s}
body.day{background:linear-gradient(135deg,#74b9ff,#a29bfe);color:#2d3436}
body.night{background:linear-gradient(135deg,#0c0c1d,#1a1a3e);color:#dfe6e9}
.analog{position:relative;width:220px;height:220px;border:4px solid currentColor;border-radius:50%;margin-bottom:24px;animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 20px rgba(255,255,255,.1)}50%{box-shadow:0 0 40px rgba(255,255,255,.3)}}
.center{position:absolute;top:50%;left:50%;width:10px;height:10px;background:currentColor;border-radius:50%;transform:translate(-50%,-50%);z-index:10}
.hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:2px}
.hour{width:4px;height:55px;background:currentColor;margin-left:-2px}
.minute{width:3px;height:75px;background:currentColor;margin-left:-1.5px}
.second{width:1.5px;height:85px;background:#e17055;margin-left:-.75px;transition:none}
.tick{position:absolute;width:2px;height:8px;background:currentColor;top:6px;left:50%;margin-left:-1px;transform-origin:center 104px}
.digital{font-size:3rem;font-weight:200;letter-spacing:4px;font-variant-numeric:tabular-nums}
.period{font-size:.9rem;opacity:.6;margin-top:8px;text-transform:uppercase;letter-spacing:2px}
</style>
</head>
<body>
<div class="analog" id="analog">
  <div class="center"></div>
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
</div>
<div class="digital" id="digital">00:00:00</div>
<div class="period" id="period"></div>
<script>
const ticks=12,analog=document.getElementById('analog');
for(let i=0;i<ticks;i++){const t=document.createElement('div');t.className='tick';t.style.transform=`rotate(${i*30}deg)`;analog.appendChild(t)}
function update(){
  const now=new Date(),h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();
  document.getElementById('second').style.transform=`rotate(${s*6+ms*.006}deg)`;
  document.getElementById('minute').style.transform=`rotate(${m*6+s*.1}deg)`;
  document.getElementById('hour').style.transform=`rotate(${h%12*30+m*.5}deg)`;
  document.getElementById('digital').textContent=
    [h,m,s].map(v=>String(v).padStart(2,'0')).join(':');
  const isDay=h>=6&&h<18;
  document.body.className=isDay?'day':'night';
  document.getElementById('period').textContent=isDay?'☀️ 白天模式':'🌙 夜间模式';
  requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
