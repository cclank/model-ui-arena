<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 1s ease;
            overflow: hidden;
        }

        .clock-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hand {
            position: absolute;
            transform-origin: bottom center;
            border-radius: 3px;
        }

        .hour-hand {
            width: 8px;
            height: 80px;
            background: linear-gradient(to top, rgba(255,255,255,0.2), #ffffff);
            top: calc(50% - 80px);
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
        }

        .minute-hand {
            width: 6px;
            height: 110px;
            background: linear-gradient(to top, rgba(255,255,255,0.2), #ffffff);
            top: calc(50% - 110px);
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
        }

        .second-hand {
            width: 2px;
            height: 130px;
            background: linear-gradient(to top, rgba(255,100,100,0.2), #ff6464);
            top: calc(50% - 130px);
        }

        .center-circle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ff6464;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 10px #ff6464;
        }

        .digital-time {
            position: absolute;
            top: -60px;
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.7);
            opacity: 0.9;
        }

        .tick {
            position: absolute;
            width: 3px;
            height: 12px;
            background: rgba(255, 255, 255, 0.7);
            left: calc(50% - 1.5px);
            top: 8px;
            transform-origin: bottom center;
            border-radius: 1px;
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.1),
                        0 0 60px rgba(135, 206, 235, 0.2);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="digital-time" id="digitalTime">00:00:00</div>
        <div class="clock-face" id="clockFace">
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="hand second-hand" id="secondHand"></div>
            <div class="center-circle"></div>
            <div class="glow"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 更新数字时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digitalTime').textContent = `${hours}:${minutes}`;

            // 获取时间角度
            const hour = now.getHours() % 12;
            const minute = now.getMinutes();
            const second = now.getSeconds();

            const hourDeg = (hour * 30) + (minute * 0.5);
            const minuteDeg = (minute * 6) + (second * 0.1);
            const secondDeg = second * 6;

            // 设置指针旋转
            document.getElementById('hourHand').style.transform = `rotate(${hourDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${minuteDeg}deg)`;
            document.getElementById('secondHand').style.transform = `rotate(${secondDeg}deg)`;

            // 昼夜模式切换
            const hourFloat = now.getHours() + now.getMinutes()/60;
            const body = document.body;

            // 计算天空颜色 - 模拟一天中的光线变化
            if (hourFloat >= 6 && hourFloat < 8) {
                // 日出
                const progress = (hourFloat - 6) / 2;
                const r = Math.floor(255);
                const g = Math.floor(150 + progress * 105);
                const b = Math.floor(100 + progress * 155);
                body.style.background = `linear-gradient(to bottom, rgb(${r},${g},${b}), #E0F6FF)`;
            } else if (hourFloat >= 8 && hourFloat < 17) {
                // 白天
                body.style.background = 'linear-gradient(to bottom, #87CEEB, #E0F6FF)';
            } else if (hourFloat >= 17 && hourFloat < 19) {
                // 日落
                const progress = (hourFloat - 17) / 2;
                const r = Math.floor(255 - progress * 100);
                const g = Math.floor(150 - progress * 150);
                const b = Math.floor(100 - progress * 100);
                body.style.background = `linear-gradient(to bottom, #ff7700, rgb(${r},${g},${b}))`;
            } else {
                // 夜晚
                const h = Math.floor(hourFloat) % 24;
                if (h >= 19 || h < 6) {
                    const nightProgress = (h >= 19) ? (h - 19) / 7 : (h + 5) / 7;
                    const baseR = 25;
                    const baseG = 25 + Math.floor(nightProgress * 20);
                    const baseB = 50 + Math.floor(nightProgress * 30);
                    body.style.background = `linear-gradient(to bottom, rgb(${baseR},${baseG},${baseB}), rgb(${baseR-10},${baseG-15},${baseB-20}))`;
                }
            }
        }

        // 创建刻度标记
        function createTicks() {
            const clockFace = document.getElementById('clockFace');
            for (let i = 0; i < 12; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.transform = `rotate(${i * 30}deg)`;

                // 每小时刻度更长更粗
                if (i % 3 === 0) {
                    tick.style.height = '18px';
                    tick.style.width = '4px';
                    tick.style.background = 'rgba(255, 255, 255, 0.9)';
                }

                clockFace.appendChild(tick);
            }
        }

        // 初始化刻度并启动时钟
        createTicks();
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
