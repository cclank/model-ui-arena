<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>观星台 · 昼夜双面钟</title>
<!--
设计说明：以本地时间自动切换昼夜两套气质——夜为深海军蓝星空＋月光银刻度＋琥珀秒针，
昼为晨曦天色＋暖金浮尘。rAF 统一驱动指针扫动、刻度呼吸、星空闪烁与主题渐变（prefers-reduced-motion
时改为整秒离散步进的静态帧），页面隐藏时暂停渲染；canvas 已处理 devicePixelRatio（上限 2）与 resize。
-->
<style>
:root{--disp:ui-monospace,'SF Mono',Menlo,Consolas,'Courier New',monospace;--serif:Georgia,'Times New Roman','Songti SC',STSong,serif;--ink:#182f52;--muted:#5f7392;--tick:#2e4a74;--tickm:#a09377;--face:#f8f2e4;--faceedge:#d8c7a3;--accent:#b97712;--halo:rgba(255,206,138,.55);--px:0px;--py:0px}
*{margin:0;box-sizing:border-box}
body{min-height:100svh;display:grid;place-items:center;font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;color:var(--ink);overflow-x:hidden;background:#0b1630}
.sky{position:fixed;inset:0;z-index:-3}
.sky.day{background:radial-gradient(circle at 24% 10%,rgba(255,222,160,.8),transparent 44%),linear-gradient(180deg,#a5cee9 0%,#d8e6ea 46%,#f6e2bf 100%)}
.sky.night{opacity:0;background:radial-gradient(circle at 76% 13%,rgba(205,225,255,.3),transparent 36%),radial-gradient(circle at 76% 13%,#e9f1ff 0 3.5px,transparent 4.5px),linear-gradient(180deg,#060d1f 0%,#0d1b3a 55%,#1c2f56 100%)}
#sky{position:fixed;inset:0;z-index:-2;width:100%;height:100%}
.stage{width:min(560px,94vw);padding:30px 0 24px;text-align:center}
header{display:flex;justify-content:space-between;align-items:baseline;color:var(--muted)}
.brand b{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:.34em;color:var(--ink);margin-right:12px}
.brand i{font-style:normal;font-size:10px;letter-spacing:.32em}
.live{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.22em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px var(--accent);animation:beat 2.4s ease-in-out infinite}
@keyframes beat{50%{opacity:.25;transform:scale(.65)}}
.clock{position:relative;width:min(78vw,332px);margin:26px auto 6px;cursor:pointer;transition:transform .5s cubic-bezier(.2,.8,.3,1)}
.clock:hover{transform:translateY(-4px)}
.clock:active{transform:translateY(-1px) scale(.99)}
.halo{position:absolute;left:50%;top:50%;width:158%;aspect-ratio:1;z-index:-1;pointer-events:none;transition:filter .4s;background:radial-gradient(circle,var(--halo) 0%,transparent 62%);animation:breathe 6s ease-in-out infinite;transform:translate(-50%,-50%) translate(var(--px),var(--py))}
@keyframes breathe{0%,100%{opacity:.85;transform:translate(-50%,-50%) translate(var(--px),var(--py)) scale(1)}50%{opacity:.45;transform:translate(-50%,-50%) translate(var(--px),var(--py)) scale(1.08)}}
.clock:hover .halo{filter:brightness(1.3)}
svg{display:block;width:100%;height:auto;filter:drop-shadow(0 16px 32px rgba(6,12,28,.35))}
.hair{fill:none;stroke:var(--tick);stroke-opacity:.4;stroke-width:1;stroke-dasharray:.7 2.2}
.face{fill:var(--face);stroke:var(--faceedge);stroke-width:2.5}
.tick{stroke:var(--tickm);stroke-width:1.5;stroke-linecap:round;transition:stroke .35s,stroke-width .35s}
.tick.ht{stroke:var(--tick);stroke-width:3.4}
.tick.hot{stroke:var(--accent);stroke-width:4.6;animation:pulse 1.15s ease-out}
@keyframes pulse{0%{stroke-width:9;stroke-opacity:.3}55%{stroke-opacity:1}100%{stroke-width:4.6}}
.nums text{font-family:var(--serif);font-size:27px;font-weight:600;fill:var(--tick);letter-spacing:1px}
.hand{stroke:var(--tick);stroke-linecap:round}
#sh line{stroke:var(--accent)}
#sh circle{fill:var(--accent)}
.cap{fill:var(--tick)}
.capIn{fill:var(--accent)}
.time{font-family:var(--disp);font-weight:600;font-size:clamp(52px,15.5vw,86px);line-height:1;display:flex;align-items:baseline;justify-content:center;font-variant-numeric:tabular-nums;letter-spacing:.02em;text-shadow:0 0 26px var(--halo)}
.col{transition:opacity .2s;margin:0 1px}
.secw{display:flex;flex-direction:column;align-items:center;margin-left:14px;gap:3px}
.secw b{font-size:.4em;font-weight:600;color:var(--accent);border:1.5px solid;border-radius:6px;padding:.14em .3em .06em;line-height:1}
.secw i{font-style:normal;font-size:8px;letter-spacing:.34em;color:var(--muted);text-indent:.34em}
.meta{margin-top:16px;display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;font-size:12.5px;letter-spacing:.14em;color:var(--muted)}
.sep{opacity:.45}
.badge{font-size:11px;letter-spacing:.2em;padding:4px 13px;border:1px solid var(--faceedge);border-radius:999px;color:var(--ink);transition:.35s;cursor:default}
.badge:hover{background:var(--accent);border-color:var(--accent);color:#12203c}
footer{margin-top:28px;font-family:var(--serif);font-style:italic;font-size:12.5px;letter-spacing:.3em;color:var(--muted);opacity:.85}
::selection{background:var(--accent);color:#12203c}
@media(max-width:430px){.brand b{font-size:18px;letter-spacing:.18em}.brand i{display:none}.meta{font-size:11.5px;gap:9px}.secw{margin-left:9px}footer{letter-spacing:.16em;font-size:11.5px}.stage{padding-top:22px}}
@media(prefers-reduced-motion:reduce){.halo,.dot,.tick.hot{animation:none}}
</style>
</head>
<body>
<div class="sky day" aria-hidden="true"></div>
<div class="sky night" id="nightSky" aria-hidden="true"></div>
<canvas id="sky" aria-hidden="true"></canvas>
<main class="stage" id="stage">
<header>
<div class="brand"><b>观星台</b><i>OBSERVATORY · Nº04</i></div>
<div class="live"><span class="dot"></span>本地实时</div>
</header>
<div class="clock" id="clock">
<div class="halo" aria-hidden="true"></div>
<svg id="dial" viewBox="0 0 400 400" role="img" aria-label="模拟时钟">
<defs><radialGradient id="shade"><stop offset="52%" stop-color="#fff" stop-opacity=".06"/><stop offset="100%" stop-color="#001018" stop-opacity=".2"/></radialGradient></defs>
<circle cx="200" cy="200" r="196" class="hair"/>
<circle cx="200" cy="200" r="178" class="face"/>
<circle cx="200" cy="200" r="178" fill="url(#shade)"/>
<ellipse cx="200" cy="128" rx="138" ry="56" fill="#fff" opacity=".05"/>
<g id="ticks"></g>
<g class="nums" text-anchor="middle" style="dominant-baseline:central">
<text x="200" y="67">XII</text><text x="333" y="200">III</text><text x="200" y="333">VI</text><text x="67" y="200">IX</text>
</g>
<g id="hh" class="hand"><line x1="200" y1="222" x2="200" y2="108" stroke-width="7"/></g>
<g id="mh" class="hand"><line x1="200" y1="226" x2="200" y2="82" stroke-width="4.6"/></g>
<g id="sh"><line x1="200" y1="240" x2="200" y2="64" stroke-width="2.4"/><circle cx="200" cy="231" r="5"/></g>
<circle cx="200" cy="200" r="7.5" class="cap"/><circle cx="200" cy="200" r="3.2" class="capIn"/>
</svg>
</div>
<section class="digital">
<div class="time">
<span id="dh">--</span><span class="col" id="col">:</span><span id="dm">--</span>
<span class="secw"><b id="ds">--</b><i>SEC</i></span>
</div>
<div class="meta">
<span id="date">----年--月--日</span><span class="sep">·</span>
<span id="week">星期-</span><span class="sep">·</span>
<span id="tz">UTC--</span>
<span class="badge" id="badge">☾ 夜间</span>
</div>
</section>
<footer>时间，是天体运行留在人间的刻度</footer>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id),root=document.documentElement;
const cv=$('sky'),ctx=cv.getContext('2d'),nightSky=$('nightSky'),badge=$('badge'),RM=matchMedia('(prefers-reduced-motion: reduce)').matches;
const DAY={face:[248,242,228],edge:[216,199,163],tick:[46,74,116],tickm:[160,147,119],ink:[24,47,82],muted:[95,115,146],acc:[185,119,18],halo:[255,206,138,.55]};
const NIT={face:[13,27,56],edge:[51,80,127],tick:[205,217,236],tickm:[84,104,150],ink:[233,240,252],muted:[142,163,198],acc:[255,181,69],halo:[118,158,228,.38]};
const mix=(a,b,t)=>{const c=a.map((v,i)=>v+(b[i]-v)*t);return`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${c.length>3?+c[3].toFixed(3):1})`};
function apply(n){const S=root.style;
S.setProperty('--face',mix(DAY.face,NIT.face,n));S.setProperty('--faceedge',mix(DAY.edge,NIT.edge,n));
S.setProperty('--tick',mix(DAY.tick,NIT.tick,n));S.setProperty('--tickm',mix(DAY.tickm,NIT.tickm,n));
S.setProperty('--ink',mix(DAY.ink,NIT.ink,n));S.setProperty('--muted',mix(DAY.muted,NIT.muted,n));
S.setProperty('--accent',mix(DAY.acc,NIT.acc,n));S.setProperty('--halo',mix(DAY.halo,NIT.halo,n));
nightSky.style.opacity=n;badge.textContent=n>.5?'☾ 夜间':'☀ 白昼';}
const svg=$('dial'),NS=svg.namespaceURI,ticksG=$('ticks'),T=[];
for(let i=0;i<60;i++){const a=i*Math.PI/30,ht=i%5===0,r0=166,r1=ht?149:157,l=document.createElementNS(NS,'line');
l.setAttribute('x1',(200+r1*Math.sin(a)).toFixed(1));l.setAttribute('y1',(200-r1*Math.cos(a)).toFixed(1));
l.setAttribute('x2',(200+r0*Math.sin(a)).toFixed(1));l.setAttribute('y2',(200-r0*Math.cos(a)).toFixed(1));
l.setAttribute('class','tick'+(ht?' ht':''));ticksG.appendChild(l);T.push(l);}
let W=0,H=0;const stars=[],motes=[];
function resize(){if(!ctx)return;const d=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;ctx.setTransform(d,0,0,d,0,0);}
addEventListener('resize',resize);resize();
for(let i=0;i<110;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()<.12?2:1.2,b:.3+Math.random()*.7,sp:.4+Math.random()*1.6,ph:Math.random()*6.28});
for(let i=0;i<26;i++)motes.push({x:Math.random(),y:Math.random(),r:1+Math.random()*2.2,sp:.5+Math.random()*1.4,sw:Math.random()*6.28,a:.25+Math.random()*.5});
const pad=n=>n<10?'0'+n:''+n,dh=$('dh'),dm=$('dm'),ds=$('ds'),col=$('col');
const gH=$('hh'),gM=$('mh'),gS=$('sh');
(function(){const n=new Date(),off=-n.getTimezoneOffset()/60;let z='';try{z=Intl.DateTimeFormat().resolvedOptions().timeZone||''}catch(e){}
$('tz').textContent='UTC'+(off>=0?'+':'')+off+(z?' · '+z.replace(/_/g,' '):'');})();
let nf=-1,drawnNf=9,lastMin=-1,lastSec=-1,colOp='',raf=0,pt=performance.now();
function frame(t){raf=RM?setTimeout(frame,1005-new Date().getMilliseconds()):requestAnimationFrame(frame);const dt=Math.min(.06,(t-pt)/1000);pt=t;
const now=new Date(),h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),sec=RM?s:s+now.getMilliseconds()/1e3;
const tgt=(h>=18||h<6)?1:0;
nf=RM?tgt:nf<0?tgt:nf+(tgt-nf)*Math.min(1,dt*1.6);if(Math.abs(tgt-nf)<.002)nf=tgt;
if(Math.abs(nf-drawnNf)>.002){apply(nf);drawnNf=nf;}
gS.setAttribute('transform','rotate('+(sec*6).toFixed(2)+' 200 200)');
gM.setAttribute('transform','rotate('+((m+sec/60)*6).toFixed(2)+' 200 200)');
gH.setAttribute('transform','rotate('+(((h%12)+m/60)*30).toFixed(2)+' 200 200)');
const cop=(.3+.7*(.5+.5*Math.cos((sec%1)*6.283))).toFixed(2);
if(cop!==colOp){colOp=cop;col.style.opacity=cop;}
if(s!==lastSec){lastSec=s;ds.textContent=pad(s);}
if(m!==lastMin){if(lastMin>-1)T[lastMin].classList.remove('hot');T[m].classList.add('hot');lastMin=m;
dh.textContent=pad(h);dm.textContent=pad(m);
$('date').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
$('week').textContent='星期'+'日一二三四五六'[now.getDay()];}
if(ctx){ctx.clearRect(0,0,W,H);
if(nf>.02){ctx.fillStyle='#dbe7ff';
for(const st of stars){ctx.globalAlpha=nf*st.b*(RM?.55:.3+.7*Math.abs(Math.sin(t*.001*st.sp+st.ph)));ctx.fillRect(st.x*W,st.y*H,st.r,st.r);}}
if(nf<.98){ctx.fillStyle='#ffd9a2';
for(const mo of motes){if(!RM){mo.y-=mo.sp*dt*.012;mo.x+=Math.sin(t*.0004+mo.sw)*.00015;if(mo.y<-.02){mo.y=1.02;mo.x=Math.random();}}
ctx.globalAlpha=(1-nf)*mo.a*(RM?.6:.5+.5*Math.sin(t*.0012+mo.sw));ctx.beginPath();ctx.arc(mo.x*W,mo.y*H,mo.r,0,6.283);ctx.fill();}}
ctx.globalAlpha=1;}}
function stop(){if(raf){cancelAnimationFrame(raf);clearTimeout(raf);raf=0;}}
function go(){if(!raf){pt=performance.now();RM?frame():raf=requestAnimationFrame(frame);}}
document.addEventListener('visibilitychange',()=>document.hidden?stop():go());
if(matchMedia('(pointer:fine)').matches){const st=$('stage');
st.addEventListener('pointermove',e=>{const r=st.getBoundingClientRect();
root.style.setProperty('--px',((e.clientX-r.left)/r.width-.5)*10+'px');
root.style.setProperty('--py',((e.clientY-r.top)/r.height-.5)*10+'px');});}
go();
</script>
</body>
</html>
