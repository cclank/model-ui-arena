<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock • grok-4.3</title>
<style>
  :root {
    --bg: #0a0c10;
    --panel: #14171f;
    --accent: #5eead4;
    --text: #e2e8f0;
    --muted: #64748b;
    --hand: #f1f5f9;
    --shadow: rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .wrap {
    width: 100%;
    max-width: 390px;
    background: var(--panel);
    border-radius: 24px;
    padding: 28px 24px 32px;
    box-shadow: 0 25px 50px -12px var(--shadow);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .model {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .title {
    font-size: 13px;
    color: var(--muted);
  }
  .clock {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 24px;
  }
  .face {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #0f1219;
    border: 8px solid #1f2430;
    box-shadow: inset 0 8px 20px rgba(0,0,0,0.7), 0 10px 30px rgba(0,0,0,0.5);
    position: relative;
  }
  .face::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1px solid rgba(94, 234, 212, 0.15);
  }
  .tick {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 3px;
    height: 10px;
    background: #475569;
    transform-origin: 50% 100%;
    border-radius: 2px;
  }
  .tick.major {
    height: 16px;
    width: 4px;
    background: var(--accent);
  }
  .hand {
    position: absolute;
    left: 50%;
    top: 50%;
    background: var(--hand);
    transform-origin: 50% 90%;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transition: transform 0.05s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .hand.hour { width: 6px; height: 62px; margin-left: -3px; }
  .hand.min { width: 4px; height: 92px; margin-left: -2px; background: #cbd5e1; }
  .hand.sec {
    width: 2px;
    height: 108px;
    margin-left: -1px;
    background: #f43f5e;
    box-shadow: 0 0 8px #f43f5e;
  }
  .center {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 14px;
    height: 14px;
    background: #1f2430;
    border: 3px solid var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }
  .digital {
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .time {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 3px;
    line-height: 1;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .ampm {
    font-size: 13px;
    color: var(--accent);
    margin-left: 6px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .date {
    margin-top: 4px;
    font-size: 13px;
    color: var(--muted);
  }
  .status {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
  }
  .dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .night .face {
    background: #0b0e15;
    border-color: #161a24;
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="header">
    <div>
      <div class="model">grok-4.3</div>
      <div class="title">实时高精度时钟</div>
    </div>
    <div style="text-align:right">
      <div id="daynight" style="font-size:11px;color:#64748b">DAY</div>
    </div>
  </div>

  <div class="clock">
    <div class="face" id="face">
      <!-- ticks generated by JS -->
    </div>
    <div class="hand hour" id="hour"></div>
    <div class="hand min" id="min"></div>
    <div class="hand sec" id="sec"></div>
    <div class="center"></div>
  </div>

  <div class="digital">
    <div>
      <span id="time" class="time">00:00:00</span>
      <span id="ampm" class="ampm"></span>
    </div>
    <div id="date" class="date"></div>
  </div>

  <div class="status">
    <div class="dot"></div>
    <span style="color:#64748b">秒级同步 · 平滑秒针</span>
  </div>
</div>

<script>
(function() {
  const face = document.getElementById('face');
  const hourHand = document.getElementById('hour');
  const minHand = document.getElementById('min');
  const secHand = document.getElementById('sec');
  const timeEl = document.getElementById('time');
  const ampmEl = document.getElementById('ampm');
  const dateEl = document.getElementById('date');
  const wrap = document.getElementById('wrap');

  // Create 60 ticks
  for (let i = 0; i < 60; i++) {
    const tick = document.createElement('div');
    tick.className = 'tick' + (i % 5 === 0 ? ' major' : '');
    const rot = i * 6;
    tick.style.transform = `rotate(${rot}deg) translateY(-108px)`;
    if (i % 5 === 0) {
      tick.style.height = '16px';
      tick.style.width = '3.5px';
    }
    face.appendChild(tick);
  }

  function pad(n) { return n.toString().padStart(2, '0'); }

  let lastSec = -1;

  function update() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    // smooth second hand
    const secFrac = s + ms / 1000;
    const secDeg = secFrac * 6;
    const minDeg = (m + secFrac / 60) * 6;
    const hourDeg = ((h % 12) + (m + secFrac / 60) / 60) * 30;

    secHand.style.transform = `translate(-50%, -90%) rotate(${secDeg}deg)`;
    minHand.style.transform = `translate(-50%, -90%) rotate(${minDeg}deg)`;
    hourHand.style.transform = `translate(-50%, -90%) rotate(${hourDeg}deg)`;

    // digital
    const hh = h % 12 || 12;
    timeEl.textContent = `${pad(hh)}:${pad(m)}:${pad(s)}`;
    ampmEl.textContent = h >= 12 ? 'PM' : 'AM';

    // date
    const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
    dateEl.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

    // day / night mode
    const isNight = h < 6 || h >= 19;
    wrap.classList.toggle('night', isNight);
    document.getElementById('daynight').textContent = isNight ? 'NIGHT' : 'DAY';
    document.getElementById('daynight').style.color = isNight ? '#64748b' : '#5eead4';

    // only force reflow on second change for perf
    if (s !== lastSec) {
      lastSec = s;
    }
  }

  // 60fps smooth updates
  function loop() {
    update();
    requestAnimationFrame(loop);
  }

  // initial
  update();
  loop();

  // also update on visibility to resync
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) update();
  });
})();
</script>
</body>
</html>
