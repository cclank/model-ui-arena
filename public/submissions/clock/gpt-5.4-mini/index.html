<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Clock</title><style>html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#09111f,#111b37 60%,#05070f);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 50% 35%,rgba(109,150,255,.18),transparent 35%),radial-gradient(circle at 50% 60%,rgba(255,255,255,.06),transparent 55%);animation:bg 8s ease-in-out infinite alternate;pointer-events:none}.wrap{min-height:100%;display:grid;place-items:center;padding:22px}.card{width:min(92vw,420px);padding:22px;border-radius:28px;background:rgba(8,12,24,.68);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(18px);box-shadow:0 18px 60px rgba(0,0,0,.45)}.top{display:flex;justify-content:space-between;color:#a9b7ff;font-size:12px;letter-spacing:.18em;text-transform:uppercase}.dial{width:min(72vw,280px);aspect-ratio:1;border-radius:50%;margin:18px auto;position:relative;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.08),rgba(255,255,255,.02) 55%,rgba(255,255,255,.04));box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 0 44px rgba(96,130,255,.12)}.tick{position:absolute;left:50%;top:50%;width:2px;height:12px;background:rgba(255,255,255,.18);transform-origin:center calc(100% + 118px);transform:translate(-50%,-100%) rotate(calc(var(--i)*30deg))}.tick.big{height:18px;background:rgba(255,255,255,.4)}.hand{position:absolute;left:50%;top:50%;transform-origin:50% 92%;transform:translate(-50%,-92%) rotate(var(--r));border-radius:999px}.hour{width:6px;height:70px;background:linear-gradient(#fff,#9eb5ff)}.min{width:4px;height:102px;background:linear-gradient(#fff,#6dd7ff)}.sec{width:2px;height:116px;background:linear-gradient(#ff7c9b,#ffb46b);box-shadow:0 0 12px rgba(255,120,150,.6)}.core{position:absolute;inset:50%;width:12px;height:12px;transform:translate(-50%,-50%);border-radius:50%;background:#fff;box-shadow:0 0 0 6px rgba(255,255,255,.08),0 0 20px rgba(255,255,255,.35)}.num{font-size:clamp(42px,10vw,66px);font-weight:800;letter-spacing:.06em;text-align:center;text-shadow:0 6px 30px rgba(110,150,255,.35)}.sub{display:flex;justify-content:space-between;gap:12px;margin-top:14px;color:#c7d3ff;font-size:13px}.chip{flex:1;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}@keyframes bg{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.06) rotate(1deg)}}@media (max-width:390px){.card{padding:18px;border-radius:22px}.dial{width:72vw}}</style></head><body><div class="wrap"><div class="card"><div class="top"><span>Local Time</span><span id="phase">--</span></div><div class="dial" id="dial"></div><div class="num" id="time">--:--:--</div><div class="sub"><div class="chip" id="date">----</div><div class="chip">Asia/Shanghai</div></div></div></div><script>const d=document.getElementById('dial'),t=document.getElementById('time'),p=document.getElementById('phase'),dt=document.getElementById('date');for(let i=0;i<12;i++){const s=document.createElement('i');s.className='tick'+(i%3===0?' big':'');s.style.setProperty('--i',i);d.appendChild(s)}const h=document.createElement('i'),m=document.createElement('i'),s=document.createElement('i'),c=document.createElement('i');h.className='hand hour';m.className='hand min';s.className='hand sec';c.className='core';d.append(h,m,s,c);const f=n=>String(n).padStart(2,'0');(function u(){const n=new Date(),hh=n.getHours(),mm=n.getMinutes(),ss=n.getSeconds();t.textContent=`${f(hh)}:${f(mm)}:${f(ss)}`;dt.textContent=n.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit',weekday:'short'});p.textContent=hh<6?'深夜':hh<12?'上午':hh<18?'下午':'夜晚';h.style.setProperty('--r',`${hh%12*30+mm*.5}deg`);m.style.setProperty('--r',`${mm*6+ss*.1}deg`);s.style.setProperty('--r',`${ss*6}deg`);setTimeout(u,250)})()</script></body></html>
