<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精致时钟</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; }
        .clock { text-align: center; }
        .digital { font-size: 3rem; margin-bottom: 20px; }
        .analog { width: 200px; height: 200px; border: 4px solid white; border-radius: 50%; position: relative; }
        .hand { position: absolute; background: white; transform-origin: bottom; bottom: 50%; left: 50%; }
        .hour { width: 4px; height: 50px; margin-left: -2px; }
        .min { width: 2px; height: 70px; margin-left: -1px; }
        .sec { width: 1px; height: 80px; margin-left: -0.5px; background: red; }
    </style>
</head>
<body>
    <div class="clock">
        <div class="digital" id="d">00:00:00</div>
        <div class="analog">
            <div class="hand hour" id="h"></div>
            <div class="hand min" id="m"></div>
            <div class="hand sec" id="s"></div>
        </div>
    </div>
    <script>
        function update() {
            const now = new Date();
            document.getElementById('d').innerText = now.toLocaleTimeString();
            document.getElementById('h').style.transform = `rotate(${now.getHours()*30 + now.getMinutes()*0.5}deg)`;
            document.getElementById('m').style.transform = `rotate(${now.getMinutes()*6}deg)`;
            document.getElementById('s').style.transform = `rotate(${now.getSeconds()*6}deg)`;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
