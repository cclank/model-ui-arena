<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辉光时钟</title>
<style>
  :root{ --bg1:#0b1026; --bg2:#1a2150; --accent:#5ad1ff; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:28px; font-family:"SF Pro Display",system-ui,sans-serif;
    background:radial-gradient(circle at 50% 30%,var(--bg2),var(--bg1) 70%);
    color:#eef3ff; transition:background 1.5s ease; overflow:hidden;
  }
  body.day{ background:radial-gradient(circle at 50% 30%,#a9d4ff,#dbeeff 70%); color:#16305a; }
  .wrap{ position:relative; width:min(78vw,320px); aspect-ratio:1; }
  .dial{ width:100%; height:100%; filter:drop-shadow(0 0 24px rgba(90,209,255,.35)); }
  body.day .dial{ filter:drop-shadow(0 0 18px rgba(90,140,255,.25)); }
  .tick{ stroke:currentColor; opacity:.45; }
  .tick.major{ opacity:.9; stroke-width:3; }
  .hand{ stroke-linecap:round; transform-origin:100px 100px; }
  .hour{ stroke:currentColor; stroke-width:6; }
  .min{ stroke:currentColor; stroke-width:4; }
  .sec{ stroke:var(--accent); stroke-width:2; transition:transform .08s cubic-bezier(.4,2.2,.6,1); }
  .pin{ fill:var(--accent); }
  .ring{ fill:none; stroke:var(--accent); stroke-width:2; opacity:.25; animation:breathe 4s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ opacity:.15; r:92px; } 50%{ opacity:.4; r:95px; } }
  .digital{ text-align:center; }
  .time{ font-size:clamp(38px,12vw,58px); font-weight:700; letter-spacing:4px;
    text-shadow:0 0 18px rgba(90,209,255,.5); font-variant-numeric:tabular-nums; }
  body.day .time{ text-shadow:0 0 12px rgba(90,140,255,.3); }
  .meta{ margin-top:6px; font-size:14px; opacity:.7; letter-spacing:1px; }
  .greet{ display:inline-block; margin-top:4px; padding:3px 12px; border-radius:20px;
    font-size:12px; background:rgba(90,209,255,.15); border:1px solid rgba(90,209,255,.3); }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="dial" viewBox="0 0 200 200">
      <circle class="ring" cx="100" cy="100" r="92"/>
      <g id="ticks"></g>
      <line class="hand hour" id="h" x1="100" y1="100" x2="100" y2="55"/>
      <line class="hand min" id="m" x1="100" y1="100" x2="100" y2="40"/>
      <line class="hand sec" id="s" x1="100" y1="110" x2="100" y2="32"/>
      <circle class="pin" cx="100" cy="100" r="4"/>
    </svg>
  </div>
  <div class="digital">
    <div class="time" id="txt">00:00:00</div>
    <div class="meta" id="date"></div>
    <div class="greet" id="greet"></div>
  </div>
<script>
  const ticks = document.getElementById('ticks');
  for(let i=0;i<60;i++){
    const a = i*6 * Math.PI/180;
    const major = i%5===0;
    const r1 = major?80:85, r2=90;
    const x1=100+r1*Math.sin(a), y1=100-r1*Math.cos(a);
    const x2=100+r2*Math.sin(a), y2=100-r2*Math.cos(a);
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('class','tick'+(major?' major':''));
    ticks.appendChild(l);
  }
  const h=document.getElementById('h'), m=document.getElementById('m'), s=document.getElementById('s');
  const txt=document.getElementById('txt'), dateEl=document.getElementById('date'), greet=document.getElementById('greet');
  const days=['周日','周一','周二','周三','周四','周五','周六'];
  const pad=n=>String(n).padStart(2,'0');
  function tick(){
    const now=new Date();
    const hh=now.getHours(), mm=now.getMinutes(), ss=now.getSeconds(), ms=now.getMilliseconds();
    const secA=(ss+ms/1000)*6;
    const minA=(mm+ss/60)*6;
    const hourA=((hh%12)+mm/60)*30;
    h.style.transform=`rotate(${hourA}deg)`;
    m.style.transform=`rotate(${minA}deg)`;
    s.style.transform=`rotate(${secA}deg)`;
    txt.textContent=`${pad(hh)}:${pad(mm)}:${pad(ss)}`;
    dateEl.textContent=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${days[now.getDay()]}`;
    const day = hh>=6 && hh<18;
    document.body.classList.toggle('day',day);
    greet.textContent = hh<6?'🌙 深夜':hh<12?'☀️ 早安':hh<18?'🌤 午后':'🌆 傍晚';
    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
