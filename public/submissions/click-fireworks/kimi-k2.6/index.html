<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#02040a;overflow:hidden;touch-action:none}
canvas{display:block}
.hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:13px;font-family:system-ui,sans-serif;pointer-events:none;user-select:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">点击屏幕任意位置放烟花</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);
const particles=[];
const colors=['#ff3860','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#06b6d4'];
class Particle{
constructor(x,y,color,type){
this.x=x;this.y=y;this.color=color;this.type=type||'burst';
const angle=Math.random()*Math.PI*2;
const speed=type==='trail'?Math.random()*2+1:Math.random()*5+2;
this.vx=Math.cos(angle)*speed;
this.vy=Math.sin(angle)*speed;
this.life=1;this.decay=type==='trail'?0.015:Math.random()*0.02+0.01;
this.gravity=0.08;this.size=type==='trail'?Math.random()*2+1:Math.random()*3+2;
}
update(){
this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;
this.life-=this.decay;this.vx*=0.98;this.vy*=0.98;
}
draw(){
ctx.globalAlpha=this.life;
ctx.fillStyle=this.color;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
if(this.life>0.5&&this.type!=='trail'){
ctx.globalAlpha=this.life*0.3;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size*3,0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;
}
}
function createFirework(x,y){
const color=colors[Math.floor(Math.random()*colors.length)];
const count=40+Math.floor(Math.random()*30);
for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));
for(let i=0;i<8;i++){
const angle=(i/8)*Math.PI*2;
for(let j=0;j<5;j++){
const p=new Particle(x,y,color,'trail');
p.vx=Math.cos(angle)*(2+j);
p.vy=Math.sin(angle)*(2+j);
particles.push(p);
}
}
}
function animate(){
ctx.fillStyle='rgba(2,4,10,0.15)';
ctx.fillRect(0,0,W,H);
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];p.update();p.draw();
if(p.life<=0)particles.splice(i,1);
}
requestAnimationFrame(animate);
}
canvas.addEventListener('click',e=>createFirework(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();createFirework(e.touches[0].clientX,e.touches[0].clientY);});
function autoLaunch(){const x=Math.random()*W*0.8+W*0.1;const y=Math.random()*H*0.5+H*0.1;createFirework(x,y);setTimeout(autoLaunch,Math.random()*1500+800);}
autoLaunch();
animate();
</script>
</body>
</html>
