<!-- 设计说明：
创建了一个互动式的点击烟花特效，使用Canvas绘制粒子系统实现烟花效果。
点击任意位置产生彩色烟花爆炸，粒子具有物理运动特性（扩散、衰减、消失）。
采用星空夜空背景营造庆典氛围，支持连续点击且经过性能优化防止内存泄漏。
实现了多彩烟花、尾迹效果和随机尺寸，视觉效果丰富且运行流畅。
-->

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击放烟花</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0c1445, #1a237e, #0c1445);
            height: 100vh;
            width: 100vw;
            position: relative;
            cursor: pointer;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .instructions {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 390px) {
            .instructions {
                font-size: 16px;
                top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="instructions">点击任意位置放烟花</div>
    <canvas id="fireworksCanvas"></canvas>
    <div class="stars" id="starsContainer"></div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 星星装饰
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            starsContainer.innerHTML = '';

            const starCount = Math.min(200, Math.floor(window.innerWidth * window.innerHeight / 1000));

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                const size = Math.random() * 2;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;

                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;

                star.style.opacity = Math.random() * 0.8 + 0.2;

                // 闪烁效果
                if (Math.random() > 0.7) {
                    star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite alternate`;

                    // 添加CSS动画
                    const style = document.createElement('style');
                    style.textContent = `
                        @keyframes twinkle {
                            0% { opacity: ${star.style.opacity}; }
                            100% { opacity: ${parseFloat(star.style.opacity) * 0.3}; }
                        }
                    `;
                    document.head.appendChild(style);
                }

                starsContainer.appendChild(star);
            }
        }

        createStars();

        // 烟花粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10
                };
                this.alpha = 1;
                this.gravity = 0.05;
                this.decay = Math.random() * 0.03 + 0.015;
                this.useGravity = Math.random() > 0.3; // 70%的粒子受重力影响
            }

            update() {
                this.velocity.x *= 0.92; // 摩擦力
                this.velocity.y *= 0.92;

                if (this.useGravity) {
                    this.velocity.y += this.gravity;
                }

                this.x += this.velocity.x;
                this.y += this.velocity.y;

                this.alpha -= this.decay;

                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // 添加发光效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.restore();
            }
        }

        // 烟花系统
        const particles = [];

        // 生成烟花
        function createFirework(x, y) {
            const particleCount = 100;
            const colors = [
                '#FF5252', '#FF4081', '#E040FB', '#7C4DFF',
                '#536DFE', '#448AFF', '#40C4FF', '#18FFFF',
                '#64FFDA', '#69F0AE', '#B2FF59', '#EEFF41',
                '#FFFF00', '#FFD740', '#FFAB40', '#FF6E40'
            ];

            for (let i = 0; i < particleCount; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        // 处理点击事件
        canvas.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFirework(touch.clientX, touch.clientY);
        });

        // 动画循环
        function animate() {
            // 半透明覆盖层实现轨迹效果
            ctx.fillStyle = 'rgba(12, 20, 69, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];

                if (!particle.update()) {
                    particles.splice(i, 1);
                } else {
                    particle.draw();
                }
            }

            // 性能优化：限制粒子数量
            if (particles.length > 2000) {
                particles.splice(0, particles.length - 2000);
            }

            requestAnimationFrame(animate);
        }

        animate();

        // 在屏幕中心放置一个初始烟花
        setTimeout(() => {
            createFirework(canvas.width / 2, canvas.height / 2);
        }, 500);
    </script>
</body>
</html>
