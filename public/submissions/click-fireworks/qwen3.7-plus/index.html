<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Fireworks</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 1.5px;
            height: 1.5px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
        }

        .moon {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 50px;
            height: 50px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 30px #f1c40f;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="moon"></div>
    </div>

    <script>
        // 创建星空背景
        function createStars() {
            const container = document.querySelector('.container');
            const starCount = 120;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // 随机位置
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 70 + '%';

                // 随机大小和透明度
                const size = Math.random() * 1.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.opacity = Math.random() * 0.7 + 0.3;

                // 随机动画效果
                if (Math.random() > 0.6) {
                    star.style.animation = `twinkle ${2 + Math.random() * 3}s infinite alternate`;
                }

                container.appendChild(star);
            }

            // 添加闪烁动画到样式
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes twinkle {
                    0% { opacity: 0.3; }
                    100% { opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        }

        // 烟花效果
        function createFirework(x, y) {
            const container = document.querySelector('.container');
            const particleCount = 120;
            const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#e67e22', '#1abc9c', '#d35400'];

            for (let i = 0; i < particleCount; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';

                // 随机颜色
                const color = colors[Math.floor(Math.random() * colors.length)];
                firework.style.background = color;

                // 初始位置
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';

                // 随机大小
                const size = Math.random() * 3 + 1;
                firework.style.width = size + 'px';
                firework.style.height = size + 'px';

                // 随机运动参数
                const angle = Math.random() * Math.PI * 2;
                const velocity = 2 + Math.random() * 3;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                // 随机生命周期
                const life = 1.5 + Math.random() * 1.5;

                container.appendChild(firework);

                // 动画函数
                animateParticle(firework, vx, vy, life, x, y);
            }
        }

        // 粒子动画
        function animateParticle(particle, vx, vy, life, startX, startY) {
            let currentLife = 0;
            const gravity = 0.05;
            const friction = 0.96;
            let posX = startX;
            let posY = startY;

            const animationFrame = () => {
                currentLife += 0.02;

                if (currentLife > life) {
                    // 生命周期结束，移除元素
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                    return;
                }

                // 更新位置
                posX += vx;
                posY += vy;

                // 应用重力
                vy += gravity;

                // 应用摩擦力
                vx *= friction;
                vy *= friction;

                // 更新样式
                particle.style.left = posX + 'px';
                particle.style.top = posY + 'px';

                // 渐隐效果
                const opacity = 1 - (currentLife / life);
                particle.style.opacity = opacity;

                // 添加光晕效果
                particle.style.boxShadow = `0 0 ${8 * opacity}px ${particle.style.background}`;

                requestAnimationFrame(animationFrame);
            };

            animationFrame();
        }

        // 点击事件监听
        document.body.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        // 触摸事件支持
        document.body.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFirework(touch.clientX, touch.clientY);
        });

        // 初始化
        createStars();
    </script>
</body>
</html>
