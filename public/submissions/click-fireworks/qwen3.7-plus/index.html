<!-- 设计说明：
     创建了一个点击放烟花效果，点击任意位置触发烟花爆炸，
     包含粒子扩散、衰减、消失过程，支持连续点击，整体具有夜空氛围 -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击放烟花</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            cursor: pointer;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .instructions {
            position: absolute;
            top: 20px;
            color: white;
            text-align: center;
            width: 100%;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }

        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
        }

        .moon {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 60px;
            height: 60px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 30px #f1c40f;
            opacity: 0.8;
        }

        .mountain {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="instructions">点击任意位置放烟花！</div>
        <div class="moon"></div>
        <!-- Stars and fireworks will be generated by JavaScript -->
    </div>

    <script>
        // 创建星空背景
        function createStars() {
            const container = document.querySelector('.container');
            const starCount = 150;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // 随机位置
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';

                // 随机大小和透明度
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.opacity = Math.random() * 0.7 + 0.3;

                // 随机动画效果
                if (Math.random() > 0.7) {
                    star.style.animation = `twinkle ${2 + Math.random() * 3}s infinite alternate`;
                }

                container.appendChild(star);
            }

            // 添加闪烁动画到样式
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes twinkle {
                    0% { opacity: 0.3; }
                    100% { opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        }

        // 烟花效果
        function createFirework(x, y) {
            const container = document.querySelector('.container');
            const particleCount = 100;
            const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#e67e22', '#1abc9c'];

            for (let i = 0; i < particleCount; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';

                // 随机颜色
                const color = colors[Math.floor(Math.random() * colors.length)];
                firework.style.background = color;

                // 初始位置
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';

                // 随机大小
                const size = Math.random() * 4 + 1;
                firework.style.width = size + 'px';
                firework.style.height = size + 'px';

                // 随机运动参数
                const angle = Math.random() * Math.PI * 2;
                const velocity = 2 + Math.random() * 3;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                // 随机生命周期
                const life = 1 + Math.random() * 2;

                container.appendChild(firework);

                // 动画函数
                animateParticle(firework, vx, vy, life, x, y);
            }
        }

        // 粒子动画
        function animateParticle(particle, vx, vy, life, startX, startY) {
            let currentLife = 0;
            const gravity = 0.05;
            const friction = 0.95;
            let posX = startX;
            let posY = startY;

            const animationFrame = () => {
                currentLife += 0.02;

                if (currentLife > life) {
                    // 生命周期结束，移除元素
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                    return;
                }

                // 更新位置
                posX += vx;
                posY += vy;

                // 应用重力
                vy += gravity;

                // 应用摩擦力
                vx *= friction;
                vy *= friction;

                // 更新样式
                particle.style.left = posX + 'px';
                particle.style.top = posY + 'px';

                // 渐隐效果
                const opacity = 1 - (currentLife / life);
                particle.style.opacity = opacity;

                // 随机火花效果
                if (Math.random() > 0.7) {
                    particle.style.boxShadow = `0 0 ${5 * opacity}px ${particle.style.background}`;
                }

                requestAnimationFrame(animationFrame);
            };

            animationFrame();
        }

        // 点击事件监听
        document.body.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        // 触摸事件支持
        document.body.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFirework(touch.clientX, touch.clientY);
        });

        // 初始化
        createStars();

        // 随机添加一些远山
        function createMountains() {
            const container = document.querySelector('.container');
            const mountainCount = 5;

            for (let i = 0; i < mountainCount; i++) {
                const mountain = document.createElement('div');
                mountain.className = 'mountain';

                // 随机位置和大小
                mountain.style.left = (i * 20) + 10 + '%';
                mountain.style.borderBottomWidth = (80 + Math.random() * 70) + 'px';
                mountain.style.borderLeftWidth = (30 + Math.random() * 40) + 'px';
                mountain.style.borderRightWidth = (30 + Math.random() * 40) + 'px';
                mountain.style.borderBottomColor = `#${Math.floor(Math.random() * 100 + 100).toString(16)}1${Math.floor(Math.random() * 100).toString(16)}`;

                container.appendChild(mountain);
            }
        }

        createMountains();

        // 添加一些随机飘过的云朵
        function createClouds() {
            const container = document.querySelector('.container');
            const cloudCount = 3;

            for (let i = 0; i < cloudCount; i++) {
                const cloud = document.createElement('div');
                cloud.style.position = 'absolute';
                cloud.style.top = (20 + Math.random() * 40) + '%';
                cloud.style.left = '-10%';
                cloud.style.width = (60 + Math.random() * 100) + 'px';
                cloud.style.height = '30px';
                cloud.style.background = 'rgba(255, 255, 255, 0.2)';
                cloud.style.borderRadius = '50%';
                cloud.style.filter = 'blur(15px)';

                container.appendChild(cloud);

                // 动画
                cloud.animate([
                    { left: '-10%' },
                    { left: '110%' }
                ], {
                    duration: 30000 + Math.random() * 50000,
                    iterations: Infinity
                });
            }
        }

        createClouds();
    </script>
</body>
</html>
