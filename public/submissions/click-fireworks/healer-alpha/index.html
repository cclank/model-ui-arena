<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healer Fireworks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:linear-gradient(to bottom,#0c0c1d,#1a1a3e);min-height:100vh;cursor:crossstar;font-family:sans-serif}
canvas{display:block}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:.85rem;pointer-events:none;letter-spacing:2px}
.counter{position:fixed;top:16px;right:20px;color:rgba(255,255,255,.25);font-size:.75rem}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">✨ 点击任意位置放烟花 ✨</div>
<div class="counter" id="counter">💥 0</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const particles=[];let count=0;
const palette=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff6348','#7bed9f'];
class Particle{
  constructor(x,y,color,vx,vy,life,size){
    this.x=x;this.y=y;this.color=color;this.vx=vx;this.vy=vy;
    this.life=this.maxLife=life;this.size=size||2;this.gravity=.04;this.friction=.98}
  update(){this.vx*=this.friction;this.vy*=this.friction;this.vy+=this.gravity;
    this.x+=this.vx;this.y+=this.vy;this.life--}
  draw(){const a=this.life/this.maxLife;ctx.globalAlpha=a;ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*a,0,Math.PI*2);ctx.fill()}
}
function explode(x,y){
  const color=palette[Math.random()*palette.length|0],n=80+Math.random()*40|0;
  for(let i=0;i<n;i++){const angle=Math.random()*Math.PI*2,speed=1+Math.random()*5;
    particles.push(new Particle(x,y,color,Math.cos(angle)*speed,Math.sin(angle)*speed,
    40+Math.random()*40|0,1.5+Math.random()*2))}
  count++;document.getElementById('counter').textContent='💥 '+count}
canvas.addEventListener('click',e=>explode(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();
  for(const t of e.changedTouches)explode(t.clientX,t.clientY)},{passive:false});
function loop(){ctx.globalAlpha=.15;ctx.fillStyle='#0c0c1d';ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;for(let i=particles.length-1;i>=0;i--){
    particles[i].update();particles[i].draw();if(particles[i].life<=0)particles.splice(i,1)}
  requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
