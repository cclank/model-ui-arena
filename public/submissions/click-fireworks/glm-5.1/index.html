<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Fireworks - GLM-5.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;cursor:crosshair;font-family:sans-serif}
canvas{display:block}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:13px;pointer-events:none;letter-spacing:1px}
.star{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.8}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">点击任意位置放烟花 ✨</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();
window.onresize=resize;
// Stars
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';
s.style.left=Math.random()*100+'%';s.style.top=Math.random()*80+'%';
s.style.animationDelay=Math.random()*3+'s';s.style.animationDuration=(2+Math.random()*3)+'s';
document.body.appendChild(s)}
const palettes=[
['#ff6b6b','#ee5a24','#f9ca24','#ff9ff3'],
['#48dbfb','#0abde3','#a29bfe','#6c5ce7'],
['#00d2d3','#01a3a4','#55efc4','#00b894'],
['#fd79a8','#e84393','#fab1a0','#ff7675'],
['#ffeaa7','#fdcb6e','#f6e58d','#f9ca24'],
['#74b9ff','#0984e3','#a29bfe','#6c5ce7']
];
class Particle{
constructor(x,y,color,vx,vy,size,life){
this.x=x;this.y=y;this.color=color;this.vx=vx;this.vy=vy;
this.size=size;this.life=life;this.maxLife=life;this.trail=[]}
update(){
this.trail.push({x:this.x,y:this.y,alpha:this.life/this.maxLife});
if(this.trail.length>6)this.trail.shift();
this.x+=this.vx;this.y+=this.vy;this.vy+=0.06;
this.vx*=0.985;this.vy*=0.985;this.life--}
draw(){
const alpha=this.life/this.maxLife;
// Trail
for(let i=0;i<this.trail.length;i++){
const t=this.trail[i];const ta=(i/this.trail.length)*alpha*0.4;
ctx.beginPath();ctx.arc(t.x,t.y,this.size*(i/this.trail.length),0,Math.PI*2);
ctx.fillStyle=this.color.replace(')',`,${ta})`).replace('rgb','rgba');ctx.fill()}
// Main
ctx.beginPath();ctx.arc(this.x,this.y,this.size*alpha,0,Math.PI*2);
ctx.fillStyle=this.color.replace(')',`,${alpha})`).replace('rgb','rgba');ctx.fill();
// Glow
if(alpha>.5){ctx.beginPath();ctx.arc(this.x,this.y,this.size*2*alpha,0,Math.PI*2);
ctx.fillStyle=this.color.replace(')',`,${alpha*0.15})`).replace('rgb','rgba');ctx.fill()}}
dead(){return this.life<=0}}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${r},${g},${b})`}
let particles=[];
function createFirework(x,y){
const pal=palettes[Math.floor(Math.random()*palettes.length)];
const count=50+Math.floor(Math.random()*40);
const radius=2+Math.random()*3;
for(let i=0;i<count;i++){
const angle=Math.random()*Math.PI*2;const speed=Math.random()*radius+1;
const color=hexToRgb(pal[Math.floor(Math.random()*pal.length)]);
const vx=Math.cos(angle)*speed;const vy=Math.sin(angle)*speed-1;
const size=Math.random()*2.5+1;const life=50+Math.floor(Math.random()*40);
particles.push(new Particle(x,y,color,vx,vy,size,life))}
// Sparkle center
for(let i=0;i<8;i++){const angle=Math.random()*Math.PI*2;const speed=Math.random()*.5;
particles.push(new Particle(x,y,'rgb(255,255,255)',Math.cos(angle)*speed,Math.sin(angle)*speed,1,20))}}
canvas.addEventListener('click',e=>{createFirework(e.clientX,e.clientY)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];createFirework(t.clientX,t.clientY)},{passive:false});
// Auto demo firework
setTimeout(()=>{createFirework(W/2,H*0.35)},800);
function animate(){
ctx.fillStyle='rgba(10,10,26,0.15)';ctx.fillRect(0,0,W,H);
particles.forEach(p=>{p.update();p.draw()});
particles=particles.filter(p=>!p.dead());
requestAnimationFrame(animate)}
animate();
</script>
</body>
</html>
