<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fireworks</title><style>html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 30%,#13214b,#05070e 60%,#020308);color:#fff;font-family:system-ui} .hint{position:fixed;left:16px;top:14px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#a8b7ff;opacity:.9;z-index:2}canvas{display:block;width:100vw;height:100vh}.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at var(--x) var(--y),rgba(255,255,255,.12),transparent 18%);mix-blend-mode:screen}</style></head><body><div class=hint>Tap anywhere for fireworks</div><div class=glow id=g></div><canvas id=c></canvas><script>const c=document.getElementById('c'),x=c.getContext('2d'),g=document.getElementById('g'),dpr=devicePixelRatio||1;let W,H,p=[];const R=()=>{W=c.width=innerWidth*dpr;H=c.height=innerHeight*dpr};addEventListener('resize',R);R();const rand=(a,b)=>a+Math.random()*(b-a);function burst(X,Y){for(let i=0,n=60+Math.random()*70;i<n;i++){const a=Math.random()*Math.PI*2,v=rand(1.5,5.5);p.push({x:X*dpr,y:Y*dpr,vx:Math.cos(a)*v,vy:Math.sin(a)*v,s:rand(1.4,5),life:1,col:`hsl(${rand(0,360)},100%,65%)`,trail:[]})}}addEventListener('pointerdown',e=>{g.style.setProperty('--x',e.clientX+'px');g.style.setProperty('--y',e.clientY+'px');burst(e.clientX,e.clientY)});function loop(){x.fillStyle='rgba(5,7,14,.18)';x.fillRect(0,0,W,H);for(let i=p.length-1;i>=0;i--){const o=p[i];o.trail.push([o.x,o.y]);if(o.trail.length>8)o.trail.shift();o.vy+=.03*dpr;o.x+=o.vx*dpr;o.y+=o.vy*dpr;o.vx*=.988;o.vy*=.988;o.life-=.009;x.strokeStyle=o.col.replace('65%','45%');x.globalAlpha=.25*o.life;x.beginPath();o.trail.forEach((t,j)=>j?x.lineTo(t[0],t[1]):x.moveTo(t[0],t[1]));x.stroke();x.globalAlpha=o.life;x.fillStyle=o.col;x.beginPath();x.arc(o.x,o.y,o.s,0,Math.PI*2);x.fill();if(o.life<=0||o.y>H+40||o.x<-40||o.x>W+40)p.splice(i,1)}x.globalAlpha=1;requestAnimationFrame(loop)}burst(innerWidth/2,innerHeight/2);loop()</script></body></html>
