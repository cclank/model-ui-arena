<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: radial-gradient(ellipse at bottom, #0f172a 0%, #020617 80%); font-family: system-ui, sans-serif; }
.hint { position: absolute; top: 18px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.55); font-size: .95rem; pointer-events: none; }
canvas { display: block; }
</style>
</head>
<body>
<div class="hint">Tap anywhere for fireworks</div>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c'), x = c.getContext('2d');
let w, h; const set = () => { w = c.width = innerWidth; h = c.height = innerHeight; }; set(); addEventListener('resize', set);
const rand = (a,b) => Math.random()*(b-a)+a;
const pal = ['#f43f5e','#f59e0b','#22d3ee','#a78bfa','#34d399','#fb7185','#fde047'];
let particles = [];
class P {
  constructor(px,py, color) {
    const ang = rand(0, Math.PI*2), sp = rand(1.5, 6.5);
    this.px = px; this.py = py; this.vx = Math.cos(ang)*sp; this.vy = Math.sin(ang)*sp;
    this.life = rand(40, 80); this.max = this.life; this.color = color;
    this.size = rand(1.5, 3.2); this.decay = rand(.96, .985);
  }
  update() {
    this.vx *= this.decay; this.vy *= this.decay; this.vy += .08;
    this.px += this.vx; this.py += this.vy; this.life--;
  }
  draw() {
    const a = this.life / this.max;
    x.globalAlpha = a; x.fillStyle = this.color;
    x.beginPath(); x.arc(this.px, this.py, this.size * a, 0, Math.PI*2); x.fill();
  }
}
function burst(px, py) {
  const color = pal[Math.floor(Math.random()*pal.length)];
  for (let i = 0; i < 36; i++) particles.push(new P(px, py, color));
  for (let i = 0; i < 14; i++) particles.push(new P(px, py, '#fff'));
}
addEventListener('pointerdown', e => burst(e.clientX, e.clientY));
function auto() { if (Math.random() < .03) burst(rand(w*.2,w*.8), rand(h*.2,h*.6)); }
function loop() {
  x.fillStyle = 'rgba(2,6,23,.22)'; x.fillRect(0,0,w,h);
  auto();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.update(); p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }
  x.globalAlpha = 1;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
