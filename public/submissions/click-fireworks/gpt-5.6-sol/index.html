<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Firework Nocturne</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02050f;color:#f7f3e8;font-family:ui-sans-serif,system-ui,sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}.copy{position:fixed;left:clamp(22px,5vw,70px);top:clamp(24px,7vh,70px);pointer-events:none;mix-blend-mode:screen}.kicker{font:700 10px ui-monospace,monospace;letter-spacing:.26em;color:#72e8ff}.copy h1{font-size:clamp(34px,5.2vw,68px);font-weight:250;letter-spacing:.02em;line-height:.95;margin:13px 0}.copy p{max-width:330px;color:#92a8bf;font-size:11px;line-height:1.7;letter-spacing:.05em}.telemetry{position:fixed;left:clamp(22px,5vw,70px);bottom:22px;color:#536c84;font:9px ui-monospace,monospace;letter-spacing:.17em;pointer-events:none}.telemetry i{display:inline-block;width:28px;height:1px;background:#50defa;vertical-align:middle;margin-right:10px;box-shadow:0 0 8px #50defa}.counter{position:fixed;right:24px;bottom:20px;text-align:right;pointer-events:none}.counter b{font:300 38px ui-monospace,monospace;color:#fff6dd;text-shadow:0 0 20px #ffc95d}.counter span{display:block;color:#62768c;font:9px ui-monospace,monospace;letter-spacing:.22em}.vignette{position:fixed;inset:0;box-shadow:inset 0 0 150px #0009;pointer-events:none}@media(max-width:520px){.copy{left:20px;top:28px}.copy h1{font-size:34px}.copy p{max-width:235px}.telemetry{left:20px;font-size:8px}.counter{right:16px}}
</style></head><body><canvas id="sky" aria-label="点击任意位置燃放烟花"></canvas><div class="vignette"></div><header class="copy"><div class="kicker">NOCTURNE / LIVE SKY</div><h1>点亮这一刻</h1><p>每束光都有自己的轨迹，每次绽放都只存在一次。</p></header><div class="telemetry"><i></i>CELEBRATION SIGNAL / ACTIVE</div><div class="counter"><b id="count">00</b><span>BURSTS TONIGHT</span></div>
<script>
const c=document.querySelector('#sky'),g=c.getContext('2d'),count=document.querySelector('#count');let W,H,D,last=0,bursts=0,particles=[],waves=[],stars=[],city=[];
const palettes=[[191,100,64],[340,100,66],[43,100,62],[267,100,72],[154,90,60],[18,100,64]];
function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);stars=Array.from({length:Math.min(180,Math.floor(W*H/6500))},()=>({x:Math.random()*W,y:Math.random()*H*.86,r:.3+Math.random()*1.15,a:.18+Math.random()*.65,p:Math.random()*6.28}));city=[];let x=0;while(x<W){const w=18+Math.random()*34,h=22+Math.random()*75;city.push({x,w,h,lit:Math.random()});x+=w+2}}
addEventListener('resize',resize);resize();
function addParticle(x,y,a,s,hue,life,size,glitter=false){particles.push({x,y,px:x,py:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,h:hue,life,max:life,size,glitter,drag:.982+Math.random()*.009,gravity:.035+Math.random()*.025})}
function burst(x,y){bursts++;count.textContent=String(bursts).padStart(2,'0');const [hue]=palettes[Math.floor(Math.random()*palettes.length)],hue2=(hue+35+Math.random()*85)%360,ring=Math.random()>.45;waves.push({x,y,r:5,a:.85,h:hue});const main=ring?112:92;for(let i=0;i<main;i++){const a=i/main*Math.PI*2+(Math.random()-.5)*.05,s=(ring?4.3:2)+Math.random()*(ring?2.6:5);addParticle(x,y,a,s,hue+(Math.random()-.5)*18,88+Math.random()*35,1.1+Math.random()*1.7,Math.random()>.76)}for(let i=0;i<54;i++){const a=i/54*Math.PI*2,s=1.5+Math.random()*3.2;addParticle(x,y,a,s,hue2+(Math.random()-.5)*14,74+Math.random()*24,.8+Math.random()*1.2,true)}for(let i=0;i<42;i++)addParticle(x,y,Math.random()*6.28,Math.random()*2.4,hue+Math.random()*50,35+Math.random()*35,.6+Math.random(),true);if(particles.length>1200)particles.splice(0,particles.length-1200)}
function backdrop(t){g.globalCompositeOperation='source-over';g.fillStyle='rgba(2,5,15,.17)';g.fillRect(0,0,W,H);for(const s of stars){const a=s.a*(.7+.3*Math.sin(t*.0015+s.p));g.fillStyle=`rgba(190,220,255,${a})`;g.beginPath();g.arc(s.x,s.y,s.r,0,7);g.fill()}const base=H*.91;g.fillStyle='rgba(1,3,9,.92)';g.beginPath();g.moveTo(0,H);for(const b of city){g.lineTo(b.x,base-b.h);g.lineTo(b.x+b.w,base-b.h);g.lineTo(b.x+b.w,base)}g.lineTo(W,H);g.fill();for(const b of city){if(b.lit>.48){g.fillStyle='rgba(255,207,105,.15)';for(let yy=base-b.h+9;yy<base-5;yy+=12)for(let xx=b.x+5;xx<b.x+b.w-3;xx+=9)if((xx+yy)%3<2)g.fillRect(xx,yy,2,3)}}const glow=g.createLinearGradient(0,base-85,0,H);glow.addColorStop(0,'rgba(31,77,115,0)');glow.addColorStop(.45,'rgba(31,77,115,.11)');glow.addColorStop(1,'rgba(0,0,0,.6)');g.fillStyle=glow;g.fillRect(0,base-85,W,H-base+85)}
function draw(t){const dt=Math.min(2,(t-last)/16.67||1);last=t;backdrop(t);g.globalCompositeOperation='lighter';for(let i=waves.length-1;i>=0;i--){const w=waves[i];w.r+=5*dt;w.a*=.945;g.strokeStyle=`hsla(${w.h},100%,72%,${w.a})`;g.lineWidth=1.5;g.beginPath();g.arc(w.x,w.y,w.r,0,7);g.stroke();if(w.a<.025)waves.splice(i,1)}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.px=p.x;p.py=p.y;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=p.drag;p.vy=p.vy*p.drag+p.gravity*dt;p.life-=dt;const a=Math.max(0,p.life/p.max),tw=p.glitter?(.35+.65*Math.abs(Math.sin(t*.018+p.x))):1;g.strokeStyle=`hsla(${p.h},100%,${66+p.glitter*16}%,${a*tw})`;g.lineWidth=p.size*a+.35;g.beginPath();g.moveTo(p.px-p.vx*2.2,p.py-p.vy*2.2);g.lineTo(p.x,p.y);g.stroke();if(p.glitter&&Math.random()<.16){g.fillStyle=`hsla(${p.h+20},100%,90%,${a})`;g.fillRect(p.x+(Math.random()-.5)*7,p.y+(Math.random()-.5)*7,1.2,1.2)}if(p.life<=0||p.y>H+50)particles.splice(i,1)}requestAnimationFrame(draw)}
addEventListener('pointerdown',e=>burst(e.clientX,e.clientY));setTimeout(()=>burst(W*.72,H*.36),120);setTimeout(()=>burst(W*.42,H*.48),720);setTimeout(()=>burst(W*.82,H*.56),1320);requestAnimationFrame(draw);
</script></body></html>
