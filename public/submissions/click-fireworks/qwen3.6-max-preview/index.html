<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fireworks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;cursor:crosshair}
canvas{display:block}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.3);font-size:.8rem;font-family:system-ui;
  pointer-events:none;animation:fade 3s ease-in-out infinite}
@keyframes fade{0%,100%{opacity:.3}50%{opacity:.6}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">点击屏幕放烟花 ✨</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const particles=[];
const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6','#ffa07a','#87ceeb','#dda0dd','#ff4500','#7fff00'];
class Particle{
  constructor(x,y,color,vel,size,life,trail){
    this.x=x;this.y=y;this.color=color;this.vx=vel.x;this.vy=vel.y;
    this.size=size;this.life=life;this.maxLife=life;this.trail=trail||false;
    this.history=[];this.dead=false;
  }
  update(){
    if(this.trail){this.history.push({x:this.x,y:this.y,a:this.life/this.maxLife});
      if(this.history.length>8)this.history.shift()}
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=0.03;this.vx*=0.99;this.vy*=0.99;
    this.life--;
    if(this.life<=0)this.dead=true;
  }
  draw(){
    const alpha=this.life/this.maxLife;
    if(this.trail&&this.history.length>1){
      ctx.beginPath();ctx.moveTo(this.history[0].x,this.history[0].y);
      for(let i=1;i<this.history.length;i++){
        ctx.lineTo(this.history[i].x,this.history[i].y);
      }
      ctx.strokeStyle=this.color.replace('1)',alpha*0.3+')');
      ctx.lineWidth=this.size*0.5;ctx.stroke();
    }
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*alpha,0,Math.PI*2);
    ctx.fillStyle=this.color.replace('1)',alpha+')');ctx.fill();
    if(alpha>0.5){
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*alpha*2,0,Math.PI*2);
      ctx.fillStyle=this.color.replace('1)',alpha*0.15+')');ctx.fill();
    }
  }
}
function launch(x,y){
  const color=colors[Math.floor(Math.random()*colors.length)].replace(')',',1)');
  const count=60+Math.floor(Math.random()*40);
  const speed=2+Math.random()*3;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const v=Math.random()*speed;
    particles.push(new Particle(x,y,color,{x:Math.cos(angle)*v,y:Math.sin(angle)*v},
      1.5+Math.random()*2,40+Math.random()*40,true));
  }
  // sparkle center
  for(let i=0;i<15;i++){
    const angle=Math.random()*Math.PI*2;
    const v=Math.random()*1;
    particles.push(new Particle(x,y,'rgba(255,255,255,1)',{x:Math.cos(angle)*v,y:Math.sin(angle)*v},
      1,20+Math.random()*20,false));
  }
}
// rocket trail
function rocket(tx,ty){
  const sx=tx+(Math.random()-0.5)*40;
  const sy=H;
  const dx=tx-sx,dy=ty-sy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const steps=dist/4;
  for(let i=0;i<steps;i++){
    const t=i/steps;
    const px=sx+dx*t+(Math.random()-0.5)*2;
    const py=sy+dy*t+(Math.random()-0.5)*2;
    particles.push(new Particle(px,py,'rgba(255,200,100,1)',{x:(Math.random()-.5)*.3,y:(Math.random()-.5)*.3},
      1,10+Math.random()*10,false));
  }
  setTimeout(()=>launch(tx,ty),dist/2);
}
canvas.addEventListener('click',e=>rocket(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();
  for(const t of e.touches)rocket(t.clientX,t.clientY)},{passive:false});
// auto fireworks
let autoTimer=0;
function animate(){
  ctx.fillStyle='rgba(10,10,26,0.15)';ctx.fillRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update();particles[i].draw();
    if(particles[i].dead)particles.splice(i,1);
  }
  // memory guard
  if(particles.length>3000)particles.splice(0,particles.length-2000);
  autoTimer++;
  if(autoTimer>180+Math.random()*200){
    autoTimer=0;
    rocket(Math.random()*W*0.8+W*0.1,Math.random()*H*0.5+H*0.1);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
