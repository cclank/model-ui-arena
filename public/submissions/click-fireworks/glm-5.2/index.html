<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glm-5.2 · 点击放烟花</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;cursor:crosshair}
  body{font-family:-apple-system,sans-serif;
    background:radial-gradient(ellipse at 50% 120%,#1a2456,#070a1f 60%,#03040d)}
  canvas{display:block;position:fixed;inset:0}
  .hint{position:fixed;top:24px;left:0;right:0;text-align:center;color:rgba(255,255,255,.85);
    font-size:14px;letter-spacing:2px;pointer-events:none;z-index:10;
    text-shadow:0 2px 8px rgba(0,0,0,.6);animation:fadefade 5s forwards}
  @keyframes fadefade{0%,60%{opacity:1}100%{opacity:0}}
  .count{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,.45);
    font-size:12px;pointer-events:none;z-index:10}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:1}
  .stars i{position:absolute;background:#fff;border-radius:50%;opacity:.5;animation:twinkle 3s infinite}
  @keyframes twinkle{50%{opacity:.12}}
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <canvas id="c"></canvas>
  <div class="hint">🎆 点击 / 触摸任意位置 · 放烟花</div>
  <div class="count" id="count">已绽放 0 朵</div>
<script>
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  let W,H,DPR=Math.min(devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;
    cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  resize();addEventListener('resize',resize);
  const stars=document.getElementById('stars');
  for(let i=0;i<80;i++){const s=document.createElement('i');const sz=Math.random()*2+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*70}%;animation-delay:${Math.random()*3}s`;
    stars.appendChild(s)}
  const palettes=[['#ff5e62','#ff9966','#ffd86b'],['#7af7ff','#5ec6ff','#a37bff'],['#ff6ec7','#ff99e6','#ffc6ff'],
    ['#7bff8a','#caff8a','#fff58a'],['#ffba5e','#ff7e5f','#feb47b']];
  let parts=[],rockets=[],total=0;const countEl=document.getElementById('count');
  function burst(x,y){const pal=palettes[Math.floor(Math.random()*palettes.length)];
    const n=64+Math.floor(Math.random()*28);total++;countEl.textContent='已绽放 '+total+' 朵';
    for(let i=0;i<n;i++){const a=(Math.PI*2*i)/n+Math.random()*.12;const sp=Math.random()*4.5+1.8;
      parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
        decay:.012+Math.random()*.008,color:pal[i%pal.length],r:Math.random()*1.6+1,spark:Math.random()<.25})}}
  function launchRocket(tx,ty){rockets.push({x:tx,y:H,vx:(tx-tx)*0,tx,ty,vy:-9})} // straight rise
  function loop(){
    // faster, cleaner fade so trails don't smear into a haze
    ctx.globalCompositeOperation='source-over';ctx.fillStyle='rgba(3,4,13,.28)';ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    // rockets: clean thin rising trail
    for(let i=rockets.length-1;i>=0;i--){const r=rockets[i];
      r.vy+=.08;r.y+=r.vy;
      ctx.globalAlpha=1;ctx.fillStyle='#ffe9a8';ctx.beginPath();ctx.arc(r.x,r.y,1.8,0,7);ctx.fill();
      if(r.y<=r.ty){burst(r.x,r.y);rockets.splice(i,1)}}
    // particles
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];
      p.vx*=.97;p.vy*=.97;p.vy+=.05;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
      ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
      // crisp small glow only
      ctx.globalAlpha=p.life*.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.8,0,7);ctx.fill();
      if(p.spark&&Math.random()<.3){ctx.globalAlpha=p.life*.8;ctx.fillRect(p.x-1,p.y-1,2,2)}
      if(p.life<=0||p.y>H+20)parts.splice(i,1)}
    ctx.globalAlpha=1;requestAnimationFrame(loop)}
  function fire(x,y){const ty=Math.min(y,H-30);
    rockets.push({x,y:H,vx:0,tx:x,ty:ty,vy:-(7+Math.random()*3)})}
  addEventListener('pointerdown',e=>{fire(e.clientX,e.clientY)});
  // welcome volley so it is lively on load
  setTimeout(()=>{fire(W*.5,H*.35)},500);
  setTimeout(()=>{fire(W*.3,H*.45)},1100);
  setTimeout(()=>{fire(W*.7,H*.4)},1600);
  loop();
</script>
</body>
</html>
