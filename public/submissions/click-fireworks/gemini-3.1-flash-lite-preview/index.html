<!DOCTYPE html>
<html style="height:100%"><body onclick="pop(event)" style="height:100%; margin:0; overflow:hidden; background:#000">
<script>
function pop(e) {
    const p = document.createElement('div');
    p.style = "position:absolute; left:"+e.clientX+"px; top:"+e.clientY+"px; width:10px; height:10px; background:yellow; border-radius:50%; transition:1s";
    document.body.appendChild(p);
    setTimeout(() => p.style.transform = "scale(5); opacity:0", 10);
}
</script>
</body></html>
