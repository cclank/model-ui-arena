<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qwen Fireworks</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0010;overflow:hidden;cursor:crosshair;user-select:none}
canvas{display:block;width:100vw;height:100vh}
.hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.25);font-size:18px;font-weight:300;letter-spacing:2px;pointer-events:none;font-family:'PingFang SC','Microsoft YaHei',sans-serif;transition:opacity 1s}
.counter{position:fixed;top:20px;right:24px;color:rgba(255,255,255,.3);font-size:14px;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">✦ 点击任意位置绽放烟花 ✦</div>
<div class="counter" id="ctr">0 发</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');let W,H,count=0;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
const particles=[];const palettes=[
['#ff6b6b','#ff8e8e','#ffb8b8'],['#6a5acd','#8b72cf','#b8a9e8'],
['#ffd700','#ffe44d','#fff0a0'],['#00e5ff','#40f0ff','#a0f8ff'],
['#ff6ec7','#ff8eda','#ffc0e8'],['#00e676','#4caf50','#a5d6a7']];
class Particle{constructor(x,y,color,vx,vy){this.x=x;this.y=y;this.color=color;
this.vx=vx;this.vy=vy;this.alpha=1;this.decay=.012+Math.random()*.015;this.size=1.5+Math.random()*2;this.trail=[];
this.gravity=.03;this.friction=.98}
update(){this.trail.push({x:this.x,y:this.y,a:this.alpha});if(this.trail.length>6)this.trail.shift();
this.vx*=this.friction;this.vy*=this.friction;this.vy+=this.gravity;
this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}
draw(){ctx.save();for(let i=0;i<this.trail.length;i++){const t=this.trail[i];
ctx.globalAlpha=t.alpha*(i/this.trail.length)*.4;ctx.fillStyle=this.color;
ctx.beginPath();ctx.arc(t.x,t.y,this.size*(i/this.trail.length),0,Math.PI*2);ctx.fill()}
ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}}
function boom(x,y){count++;document.getElementById('ctr').textContent=count+' 发';
document.getElementById('hint').style.opacity='0';
const pal=palettes[Math.floor(Math.random()*palettes.length)];
const n=60+Math.floor(Math.random()*40);
for(let i=0;i<n;i++){const angle=Math.random()*Math.PI*2,speed=1.5+Math.random()*4.5;
const col=pal[Math.floor(Math.random()*pal.length)];
particles.push(new Particle(x,y,col,Math.cos(angle)*speed,Math.sin(angle)*speed))}
// inner ring for extra flair
for(let i=0;i<20;i++){const angle=Math.random()*Math.PI*2,speed=.5+Math.random()*1.5;
const col=pal[Math.floor(Math.random()*pal.length)];
particles.push(new Particle(x,y,col,Math.cos(angle)*speed,Math.sin(angle)*speed))}}
c.addEventListener('click',e=>boom(e.clientX,e.clientY));
c.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];boom(t.clientX,t.clientY)},{passive:false});
// stars background
const stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*2e3,y:Math.random()*1e3,r:Math.random()*1.2+.3,b:Math.random()*360});
function drawStars(){stars.forEach(s=>{s.b+=Math.random()*.02-.01;const a=.3+Math.sin(s.b)*.25;
ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}
function animate(){ctx.fillStyle='rgba(10,0,16,.12)';ctx.fillRect(0,0,W,H);
drawStars();for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();
if(particles[i].alpha<=0)particles.splice(i,1)}requestAnimationFrame(animate)}
animate();
</script>
</body>
</html>
