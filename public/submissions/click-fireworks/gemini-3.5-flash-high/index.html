<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Fireworks</title>
  <style>
    * { margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #020617; cursor: crosshair; }
    canvas { display: block; width: 100%; height: 100%; }
    .hint {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5); font-family: system-ui, sans-serif;
      font-size: 0.9rem; pointer-events: none; text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="hint">点击屏幕任意地方绽放烟花</div>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.gravity = 0.08;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.01;
        this.radius = Math.random() * 2 + 1;
      }
      update() {
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.alpha -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function createFirework(x, y) {
      const colors = ['#ff3b30', '#34c759', '#007aff', '#ff9500', '#af52de', '#ffcc00', '#5ac8fa'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const count = Math.floor(Math.random() * 60) + 40;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    window.addEventListener('click', (e) => {
      createFirework(e.clientX, e.clientY);
    });

    window.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) {
        createFirework(e.touches[0].clientX, e.touches[0].clientY);
      }
    });

    function animate() {
      ctx.fillStyle = 'rgba(2, 6, 23, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles = particles.filter(p => p.alpha > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
    
    setTimeout(() => {
      createFirework(canvas.width * 0.3, canvas.height * 0.4);
      setTimeout(() => createFirework(canvas.width * 0.7, canvas.height * 0.3), 500);
    }, 500);
  </script>
</body>
</html>
