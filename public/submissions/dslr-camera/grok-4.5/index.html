<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DSLR Camera · grok-4.5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:radial-gradient(ellipse at 50% 40%,#2a2f3a 0%,#12151c 55%,#0a0c10 100%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;
  color:#cbd5e1
}
.stage{
  width:min(390px,100%);position:relative;
  display:flex;flex-direction:column;align-items:center;gap:18px
}
svg{width:100%;height:auto;filter:drop-shadow(0 28px 40px rgba(0,0,0,.55));display:block}
.note{font-size:.72rem;opacity:.55;text-align:center;letter-spacing:.04em}
.hint{font-size:.7rem;opacity:.4;text-align:center}
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="3/4视角单反相机手绘">
  <defs>
    <!-- Materials -->
    <linearGradient id="bodyMatte" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3f4a"/><stop offset="40%" stop-color="#2a2e38"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <linearGradient id="bodySide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1d24"/><stop offset="100%" stop-color="#2c313c"/>
    </linearGradient>
    <linearGradient id="bodyTop" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2a2e38"/><stop offset="100%" stop-color="#4a5160"/>
    </linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#151820"/><stop offset="50%" stop-color="#252a34"/><stop offset="100%" stop-color="#1a1e28"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/><stop offset="30%" stop-color="#9ca3af"/>
      <stop offset="60%" stop-color="#6b7280"/><stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="metalRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5e7eb"/><stop offset="40%" stop-color="#6b7280"/>
      <stop offset="70%" stop-color="#374151"/><stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="redRing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f1d1d"/><stop offset="50%" stop-color="#ef4444"/><stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <radialGradient id="glass" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#dbeafe"/><stop offset="25%" stop-color="#3b82f6" stop-opacity=".55"/>
      <stop offset="55%" stop-color="#1e3a5f"/><stop offset="80%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="glassHL" cx="32%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".75"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dial" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4b5563"/><stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="4" dy="14" stdDeviation="10" flood-color="#000" flood-opacity=".5"/></filter>
    <filter id="ao"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Table contact shadow -->
  <ellipse cx="200" cy="292" rx="130" ry="14" fill="#000" opacity=".4" filter="url(#ao)"/>

  <!-- ===== Camera group (3/4 view) ===== -->
  <g id="camera" filter="url(#shadow)">

    <!-- Body side face (depth) -->
    <path id="body-side" d="M268 100 L310 88 L318 185 L276 200 Z" fill="url(#bodySide)"/>
    <path d="M268 100 L310 88 L300 82 L258 94 Z" fill="#3d4452" opacity=".9"/>

    <!-- Body front face -->
    <path id="body-front" d="M90 105 L268 100 L276 200 L95 208 Z" fill="url(#bodyMatte)"/>
    <!-- top face -->
    <path id="body-top" d="M90 105 L120 72 L300 62 L310 88 L268 100 L90 105 Z" fill="url(#bodyTop)"/>

    <!-- Bottom bevel / AO -->
    <path d="M95 200 L276 192 L276 200 L95 208 Z" fill="#0d0f14" opacity=".55"/>

    <!-- Grip (right hand side of front - left on screen in 3/4) -->
    <g id="grip">
      <path d="M95 115 L135 112 L140 195 L98 200 Z" fill="url(#grip)"/>
      <!-- grip texture ridges -->
      <g stroke="#0a0c10" stroke-width="1.2" opacity=".55">
        <line x1="105" y1="125" x2="108" y2="188"/>
        <line x1="112" y1="124" x2="115" y2="187"/>
        <line x1="119" y1="123" x2="122" y2="186"/>
        <line x1="126" y1="122" x2="129" y2="185"/>
      </g>
      <path d="M98 118 L132 115" stroke="#4b5563" stroke-width=".8" opacity=".4"/>
    </g>

    <!-- Prism / viewfinder hump (军舰头) -->
    <g id="prism">
      <path d="M155 72 L200 48 L245 68 L240 78 L160 82 Z" fill="#353b48"/>
      <path d="M200 48 L245 68 L255 62 L210 44 Z" fill="#4b5563"/>
      <path d="M155 72 L200 48 L210 44 L165 68 Z" fill="#2a2f3a"/>
      <!-- eyepiece rear suggestion -->
      <rect x="188" y="58" width="22" height="10" rx="2" fill="#1a1d24" transform="skewX(-8)"/>
      <rect x="192" y="60" width="14" height="6" rx="1" fill="#0ea5e9" opacity=".25"/>
    </g>

    <!-- Hot shoe -->
    <g id="hotshoe" transform="translate(188,42)">
      <rect x="0" y="0" width="36" height="8" rx="1" fill="#4b5563"/>
      <rect x="4" y="2" width="28" height="4" rx=".5" fill="#1f2937"/>
      <rect x="8" y="-3" width="20" height="4" rx=".5" fill="#6b7280"/>
      <rect x="12" y="-5" width="12" height="3" fill="#9ca3af"/>
    </g>

    <!-- Mode dial -->
    <g id="dial" transform="translate(250,58)" style="cursor:pointer">
      <ellipse cx="0" cy="4" rx="18" ry="7" fill="#111827" opacity=".5"/>
      <ellipse cx="0" cy="0" rx="17" ry="7" fill="url(#dial)" stroke="#6b7280" stroke-width="1"/>
      <ellipse cx="0" cy="-2" rx="14" ry="5.5" fill="#374151"/>
      <!-- tick marks -->
      <g stroke="#d1d5db" stroke-width="1" id="dialTicks">
        <line x1="0" y1="-7" x2="0" y2="-4"/>
        <line x1="5" y1="-6" x2="4" y2="-3.5" transform="rotate(30)"/>
        <line x1="5" y1="-6" x2="4" y2="-3.5" transform="rotate(60)"/>
        <line x1="5" y1="-6" x2="4" y2="-3.5" transform="rotate(90)"/>
        <line x1="5" y1="-6" x2="4" y2="-3.5" transform="rotate(120)"/>
        <line x1="5" y1="-6" x2="4" y2="-3.5" transform="rotate(150)"/>
        <line x1="0" y1="4" x2="0" y2="6.5"/>
      </g>
      <circle cx="0" cy="-1" r="3" fill="#9ca3af"/>
      <text x="0" y="1" text-anchor="middle" fill="#fbbf24" font-size="5" font-family="monospace">M</text>
    </g>

    <!-- Shutter button -->
    <g id="shutter" transform="translate(220,70)">
      <ellipse cx="0" cy="2" rx="9" ry="4" fill="#0f172a" opacity=".5"/>
      <ellipse cx="0" cy="0" rx="8" ry="3.5" fill="url(#metal)"/>
      <ellipse cx="0" cy="-1" rx="5" ry="2" fill="#e5e7eb"/>
      <ellipse cx="-1" cy="-1.5" rx="2" ry="1" fill="#fff" opacity=".5"/>
    </g>

    <!-- Brand plate (fictional) -->
    <g id="brand" transform="translate(155,145)">
      <text x="0" y="0" fill="#9ca3af" font-size="11" font-family="ui-sans-serif,system-ui,sans-serif"
        font-weight="600" letter-spacing="2.5">AURORA</text>
      <text x="0" y="12" fill="#6b7280" font-size="7" font-family="ui-sans-serif,system-ui,sans-serif"
        letter-spacing="1.5">X-7 PRO</text>
    </g>

    <!-- Body seam lines -->
    <path d="M140 108 L255 103" stroke="#111827" stroke-width="1" opacity=".4"/>
    <path d="M145 190 L260 183" stroke="#111827" stroke-width=".8" opacity=".3"/>

    <!-- ===== Lens barrel (3/4 → ellipse) ===== -->
    <g id="lens" transform="translate(175,145)">
      <!-- barrel depth cylinders as stacked ellipses / polygons -->
      <!-- rear mount ring into body -->
      <ellipse cx="0" cy="8" rx="38" ry="34" fill="#1a1d24"/>
      <ellipse cx="0" cy="6" rx="36" ry="32" fill="#2a2e38"/>

      <!-- zoom ring -->
      <g id="zoom-ring">
        <ellipse cx="18" cy="4" rx="36" ry="32" fill="#252a34"/>
        <path d="M-16 -24 C5 -30,35 -26,50 -8 L48 18 C32 34,2 36,-18 28 Z" fill="#1f2430" opacity=".9"/>
        <!-- knurl texture -->
        <g stroke="#0a0c10" stroke-width="1" opacity=".5">
          <path d="M-10 -18 L-6 26"/><path d="M-2 -22 L2 28"/><path d="M6 -24 L10 28"/>
          <path d="M14 -24 L18 28"/><path d="M22 -22 L26 26"/><path d="M30 -18 L34 22"/>
          <path d="M38 -12 L42 16"/>
        </g>
        <text x="12" y="8" fill="#6b7280" font-size="6" font-family="monospace" transform="rotate(-8)">24-70</text>
      </g>

      <!-- red accent ring -->
      <ellipse cx="32" cy="2" rx="34" ry="30" fill="none" stroke="url(#redRing)" stroke-width="3.5"/>

      <!-- focus ring -->
      <g id="focus-ring">
        <ellipse cx="42" cy="0" rx="32" ry="28" fill="#2c313c"/>
        <g stroke="#111827" stroke-width="1.1" opacity=".55">
          <path d="M14 -22 L18 22"/><path d="M22 -24 L26 24"/><path d="M30 -24 L34 24"/>
          <path d="M38 -22 L42 22"/><path d="M46 -18 L50 18"/><path d="M54 -12 L58 12"/>
        </g>
        <!-- distance scale -->
        <text x="30" y="-8" fill="#94a3b8" font-size="5" font-family="monospace">∞  3  1  0.4</text>
      </g>

      <!-- metal filter thread ring -->
      <ellipse cx="55" cy="-2" rx="28" ry="24" fill="url(#metalRing)"/>
      <ellipse cx="55" cy="-2" rx="24" ry="20" fill="#1e293b"/>

      <!-- front glass elements (concentric) -->
      <ellipse cx="55" cy="-2" rx="22" ry="18.5" fill="url(#glass)"/>
      <ellipse cx="55" cy="-2" rx="16" ry="13.5" fill="none" stroke="#1e40af" stroke-width="1" opacity=".5"/>
      <ellipse cx="55" cy="-2" rx="10" ry="8.5" fill="none" stroke="#312e81" stroke-width=".8" opacity=".45"/>
      <ellipse cx="55" cy="-2" rx="4" ry="3.5" fill="#020617" opacity=".7"/>
      <!-- glass specular highlights -->
      <ellipse cx="48" cy="-8" rx="8" ry="4" fill="url(#glassHL)"/>
      <path d="M62 2 Q68 0 70 6" fill="none" stroke="#93c5fd" stroke-width="1.2" opacity=".45" stroke-linecap="round">
        <animate attributeName="opacity" values=".35;.65;.35" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <!-- secondary reflection arc -->
      <path d="M44 4 Q50 10 58 8" fill="none" stroke="#fff" stroke-width=".8" opacity=".2"/>
    </g>

    <!-- Strap eyelet -->
    <ellipse cx="100" cy="120" rx="5" ry="4" fill="none" stroke="#6b7280" stroke-width="2"/>
    <ellipse cx="272" cy="115" rx="4" ry="3.5" fill="none" stroke="#6b7280" stroke-width="1.8"/>

    <!-- AF assist lamp / front detail -->
    <circle cx="155" cy="175" r="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="155" cy="175" r="2" fill="#fbbf24" opacity=".35"/>
  </g>
</svg>
<p class="note">AURORA X-7 PRO · 纯手绘 HTML / CSS / SVG</p>
<p class="hint">点击模式转盘可旋转刻度</p>
</div>
<script>
const dial=document.getElementById('dial');
let rot=0;
if(dial){
  dial.addEventListener('click',()=>{
    rot=(rot+45)%360;
    dial.setAttribute('transform',`translate(250,58) rotate(${rot})`);
  });
}
</script>
</body>
</html>
