<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTERRA RD-9 PRO · 拟物复刻：单反相机（3/4 视角）</title>
<!--
  设计说明：影棚产品档案风格 —— 冷灰纸面 + 石墨机身 + 银盐金属 + 信号红圈，光源统一左上。
  机身、镜头、镀膜、螺纹、滚花全部由内联 SVG 几何手绘，零位图零外链；
  交互：模式转盘点击旋转 / 快门按压取景器闪光并计数 / 前组镜片高光缓慢扫过。
-->
<style>
:root{
  --paper:#EDECE8; --paper2:#DBD8D0; --pool:#F9F8F4;
  --ink:#22262B; --mut:#77746B; --line:#C6C2B7;
  --red:#B93A2E; --redD:#8E2A20;
  --mono: ui-monospace,'SF Mono',Menlo,Consolas,'Courier New',monospace;
  --disp: system-ui,'PingFang SC','Microsoft YaHei',sans-serif;
  --serif: Georgia,'Times New Roman','Songti SC',STSong,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--disp); color:var(--ink);
  background:
    radial-gradient(1100px 720px at 42% 36%, var(--pool) 0%, rgba(249,248,244,0) 62%),
    linear-gradient(168deg, #F0EFEA 0%, var(--paper) 44%, var(--paper2) 100%);
  min-height:100vh; display:flex; flex-direction:column;
  -webkit-user-select:none; user-select:none;
  overflow-x:hidden;
}
/* ── 背景层次：桌面分界 / 光晕呼吸 / 尘埃 / 颗粒 ─────────────── */
.tableline{position:fixed; left:0; right:0; top:64%; height:46%; pointer-events:none; z-index:0;
  background:linear-gradient(180deg, rgba(205,201,192,0) 0%, rgba(203,199,190,.34) 30%, rgba(193,189,180,.5) 100%);
}
.tableline::before{content:''; position:absolute; left:0; right:0; top:0; height:1px; background:rgba(120,116,106,.16)}
.glow{position:fixed; left:50%; top:44%; width:74vmin; height:58vmin; transform:translate(-50%,-50%);
  border-radius:50%; pointer-events:none; z-index:0;
  background:radial-gradient(closest-side, rgba(255,253,247,.85), rgba(255,253,247,0) 70%);
  animation:glowPulse 7.5s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.55; transform:translate(-50%,-50%) scale(1)} 50%{opacity:.85; transform:translate(-50%,-50%) scale(1.05)}}
#dust{position:fixed; inset:0; z-index:1; pointer-events:none}
.grain{position:fixed; inset:0; z-index:40; pointer-events:none; opacity:.05; mix-blend-mode:multiply}
.grain svg{display:block; width:100%; height:100%}
/* ── 页眉 ─────────────────────────────────────────────────── */
header{position:relative; z-index:5; display:flex; justify-content:space-between; align-items:baseline;
  gap:16px; padding:16px 26px 13px; border-bottom:1px solid var(--line)}
.brand{display:flex; align-items:center; gap:11px}
.brand .mark{width:9px; height:9px; background:var(--red); box-shadow:2px 2px 0 rgba(34,38,43,.18)}
.brand .name{font:700 14px/1 var(--mono); letter-spacing:.34em}
.brand .sub{font:400 10px/1.2 var(--mono); letter-spacing:.22em; color:var(--mut); border-left:1px solid var(--line); padding-left:11px}
.meta{display:flex; align-items:baseline; gap:16px; font:500 10.5px/1 var(--mono); letter-spacing:.16em; color:#5c5a52}
.meta .live{display:flex; align-items:center; gap:7px; background:rgba(34,38,43,.05); border:1px solid var(--line); padding:5px 9px}
.meta .live i{width:6px; height:6px; border-radius:50%; background:var(--red); animation:blink 2.2s ease-in-out infinite}
.meta .live b{font-weight:700; letter-spacing:.1em; transition:color .25s}
.meta .live b.flash{color:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
/* ── 舞台 ─────────────────────────────────────────────────── */
main{position:relative; z-index:5; flex:1; display:flex; align-items:center; justify-content:center;
  padding:6px 4vw 2px}
.stage{position:relative; width:min(1060px,100%); animation:rise .9s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:none}}
.stage svg{display:block; width:100%; height:auto}
.vert{position:absolute; left:-14px; top:47%; transform:translateY(-50%);
  writing-mode:vertical-rl; font:500 9.5px/1 var(--mono); letter-spacing:.42em; color:var(--mut); opacity:.85; white-space:nowrap}
/* SVG 交互态 */
#modeDial{cursor:pointer}
#modeDial:hover #dialLift{transform:translateY(-3px)}
#dialLift{transition:transform .3s ease}
#rotor{transform-box:fill-box; transform-origin:center; transition:transform .75s cubic-bezier(.3,1.35,.35,1)}
#shutterBtn{cursor:pointer}
#shutterCap{transform-box:fill-box; transition:transform .13s ease}
#shutterBtn:active #shutterCap{transform:translateY(4px)}
#lens .glint{transition:opacity .4s}
#lens:hover .glint{opacity:.22 !important}
/* 前组镜片流动扫光（约 9s 一次缓慢掠过）*/
#sweep{transform-box:fill-box; animation:sweep 9s ease-in-out infinite}
@keyframes sweep{0%,72%{transform:translate(-30px,-38px);opacity:0}82%{opacity:1}100%{transform:translate(26px,34px);opacity:0}}
/* 左肩转盘：与右肩一致的 hover 微反馈，红点索引提亮 */
#leftDial{cursor:pointer}
#leftDial #leftDot{transition:fill .3s ease}
#leftDial:hover #leftDot{fill:#E15A48}
/* ── 页脚 ─────────────────────────────────────────────────── */
footer{position:relative; z-index:5; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
  gap:12px 24px; padding:13px 26px 17px; border-top:1px solid var(--line)}
.note{font:italic 400 13px/1.5 var(--serif); color:#4c4a43; max-width:560px}
.specs{display:flex; flex-wrap:wrap; align-items:center; gap:8px}
.chip{font:500 10px/1 var(--mono); letter-spacing:.13em; color:#3d3b34;
  border:1px solid var(--line); background:rgba(255,255,255,.45); padding:6px 9px; transition:.25s}
.chip:hover{transform:translateY(-2px); border-color:#a9a496}
.chip.model{background:var(--red); border-color:var(--redD); color:#FFF7F2; font-weight:700; letter-spacing:.2em}
/* ── 标注的显隐（移动端瘦身）───────────────────────────────── */
@media (max-width:960px){ .vert{display:none} }
@media (max-width:640px){
  .b-dial,.b-shutter,.b-top{display:none}
  .brand .sub{display:none}
  .meta .exif{display:none}
  header{padding:13px 16px 11px} footer{padding:12px 16px 15px}
  .note{font-size:12px}
}
@media (max-width:430px){ .meta .live{display:none} .chip.iso{display:none} }
@media (prefers-reduced-motion: reduce){
  .glow,.meta .live i{animation:none}
  #sweep{animation:none}
  .stage{animation:none}
}
</style>
</head>
<body>

<div class="tableline" aria-hidden="true"></div>
<div class="glow" aria-hidden="true"></div>
<canvas id="dust" aria-hidden="true"></canvas>

<header>
  <div class="brand">
    <span class="mark"></span>
    <span class="name">OPTERRA</span>
    <span class="sub">OPTICAL INSTRUMENTS · DRESDEN-WORKS</span>
  </div>
  <div class="meta">
    <span class="exif">STUDIO 5000K · F/8 · 1/125</span>
    <span class="live"><i></i>FRAME <b id="frameNo">0317</b></span>
  </div>
</header>

<main>
  <div class="stage">
    <div class="vert">PRODUCT STUDY · DSLR · THREE-QUARTER VIEW · SVG ONLY</div>

    <svg viewBox="0 0 960 620" role="img" aria-label="手绘矢量单反相机 OPTERRA RD-9 PRO，3/4 视角">
      <defs>

        <!-- 热靴 -->
        <g id="hotshoe">

          <path d="M626 165 L714 158 L714 160.4 L626 167.4 Z" fill="#454B52"/>

      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grainF)" opacity=".55"/>
  </svg>

<script>
(function(){
  'use strict';

  /* ── 模式转盘：点击旋转 45°，刻字沿椭圆轨道重新落位 ── */
  var MODES = ['M','A','S','P','V','C1','C2','B'];
  var marks = document.getElementById('dialMarks');
  var rotor = document.getElementById('rotor');
  var dial  = document.getElementById('modeDial');
  marks.innerHTML = MODES.map(function(m){
    var fs = (m==='C1') ? ' font-size="7.2"' : '';
    var fill = (m==='V') ? '#C4483B' : '#D5DAE0';
    return '<g style="transform-box:fill-box;transform-origin:center;'
         + 'transition:transform .75s cubic-bezier(.3,1.35,.35,1)">'
         + '<text fill="#0B0D10" y="1.3"'+fs+'>'+m+'</text>'
         + '<text fill="'+fill+'"'+fs+'>'+m+'</text></g>';
  }).join('');
  var nodes = Array.prototype.slice.call(marks.childNodes);
  var angle = 0;
  function layoutDial(){
    for(var i=0;i<8;i++){
      var th = (angle + i*45) * Math.PI/180;
      var x = Math.cos(th)*17.5, y = Math.sin(th)*17.5;
      var rot = i*45;
      while(rot > 180) rot -= 360;
      while(rot < -180) rot += 360;
      nodes[i].style.transform = 'translate('+x.toFixed(2)+'px,'+y.toFixed(2)+'px) rotate('+rot+'deg)';
    }
  }
  layoutDial();
  dial.addEventListener('click', function(){
    angle = (angle + 45) % 360;
    rotor.style.transform = 'rotate('+angle+'deg)';
    layoutDial();
  });

  /* ── 快门：按压下沉 + 取景器闪光 + 帧计数 ── */
  var shutter = document.getElementById('shutterBtn');
  var cap = document.getElementById('shutterCap');
  var vf = document.getElementById('vfFlash');
  var frameNo = document.getElementById('frameNo');
  var frames = 317, busy = false;
  shutter.addEventListener('click', function(){
    if(busy) return; busy = true;
    cap.style.transform = 'translateY(4px)';
    frames++;
    frameNo.textContent = String(frames).padStart(4,'0');
    frameNo.classList.add('flash');
    if(vf.animate){
      vf.animate([{opacity:0},{opacity:.95,offset:.16},{opacity:0}], {duration:300, easing:'ease-out'});
    }else{
      vf.style.transition = 'opacity .12s';
      vf.style.opacity = '.9';
      setTimeout(function(){ vf.style.opacity = '0'; }, 130);
    }
    setTimeout(function(){ cap.style.transform = 'translateY(0)'; }, 150);
    setTimeout(function(){ busy = false; frameNo.classList.remove('flash'); }, 380);
  });

  /* ── 环境尘埃：Canvas，dPR 上限 2，页面隐藏时暂停 ── */
  var cv = document.getElementById('dust');
  var ctx = cv.getContext('2d');
  if(!ctx) return;
  var W = 0, H = 0, dpr = 1, P = [], tPrev = 0, raf = 0;
  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = Math.floor(W*dpr); cv.height = Math.floor(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var n = Math.min(70, Math.floor(W*H/26000));
    P = [];
    for(var i=0;i<n;i++){
      P.push({ x:Math.random()*W, y:Math.random()*H, z:.35+Math.random()*.65,
               ph:Math.random()*Math.PI*2, r:.6+Math.random()*1.1, warm:Math.random()<.3 });
    }
  }
  function tick(t){
    raf = requestAnimationFrame(tick);
    var dt = Math.min(33, t - tPrev || 16); tPrev = t;
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<P.length;i++){
      var p = P[i];
      p.x -= dt*0.0035*p.z;
      p.y += Math.sin(t*0.00035 + p.ph) * 0.05 * p.z - dt*0.0006*p.z;
      if(p.x < -6) p.x = W+6;
      if(p.y < -6) p.y = H+6;
      var a = p.z * (0.30 + 0.24*Math.sin(t*0.0009 + p.ph));
      ctx.beginPath();
      ctx.fillStyle = p.warm ? 'rgba(252,240,214,'+a.toFixed(3)+')' : 'rgba(255,255,255,'+a.toFixed(3)+')';
      ctx.arc(p.x, p.y, p.r*p.z, 0, 6.2832);
      ctx.fill();
    }
  }
  function play(){ if(!raf){ tPrev = 0; raf = requestAnimationFrame(tick); } }
  function stop(){ cancelAnimationFrame(raf); raf = 0; }
  window.addEventListener('resize', resize);
  document.addEventListener('visibilitychange', function(){ document.hidden ? stop() : play(); });
  resize();
  if(!document.hidden) play();
})();
</script>
