<title>KIOVA KV-850 · 纯手绘拟物单反</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 90% at 28% 16%, #ffffff 0%, rgba(255,255,255,0) 42%),
      radial-gradient(90% 80% at 50% 40%, #f5f6f8 0%, #e3e6ea 62%, #d3d7dc 100%);
    font-family: "Helvetica Neue", Arial, "PingFang SC", sans-serif;
    overflow: hidden;
  }
  .stage { width: min(94vw, 880px); }
  svg { display: block; width: 100%; height: auto; }
  .cap { margin-top: 10px; text-align: center; font-size: 11px; letter-spacing: 3px; color: #9aa0a8; }
  #dialFace { transition: transform .55s cubic-bezier(.34,1.4,.44,1); transform-origin: 0px -46px; cursor: pointer; }
  #dialHit { cursor: pointer; }
  #shBtn { transition: transform .12s ease; transform-origin: 0px -30px; cursor: pointer; }
</style>
