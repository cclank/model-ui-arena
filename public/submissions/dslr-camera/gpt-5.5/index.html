<!doctype html>
<html lang="zh-CN">
<head>

<title>DSLR Camera Replica</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#0c1017;color:#f4f7ff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{display:grid;place-items:center;padding:18px;overflow:hidden;background:radial-gradient(circle at 22% 14%,rgba(112,168,255,.2),transparent 30%),radial-gradient(circle at 78% 18%,rgba(255,212,134,.15),transparent 28%),linear-gradient(160deg,#141c2a,#080c13 62%,#04070c)}.stage{width:min(1280px,calc(100vw - 36px));aspect-ratio:16/10;border-radius:26px;overflow:hidden;background:#101722;box-shadow:0 32px 100px rgba(0,0,0,.58),0 0 0 1px rgba(255,255,255,.12)}svg{display:block;width:100%;height:100%}.dial{cursor:pointer;transform-box:fill-box;transform-origin:center}.dial.spin{animation:dialSpin .8s cubic-bezier(.2,.7,.18,1)}.glassSweep{animation:sweep 3.4s ease-in-out infinite}.shine{animation:pulse 3s ease-in-out infinite}@keyframes dialSpin{to{transform:rotate(55deg)}}@keyframes sweep{0%,28%{transform:translateX(-150px) rotate(-12deg);opacity:0}44%,62%{opacity:.85}86%,100%{transform:translateX(180px) rotate(-12deg);opacity:0}}@keyframes pulse{50%{opacity:.48}}@media(max-width:620px){body{padding:8px}.stage{width:calc(100vw - 16px);border-radius:16px}}

<body>
<main class="stage" aria-label="拟物单反相机 3/4 视角纯 SVG 复刻">

<linearGradient id="table" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#2a303b"/><stop offset=".52" stop-color="#171d26"/><stop offset="1" stop-color="#0a0d13"/></linearGradient>

<radialGradient id="glass" cx=".44" cy=".34" r=".72"><stop stop-color="#c9f5ff" stop-opacity=".9"/><stop offset=".12" stop-color="#3cc6ff" stop-opacity=".62"/><stop offset=".36" stop-color="#15386e"/><stop offset=".68" stop-color="#081327"/><stop offset="1" stop-color="#02050d"/></radialGradient>
<radialGradient id="aperture" cx=".5" cy=".5" r=".52"><stop stop-color="#061124"/><stop offset=".42" stop-color="#02050d"/><stop offset="1" stop-color="#000"/></radialGradient>

<filter id="drop" x="-20%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#000" flood-opacity=".46"/></filter>
