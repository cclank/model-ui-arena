<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSLR Camera Replica</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; font-family: system-ui, sans-serif; }
.stage { width: min(420px, 96vw); background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; padding: 28px; box-shadow: 0 30px 80px rgba(0,0,0,.55); }
svg { display: block; width: 100%; height: auto; filter: drop-shadow(0 26px 34px rgba(0,0,0,.5)); }
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#334155"/><stop offset="40%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#94a3b8"/><stop offset="35%" stop-color="#475569"/><stop offset="70%" stop-color="#334155"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="redring" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7f1d1d"/><stop offset="50%" stop-color="#dc2626"/><stop offset="100%" stop-color="#7f1d1d"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c4a6e"/><stop offset="45%" stop-color="#082f49"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <radialGradient id="glint" cx=".35" cy=".35" r=".6"><stop offset="0%" stop-color="rgba(255,255,255,.9)"/><stop offset="30%" stop-color="rgba(255,255,255,.25)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity=".45"/></filter>
  </defs>

  <!-- table shadow -->
  <ellipse cx="210" cy="285" rx="170" ry="22" fill="#000" opacity=".35" filter="url(#soft)"/>

  <!-- camera body prism / top plane for 3/4 depth -->
  <path d="M110 88 L300 82 L300 125 L110 132 Z" fill="url(#top)"/>
  <path d="M110 88 L92 72 L282 66 L300 82 Z" fill="#475569"/>

  <!-- main body block with 3/4 perspective -->
  <path d="M92 128 L320 118 L320 232 L92 248 Z" fill="url(#body)" filter="url(#shadow)"/>
  <!-- side thickness -->
  <path d="M320 118 L348 108 L348 220 L320 232 Z" fill="#0f172a"/>
  <!-- front plane darker -->
  <path d="M92 128 L320 118 L320 232 L92 248 Z" fill="url(#body)"/>

  <!-- grip on right side -->
  <path d="M248 120 Q290 116 316 122 L316 235 L250 242 Q244 185 248 120" fill="url(#grip)"/>
  <g fill="#020617" opacity=".55">
    <rect x="262" y="138" width="34" height="4" rx="2"/><rect x="260" y="148" width="36" height="4" rx="2"/>
    <rect x="258" y="158" width="38" height="4" rx="2"/><rect x="256" y="168" width="40" height="4" rx="2"/>
    <rect x="256" y="178" width="40" height="4" rx="2"/><rect x="256" y="188" width="40" height="4" rx="2"/>
    <rect x="258" y="198" width="38" height="4" rx="2"/><rect x="260" y="208" width="36" height="4" rx="2"/>
  </g>

  <!-- prism / pentaprism hump -->
  <path d="M168 82 L250 78 L256 120 L162 124 Z" fill="url(#top)"/>
  <path d="M168 82 L156 70 L238 66 L250 78 Z" fill="#64748b"/>

  <!-- hot shoe -->
  <rect x="188" y="64" width="34" height="8" rx="2" fill="#111827"/>
  <rect x="196" y="62" width="18" height="4" rx="1" fill="#0f172a"/>

  <!-- mode dial -->
  <g transform="translate(258, 72)">
    <ellipse cx="22" cy="14" rx="22" ry="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <path d="M0 14 L44 14" stroke="#334155" stroke-width="1.5"/>
    <path d="M22 4 L22 24" stroke="#334155" stroke-width="1.5"/>
    <path d="M6 8 L38 20" stroke="#334155" stroke-width="1.5"/>
    <path d="M38 8 L6 20" stroke="#334155" stroke-width="1.5"/>
    <text x="22" y="17" text-anchor="middle" fill="#e2e8f0" font-size="7" font-weight="700" font-family="system-ui, sans-serif">AUTO</text>
  </g>

  <!-- shutter button -->
  <ellipse cx="284" cy="88" rx="14" ry="8" fill="#ef4444" stroke="#7f1d1d" stroke-width="2"/>
  <ellipse cx="284" cy="86" rx="12" ry="5" fill="#f87171"/>

  <!-- lens mount ring -->
  <ellipse cx="188" cy="182" rx="86" ry="64" fill="#111827" stroke="#334155" stroke-width="4"/>
  <ellipse cx="188" cy="182" rx="80" ry="60" fill="#0f172a"/>

  <!-- lens barrel layers -->
  <g transform="translate(188, 182)">
    <ellipse cx="0" cy="0" rx="74" ry="54" fill="url(#metal)"/>
    <ellipse cx="0" cy="0" rx="70" ry="51" fill="#1e293b"/>
    <!-- zoom ring -->
    <ellipse cx="0" cy="0" rx="66" ry="48" fill="url(#metal)" stroke="#334155" stroke-width="2"/>
    <g stroke="#334155" stroke-width="1.5" opacity=".7">
      <line x1="-60" y1="0" x2="60" y2="0"/><line x1="0" y1="-45" x2="0" y2="45"/>
      <line x1="-42" y1="-33" x2="42" y2="33"/><line x1="42" y1="-33" x2="-42" y2="33"/>
    </g>
    <!-- red ring -->
    <ellipse cx="0" cy="0" rx="58" ry="42" fill="none" stroke="url(#redring)" stroke-width="4"/>
    <!-- front lens group -->
    <ellipse cx="0" cy="0" rx="52" ry="38" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="46" ry="33" fill="url(#glass)"/>
    <!-- inner glass reflection rings -->
    <ellipse cx="0" cy="0" rx="36" ry="26" fill="none" stroke="#0ea5e9" stroke-width="1" opacity=".45"/>
    <ellipse cx="0" cy="0" rx="26" ry="18" fill="none" stroke="#0ea5e9" stroke-width="1" opacity=".35"/>
    <!-- specular highlight -->
    <ellipse cx="-14" cy="-12" rx="18" ry="10" fill="url(#glint)" transform="rotate(-25 -14 -12)"/>
    <ellipse cx="12" cy="10" rx="10" ry="5" fill="url(#glint)" opacity=".45" transform="rotate(160 12 10)"/>
  </g>

  <!-- brand / model text -->
  <text x="138" y="150" fill="#e2e8f0" font-size="11" font-weight="700" font-family="system-ui, sans-serif" letter-spacing=".04em">LUMIXA</text>
  <text x="138" y="162" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">PRO-7 MARK II</text>

  <!-- small front button / AF assist lamp -->
  <circle cx="128" cy="215" r="5" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="128" cy="215" r="2.5" fill="#22c55e" opacity=".8"/>

  <!-- subtle grip ridge under shutter -->
  <path d="M270 118 L290 116 L292 155 L272 160 Z" fill="#111827" opacity=".6"/>

  <!-- body seam shadow under prism -->
  <path d="M152 124 L262 118" stroke="#020617" stroke-width="2" opacity=".4"/>
</svg>
</div>
</body>
</html>
