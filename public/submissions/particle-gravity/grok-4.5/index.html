<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Particle Gravity · grok-4.5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#04060f;color:#e2e8f0;touch-action:none}
canvas{display:block;width:100%;height:100%}
.hud{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:min(370px,calc(100% - 20px));display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  pointer-events:none;z-index:2
}
.chip{
  background:rgba(15,23,42,.7);border:1px solid rgba(94,234,212,.3);border-radius:999px;
  padding:6px 12px;font-size:.72rem;backdrop-filter:blur(8px);color:#99f6e4
}
.tip{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-size:.75rem;color:#94a3b8;background:rgba(15,23,42,.55);padding:8px 14px;
  border-radius:999px;border:1px solid rgba(148,163,184,.2);pointer-events:none;white-space:nowrap
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <span class="chip">粒子 <b id="pc">0</b></span>
  <span class="chip">能量 <b id="en">100</b></span>
  <span class="chip">FPS <b id="fps">—</b></span>
  <span class="chip">模式 <b id="mode">吸引</b></span>
</div>
<div class="tip">点击 / 触摸：冲击波 · 移动：临时引力点</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const pcEl=document.getElementById('pc'),enEl=document.getElementById('en');
const fpsEl=document.getElementById('fps'),modeEl=document.getElementById('mode');
let W,H,CX,CY,particles=[],shocks=[],pointer=null,energy=100,frames=0,fps=0,lastFps=0;
const N=140;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;CX=W/2;CY=H/2}
addEventListener('resize',resize);resize();
function spawn(n=N){
  particles=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,r=40+Math.random()*Math.min(W,H)*0.38;
    particles.push({
      x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r,
      vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2,
      life:1,size:1.2+Math.random()*2.2,hue:160+Math.random()*80,trail:[]
    });
  }
}
spawn();
function attract(p,tx,ty,str,repel){
  const dx=tx-p.x,dy=ty-p.y,d2=dx*dx+dy*dy,d=Math.sqrt(d2)+0.01;
  const f=str/(d2*0.02+d*0.35);
  const s=repel?-f:f;
  p.vx+=dx/d*s;p.vy+=dy/d*s;
}
function onPointer(e,down){
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX??e.touches?.[0]?.clientX)-r.left;
  const y=(e.clientY??e.touches?.[0]?.clientY)-r.top;
  if(down){
    shocks.push({x,y,r:8,max:120,life:1});
    energy=Math.min(200,energy+8);
    modeEl.textContent='冲击波';
  }
  pointer={x,y,t:performance.now()};
}
canvas.addEventListener('pointerdown',e=>{onPointer(e,true);canvas.setPointerCapture(e.pointerId)});
canvas.addEventListener('pointermove',e=>onPointer(e,false));
canvas.addEventListener('pointerup',()=>{pointer=null;modeEl.textContent='吸引'});
canvas.addEventListener('pointercancel',()=>pointer=null);
let last=performance.now();
function frame(now){
  const dt=Math.min(32,now-last)/16;last=now;frames++;
  if(now-lastFps>500){fps=Math.round(frames*1000/(now-lastFps));frames=0;lastFps=now;fpsEl.textContent=fps}
  ctx.fillStyle='rgba(4,6,15,0.28)';ctx.fillRect(0,0,W,H);
  // core
  const pulse=0.85+Math.sin(now/400)*0.15;
  const grd=ctx.createRadialGradient(CX,CY,0,CX,CY,70*pulse);
  grd.addColorStop(0,`rgba(94,234,212,${0.55*pulse})`);
  grd.addColorStop(0.4,`rgba(56,189,248,${0.2*pulse})`);
  grd.addColorStop(1,'rgba(4,6,15,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(CX,CY,70*pulse,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.strokeStyle=`rgba(94,234,212,${0.5*pulse})`;ctx.lineWidth=2;
  ctx.arc(CX,CY,18+6*pulse,0,Math.PI*2);ctx.stroke();
  // shocks
  for(let i=shocks.length-1;i>=0;i--){
    const s=shocks[i];s.r+=4.5*dt;s.life-=0.025*dt;
    if(s.life<=0||s.r>s.max){shocks.splice(i,1);continue}
    ctx.beginPath();ctx.strokeStyle=`rgba(253,230,138,${s.life*.8})`;ctx.lineWidth=2;
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
  }
  // pointer gravity
  if(pointer&&now-pointer.t<80){/* keep */}
  else if(pointer&&now-pointer.t>80)modeEl.textContent='引力点';
  // particles
  for(const p of particles){
    attract(p,CX,CY,0.55,false);
    // orbital assist
    const dx=p.x-CX,dy=p.y-CY,d=Math.hypot(dx,dy)+0.01;
    p.vx+=-dy/d*0.06*dt;p.vy+=dx/d*0.06*dt;
    if(pointer)attract(p,pointer.x,pointer.y,1.1,false);
    for(const s of shocks){
      const dd=Math.hypot(p.x-s.x,p.y-s.y);
      if(Math.abs(dd-s.r)<18){
        const nx=(p.x-s.x)/(dd+0.01),ny=(p.y-s.y)/(dd+0.01);
        p.vx+=nx*1.8;p.vy+=ny*1.8;
      }
    }
    p.vx*=0.992;p.vy*=0.992;
    p.x+=p.vx*dt*2.4;p.y+=p.vy*dt*2.4;
    // soft bounds
    if(p.x<0||p.x>W)p.vx*=-0.8;
    if(p.y<0||p.y>H)p.vy*=-0.8;
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();
    // draw trail
    for(let t=1;t<p.trail.length;t++){
      const a=t/p.trail.length;
      ctx.beginPath();ctx.strokeStyle=`hsla(${p.hue},90%,65%,${a*0.35})`;
      ctx.lineWidth=p.size*a;ctx.moveTo(p.trail[t-1].x,p.trail[t-1].y);
      ctx.lineTo(p.trail[t].x,p.trail[t].y);ctx.stroke();
    }
    ctx.beginPath();
    ctx.fillStyle=`hsla(${p.hue},95%,70%,0.9)`;
    ctx.shadowColor=`hsla(${p.hue},100%,60%,0.6)`;ctx.shadowBlur=8;
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  energy=Math.max(40,energy-0.02*dt);
  pcEl.textContent=particles.length;enEl.textContent=Math.round(energy);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
