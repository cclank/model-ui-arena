<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Gravity</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #020617; color: #e2e8f0; font-family: system-ui, sans-serif; }
canvas { display: block; }
.hud { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; justify-content: space-between; font-size: .85rem; pointer-events: none; }
.hud span { background: rgba(15,23,42,.7); padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(56,189,248,.25); }
.hint { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-size: .8rem; color: rgba(255,255,255,.45); pointer-events: none; }
</style>
</head>
<body>
<div class="hud"><span id="n">Particles: 160</span><span id="fps">FPS: 60</span><span id="mode">Mode: Orbit</span></div>
<canvas id="c"></canvas>
<div class="hint">Move / tap to push or attract particles</div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
let w, h, cx, cy; const set = () => { w = c.width = innerWidth; h = c.height = innerHeight; cx = w/2; cy = h/2; }; set(); addEventListener('resize', set);
let mx = cx, my = cy, md = false;
addEventListener('pointermove', e => { mx = e.clientX; my = e.clientY; });
addEventListener('pointerdown', e => { mx = e.clientX; my = e.clientY; md = true; setTimeout(() => md = false, 350); });
addEventListener('pointerup', () => md = false);
const N = 160; const pts = [];
class P {
  constructor() { this.reset(); }
  reset() { const a = Math.random()*Math.PI*2, r = Math.random()*Math.min(w,h)*.38; this.x = cx + Math.cos(a)*r; this.y = cy + Math.sin(a)*r; this.vx = (Math.random()-.5)*1.2; this.vy = (Math.random()-.5)*1.2; this.life = Math.random()*200+100; this.size = Math.random()*2+1; this.hue = Math.random()*60+190; }
  update() {
    const dx = cx - this.x, dy = cy - this.y, d2 = dx*dx+dy*dy+1;
    const f = 120 / d2; this.vx += dx * f; this.vy += dy * f;
    const wx = mx - this.x, wy = my - this.y, wd2 = wx*wx+wy*wy+1;
    const wf = md ? -220/wd2 : 90/wd2; this.vx += wx * wf; this.vy += wy * wf;
    this.vx *= .985; this.vy *= .985; this.x += this.vx; this.y += this.vy; this.life--;
    if (this.life <= 0 || this.x < -50 || this.x > w+50 || this.y < -50 || this.y > h+50) this.reset();
  }
  draw() { const s = this.size; ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, ${Math.min(1, this.life/60)})`; ctx.beginPath(); ctx.arc(this.x, this.y, s, 0, Math.PI*2); ctx.fill(); }
}
for (let i = 0; i < N; i++) pts.push(new P());
let last = performance.now(), frames = 0, fps = 60;
function loop(now) {
  ctx.fillStyle = 'rgba(2,6,23,.28)'; ctx.fillRect(0,0,w,h);
  const glow = ctx.createRadialGradient(cx, cy, 4, cx, cy, 120);
  glow.addColorStop(0, 'rgba(56,189,248,.55)'); glow.addColorStop(1, 'rgba(56,189,248,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, 120, 0, Math.PI*2); ctx.fill();
  pts.forEach(p => { p.update(); p.draw(); });
  frames++; if (now - last >= 1000) { fps = Math.round(frames*1000/(now-last)); frames = 0; last = now; document.getElementById('fps').textContent = 'FPS: ' + fps; }
  document.getElementById('mode').textContent = 'Mode: ' + (md ? 'Repel' : 'Orbit');
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
