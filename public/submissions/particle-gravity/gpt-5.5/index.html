<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Particle Gravity Field</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#030611;color:#eaf6ff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
canvas{position:fixed;inset:0;width:100%;height:100%;background:radial-gradient(circle at 50% 45%,#162d53 0,#07101f 32%,#030611 70%)}
.hud{position:fixed;left:22px;top:22px;width:min(360px,calc(100vw - 44px));padding:16px;border:1px solid rgba(120,220,255,.28);border-radius:18px;background:rgba(5,10,22,.58);backdrop-filter:blur(12px);box-shadow:0 0 50px rgba(0,200,255,.13)}
.k{margin:0 0 6px;color:#68d8ff;font-size:11px;letter-spacing:.2em;text-transform:uppercase}.hud h1{margin:0 0 12px;font-size:clamp(24px,7vw,42px);line-height:.95;text-shadow:0 0 24px rgba(104,216,255,.75)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.cell{padding:9px;border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.05)}.cell span{display:block;color:#9fb2d8;font-size:10px}.cell b{font-size:18px}
.tip{position:fixed;right:22px;bottom:22px;color:#9fb2d8;font-size:12px;text-align:right}.pulse{position:fixed;width:16px;height:16px;border:1px solid #7cff6b;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);animation:pulse .7s ease-out forwards;box-shadow:0 0 26px #7cff6b}
@keyframes pulse{to{width:260px;height:260px;opacity:0}}@media(max-width:520px){.hud{left:12px;top:12px}.tip{left:14px;right:auto;text-align:left}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<section class="hud">
  <p class="k">interactive gravity</p>
  <h1>粒子引力场</h1>
  <div class="grid"><div class="cell"><span>Particles</span><b id="n">0</b></div><div class="cell"><span>Energy</span><b id="e">0</b></div><div class="cell"><span>FPS</span><b id="f">60</b></div></div>
</section>
<p class="tip">移动指针牵引粒子<br>点击生成冲击波</p>
<script>
const c=document.getElementById("c"),x=c.getContext("2d"),N=document.getElementById("n"),E=document.getElementById("e"),F=document.getElementById("f");
let w=0,h=0,dpr=1,parts=[],waves=[],mouse={x:0,y:0,on:false},last=performance.now(),frames=0,fps=60;
function size(){dpr=Math.min(2,devicePixelRatio||1);w=innerWidth;h=innerHeight;c.width=w*dpr;c.height=h*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
function seed(){parts=[];let count=Math.min(210,Math.floor(w*h/4200)+90);for(let i=0;i<count;i++){let a=Math.random()*Math.PI*2,r=70+Math.random()*Math.min(w,h)*.45;parts.push({x:w/2+Math.cos(a)*r,y:h/2+Math.sin(a)*r,vx:-Math.sin(a)*(0.3+Math.random()),vy:Math.cos(a)*(0.3+Math.random()),s:1+Math.random()*2,h:170+Math.random()*120,t:Math.random()*60})}N.textContent=count}
function impulse(px,py){waves.push({x:px,y:py,r:0,a:1});let p=document.createElement("i");p.className="pulse";p.style.left=px+"px";p.style.top=py+"px";document.body.appendChild(p);setTimeout(()=>p.remove(),700)}
addEventListener("resize",()=>{size();seed()});addEventListener("pointermove",e=>{mouse={x:e.clientX,y:e.clientY,on:true}});addEventListener("pointerleave",()=>mouse.on=false);addEventListener("pointerdown",e=>impulse(e.clientX,e.clientY));
function step(now){let dt=Math.min(2,(now-last)/16.7);last=now;frames++;if(frames%18===0){fps=Math.round(1000/(dt*16.7));F.textContent=fps}x.fillStyle="rgba(3,6,17,.2)";x.fillRect(0,0,w,h);let cx=w/2,cy=h/2,energy=0;
let g=x.createRadialGradient(cx,cy,8,cx,cy,Math.min(w,h)*.45);g.addColorStop(0,"rgba(126,255,107,.55)");g.addColorStop(.12,"rgba(104,216,255,.18)");g.addColorStop(1,"transparent");x.fillStyle=g;x.beginPath();x.arc(cx,cy,Math.min(w,h)*.45,0,7);x.fill();
for(const q of waves){q.r+=12*dt;q.a-=.025*dt;x.strokeStyle=`rgba(124,255,107,${q.a})`;x.lineWidth=2;x.beginPath();x.arc(q.x,q.y,q.r,0,7);x.stroke()}waves=waves.filter(q=>q.a>0);
for(const p of parts){let ax=0,ay=0,dx=cx-p.x,dy=cy-p.y,dist=Math.hypot(dx,dy)+40;ax+=dx/dist*.035;ay+=dy/dist*.035;ax+=-dy/dist*.006;ay+=dx/dist*.006;if(mouse.on){dx=mouse.x-p.x;dy=mouse.y-p.y;dist=Math.hypot(dx,dy)+60;ax+=dx/dist*.08;ay+=dy/dist*.08}for(const q of waves){dx=p.x-q.x;dy=p.y-q.y;dist=Math.hypot(dx,dy)+1;if(Math.abs(dist-q.r)<40){ax+=dx/dist*.75*q.a;ay+=dy/dist*.75*q.a}}p.vx=(p.vx+ax*dt)*.992;p.vy=(p.vy+ay*dt)*.992;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.x<-40||p.x>w+40||p.y<-40||p.y>h+40){p.x=cx+(Math.random()-.5)*80;p.y=cy+(Math.random()-.5)*80;p.vx=(Math.random()-.5)*3;p.vy=(Math.random()-.5)*3}energy+=Math.hypot(p.vx,p.vy);x.strokeStyle=`hsla(${p.h},100%,68%,.28)`;x.lineWidth=p.s;x.beginPath();x.moveTo(p.x,p.y);x.lineTo(p.x-p.vx*9,p.y-p.vy*9);x.stroke();x.fillStyle=`hsla(${p.h},100%,72%,.9)`;x.beginPath();x.arc(p.x,p.y,p.s,0,7);x.fill()}E.textContent=Math.round(energy);requestAnimationFrame(step)}
size();seed();requestAnimationFrame(step);
</script>
</body>
</html>
