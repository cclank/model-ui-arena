<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Gravity Field</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03070b;color:#dcefff;font-family:ui-sans-serif,system-ui,sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}.hud{position:fixed;left:22px;top:22px;border-left:2px solid #57e6ff;padding:3px 0 3px 14px;pointer-events:none}.hud h1{margin:0 0 9px;font-size:13px;letter-spacing:.18em}.hud p{margin:0;color:#718796;font:10px/1.7 ui-monospace,monospace;letter-spacing:.08em}.hud b{color:#9bf5ff;font-weight:600}.mode{position:fixed;right:22px;top:22px;text-align:right;color:#718796;font:10px ui-monospace,monospace;letter-spacing:.12em}.mode b{display:block;color:#ffcf72;font-size:12px;margin-top:5px}.guide{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);white-space:nowrap;color:#79909f;font:9px ui-monospace,monospace;letter-spacing:.12em;pointer-events:none}.guide i{display:inline-block;width:5px;height:5px;border-radius:50%;background:#ffcf72;box-shadow:0 0 8px #ffcf72;margin:0 8px 1px}@media(max-width:500px){.hud{left:14px;top:14px}.mode{right:14px;top:14px}.guide{bottom:12px;font-size:8px}}
</style></head><body><canvas id="field" aria-label="可交互粒子引力场"></canvas><aside class="hud"><h1>GRAVITY WELL / 05</h1><p>PARTICLES <b id="particles">000</b><br>ENERGY <b id="energy">0.00</b><br>FRAME RATE <b id="fps">60</b></p></aside><div class="mode">POINTER FIELD<b id="mode">ORBITAL</b></div><div class="guide">MOVE TO ATTRACT <i></i> TAP TO RELEASE SHOCKWAVE</div>
<script>
const c=document.querySelector('#field'),g=c.getContext('2d'),P=[],pointer={x:0,y:0,active:false,shock:0},countEl=document.querySelector('#particles'),energyEl=document.querySelector('#energy'),fpsEl=document.querySelector('#fps'),modeEl=document.querySelector('#mode');let W,H,D,last=performance.now(),frames=0,stamp=last;
function make(){const a=Math.random()*Math.PI*2,r=70+Math.random()*Math.min(W,H)*.48,s=Math.sqrt(650/r);return{x:W/2+Math.cos(a)*r,y:H/2+Math.sin(a)*r,px:0,py:0,vx:-Math.sin(a)*s*(.65+Math.random()*.6),vy:Math.cos(a)*s*(.65+Math.random()*.6),z:.35+Math.random()*.9,h:178+Math.random()*72}}
function size(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);P.length=0;const n=W<500?115:190;for(let i=0;i<n;i++)P.push(make());countEl.textContent=String(n).padStart(3,'0')}addEventListener('resize',size);size();
function force(p,tx,ty,m,repel=false){let dx=tx-p.x,dy=ty-p.y,d2=dx*dx+dy*dy+90,d=Math.sqrt(d2),f=Math.min(.18,m/d2);if(repel)f=-f;p.vx+=dx/d*f;p.vy+=dy/d*f}
function draw(now){const dt=Math.min(2.2,(now-last)/16.67);last=now;g.globalCompositeOperation='source-over';g.fillStyle='rgba(3,7,11,.15)';g.fillRect(0,0,W,H);const cx=W/2,cy=H/2;g.globalCompositeOperation='lighter';const aura=g.createRadialGradient(cx,cy,0,cx,cy,64);aura.addColorStop(0,'rgba(255,247,196,.95)');aura.addColorStop(.09,'rgba(91,230,255,.65)');aura.addColorStop(.35,'rgba(89,87,255,.14)');aura.addColorStop(1,'transparent');g.fillStyle=aura;g.beginPath();g.arc(cx,cy,64+Math.sin(now*.003)*4,0,7);g.fill();let energy=0;for(const p of P){p.px=p.x;p.py=p.y;force(p,cx,cy,1150);if(pointer.active)force(p,pointer.x,pointer.y,900);if(pointer.shock>0)force(p,pointer.x,pointer.y,2900*pointer.shock,true);p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.999;p.vy*=.999;const dx=p.x-cx,dy=p.y-cy,dist=Math.hypot(dx,dy);if(dist<25||p.x<-70||p.x>W+70||p.y<-70||p.y>H+70)Object.assign(p,make());const speed=Math.hypot(p.vx,p.vy);if(speed>7){p.vx*=.94;p.vy*=.94}energy+=speed;g.strokeStyle=`hsla(${p.h},90%,${58+p.z*24}%,${.28+p.z*.45})`;g.lineWidth=p.z*1.3;g.beginPath();g.moveTo(p.px,p.py);g.lineTo(p.x,p.y);g.stroke();g.fillStyle=`hsla(${p.h},95%,78%,${.55+p.z*.35})`;g.beginPath();g.arc(p.x,p.y,p.z*1.55,0,7);g.fill()}if(pointer.shock>0){g.strokeStyle=`rgba(255,207,114,${pointer.shock})`;g.lineWidth=2;g.beginPath();g.arc(pointer.x,pointer.y,(1-pointer.shock)*180,0,7);g.stroke();pointer.shock=Math.max(0,pointer.shock-.025*dt);if(!pointer.shock)modeEl.textContent=pointer.active?'ATTRACTOR':'ORBITAL'}energyEl.textContent=(energy/P.length).toFixed(2);frames++;if(now-stamp>500){fpsEl.textContent=Math.round(frames*1000/(now-stamp));frames=0;stamp=now}requestAnimationFrame(draw)}
function pos(e){const q=e.touches?e.touches[0]:e;pointer.x=q.clientX;pointer.y=q.clientY;pointer.active=true;modeEl.textContent='ATTRACTOR'}addEventListener('pointermove',pos);addEventListener('pointerdown',e=>{pos(e);pointer.shock=1;modeEl.textContent='REPULSOR'});addEventListener('pointerleave',()=>{pointer.active=false;if(!pointer.shock)modeEl.textContent='ORBITAL'});requestAnimationFrame(draw);
</script></body></html>
