<!-- 设计说明：
     创建了一个可交互的粒子引力场，粒子围绕中心引力井运动，
     支持鼠标交互产生影响，包含状态数据显示，适配移动端 -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子引力场</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10;
        }

        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
            opacity: 0.7;
        }

        .gravity-center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff4757;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff4757;
            z-index: 5;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="stats">
        <div>粒子数: <span id="particleCount">0</span></div>
        <div>能量值: <span id="energyLevel">0</span></div>
        <div>FPS: <span id="fpsCounter">0</span></div>
        <div>当前模式: <span id="modeDisplay">引力</span></div>
    </div>

    <div class="instructions">
        移动鼠标与粒子互动<br>
        点击鼠标改变引力/斥力模式
    </div>

    <div class="gravity-center" id="gravityCenter"></div>

    <script>
        // Canvas 设置
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.originalSize = this.size;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.001;
                this.oscillation = Math.random() * 0.05;
                this.oscillationPhase = Math.random() * Math.PI * 2;
            }

            update(centerX, centerY, mouse) {
                // 引力计算
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 5) {
                    const force = 0.2 / (distance * distance);
                    this.speedX += dx * force;
                    this.speedY += dy * force;
                }

                // 鼠标影响
                if (mouse.active) {
                    const mdx = mouse.x - this.x;
                    const mdy = mouse.y - this.y;
                    const mDistance = Math.sqrt(mdx * mdx + mdy * mdy);

                    if (mDistance < 150) {
                        if (mouse.mode === 'repel') {
                            // 斥力
                            const mForce = 2 / (mDistance * mDistance);
                            this.speedX -= mdx * mForce * 0.5;
                            this.speedY -= mdy * mForce * 0.5;
                        } else {
                            // 引力
                            const mForce = 1 / (mDistance * mDistance);
                            this.speedX += mdx * mForce * 0.3;
                            this.speedY += mdy * mForce * 0.3;
                        }
                    }
                }

                // 限制速度
                const maxSpeed = 5;
                const speed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
                if (speed > maxSpeed) {
                    this.speedX = (this.speedX / speed) * maxSpeed;
                    this.speedY = (this.speedY / speed) * maxSpeed;
                }

                // 更新位置
                this.x += this.speedX;
                this.y += this.speedY;

                // 粒子生命周期
                this.life -= this.decay;

                // 边界反弹
                if (this.x <= 0 || this.x >= canvas.width) {
                    this.speedX = -this.speedX * 0.8;
                    this.x = this.x <= 0 ? 1 : canvas.width - 1;
                }
                if (this.y <= 0 || this.y >= canvas.height) {
                    this.speedY = -this.speedY * 0.8;
                    this.y = this.y <= 0 ? 1 : canvas.height - 1;
                }

                // 大小振荡效果
                this.size = this.originalSize + Math.sin(Date.now() * this.oscillation + this.oscillationPhase) * 0.5;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // 粒子系统
        const particles = [];
        const particleCount = 200;
        const mouse = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            active: false,
            mode: 'attract' // 'attract' or 'repel'
        };
        let centerX = canvas.width / 2;
        let centerY = canvas.height / 2;
        let gravityCenter = document.getElementById('gravityCenter');

        // 创建粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // FPS 计算
        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;
        let lastFpsUpdate = 0;

        // 更新引力中心位置
        function updateGravityCenter() {
            gravityCenter.style.left = centerX + 'px';
            gravityCenter.style.top = centerY + 'px';
        }

        // 鼠标事件
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            mouse.active = true;
            mouse.mode = mouse.mode === 'attract' ? 'repel' : 'attract';
            document.querySelector('.instructions').innerHTML =
                `移动鼠标与粒子互动<br>点击鼠标改变引力/斥力模式<br>当前模式: ${mouse.mode === 'attract' ? '引力' : '斥力'}`;
            document.getElementById('modeDisplay').textContent = mouse.mode === 'attract' ? '引力' : '斥力';
        });

        canvas.addEventListener('mouseup', () => {
            mouse.active = false;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.active = true;
            mouse.mode = mouse.mode === 'attract' ? 'repel' : 'attract';
            document.querySelector('.instructions').innerHTML =
                `移动手指与粒子互动<br>触摸屏幕改变引力/斥力模式<br>当前模式: ${mouse.mode === 'attract' ? '引力' : '斥力'}`;
            document.getElementById('modeDisplay').textContent = mouse.mode === 'attract' ? '引力' : '斥力';
        });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        // 动画循环
        function animate(timestamp) {
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 计算FPS
            frameCount++;
            if (timestamp - lastFpsUpdate >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsUpdate = timestamp;

                // 更新统计信息
                document.getElementById('fpsCounter').textContent = fps;
                document.getElementById('particleCount').textContent = particles.length;

                // 能量等级基于粒子活跃度
                let energy = 0;
                particles.forEach(p => {
                    energy += Math.sqrt(p.speedX * p.speedX + p.speedY * p.speedY);
                });
                energy = Math.round(energy / particles.length * 100);
                document.getElementById('energyLevel').textContent = energy;
            }

            // 更新和绘制粒子
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update(centerX, centerY, mouse);
                p.draw();

                // 如果粒子死亡，替换为新粒子
                if (p.life <= 0) {
                    particles[i] = new Particle();
                    particles[i].x = mouse.x + (Math.random() - 0.5) * 50;
                    particles[i].y = mouse.y + (Math.random() - 0.5) * 50;
                }
            }

            // 绘制引力中心
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#ff4757';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff6b81';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制引力场
            for (let i = 0; i < 10; i++) {
                const radius = 30 + i * 15;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 107, 129, ${0.2 - i * 0.02})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // 鼠标影响区域
            if (mouse.active) {
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
                ctx.strokeStyle = mouse.mode === 'attract' ? 'rgba(72, 219, 251, 0.3)' : 'rgba(255, 71, 87, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            requestAnimationFrame(animate);
        }

        // 启动动画
        updateGravityCenter();
        animate(0);
    </script>
</body>
</html>
