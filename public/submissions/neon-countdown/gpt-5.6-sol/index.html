<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ignition Countdown</title>
<style>
:root{color-scheme:dark;--cyan:#69f6ff;--pink:#ff417d;--gold:#ffd65c;--progress:0}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;background:#070610;color:#f7f4ff;font-family:ui-sans-serif,system-ui,sans-serif}.grid{position:fixed;inset:-30%;background-image:linear-gradient(#59eaff12 1px,transparent 1px),linear-gradient(90deg,#59eaff12 1px,transparent 1px);background-size:42px 42px;transform:perspective(500px) rotateX(62deg) translateY(35%);mask-image:linear-gradient(transparent,#000 40%,#000)}.glow{position:fixed;inset:0;background:radial-gradient(circle at 50% 52%,#172b4c 0,transparent 42%);transition:.25s}.shell{position:relative;width:min(590px,94vw);text-align:center}.kicker{font:700 10px ui-monospace,monospace;letter-spacing:.34em;color:#91a5bb;margin-bottom:14px}.dial{width:min(420px,82vw);aspect-ratio:1;margin:auto;position:relative;display:grid;place-items:center}.dial:before{content:"";position:absolute;inset:15%;border:1px solid #ffffff12;border-radius:50%;box-shadow:inset 0 0 45px #0008}.ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);filter:drop-shadow(0 0 10px var(--cyan))}.track{fill:none;stroke:#ffffff0d;stroke-width:6}.meter{fill:none;stroke:var(--cyan);stroke-width:7;stroke-linecap:round;stroke-dasharray:880;stroke-dashoffset:calc(880 - 880 * var(--progress));transition:stroke-dashoffset .15s linear,stroke .2s}.ticks{position:absolute;inset:4%;border-radius:50%;background:repeating-conic-gradient(from -1deg,#ffffff70 0 1deg,transparent 1deg 10deg);mask:radial-gradient(transparent 0 89%,#000 89% 91%,transparent 91%)}
#number{font:200 clamp(118px,27vw,210px)/1 ui-monospace,SFMono-Regular,monospace;letter-spacing:-.11em;margin-left:-.11em;text-shadow:0 0 28px #6df8ff5c;font-variant-numeric:tabular-nums;transition:.15s}.label{font:700 11px ui-monospace,monospace;letter-spacing:.28em;color:var(--cyan);height:18px}.restart{margin-top:26px;border:1px solid #ffffff25;border-radius:4px;background:#ffffff08;color:#eefcff;padding:12px 22px;font:700 10px ui-monospace,monospace;letter-spacing:.16em;cursor:pointer;transition:.2s}.restart:hover{border-color:var(--cyan);box-shadow:0 0 20px #69f6ff22}.beat #number{animation:beat .42s ease}.urgent{--cyan:var(--pink)}.urgent .glow{background:radial-gradient(circle at 50% 52%,#611532 0,transparent 46%)}.urgent #number{color:#fff0f5;text-shadow:0 0 38px #ff417d}.done{--cyan:var(--gold)}.done .glow{background:radial-gradient(circle at 50% 52%,#6b471b 0,transparent 52%)}.done #number{animation:finish .8s cubic-bezier(.1,.8,.2,1);text-shadow:0 0 60px #ffd65c}.spark{position:fixed;left:50%;top:50%;width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 14px var(--gold);animation:fly 1.1s ease-out forwards;animation-delay:var(--delay);transform:rotate(var(--a)) translateX(0)}
@keyframes beat{40%{transform:scale(1.08);filter:brightness(1.6)}}@keyframes finish{35%{transform:scale(1.3);filter:brightness(2)}100%{transform:scale(1)}}@keyframes fly{70%,100%{transform:rotate(var(--a)) translateX(var(--d));opacity:0}}@media(max-width:480px){.dial{width:88vw}.restart{margin-top:8px}.shell{transform:translateY(-2vh)}}
</style></head><body><div class="grid"></div><div class="glow"></div><main class="shell"><div class="kicker">SEQUENCE / AUTO START</div><div class="dial"><svg class="ring" viewBox="0 0 300 300"><circle class="track" cx="150" cy="150" r="140"/><circle class="meter" cx="150" cy="150" r="140"/></svg><i class="ticks"></i><span id="number">10</span></div><div class="label" id="label">IGNITION ARMED</div><button class="restart" id="restart">RESTART SEQUENCE</button></main><div id="sparks"></div>
<script>
const number=document.querySelector('#number'),label=document.querySelector('#label'),restart=document.querySelector('#restart'),sparks=document.querySelector('#sparks');let deadline,raf,last=-1,finished=false;
function explode(){sparks.innerHTML='';for(let i=0;i<72;i++){const a=i/72*360+(Math.random()-.5)*8,d=120+Math.random()*260,delay=Math.random()*.16;sparks.insertAdjacentHTML('beforeend',`<i class="spark" style="--a:${a}deg;--d:${d}px;--delay:${delay}s"></i>`)}}
function pulse(){document.body.classList.remove('beat');void document.body.offsetWidth;document.body.classList.add('beat')}
function frame(){const left=Math.max(0,deadline-performance.now()),sec=Math.ceil(left/1000);document.documentElement.style.setProperty('--progress',1-left/10000);if(sec!==last){last=sec;number.textContent=sec;pulse();document.body.classList.toggle('urgent',sec<=3&&sec>0);label.textContent=sec<=3&&sec>0?'FINAL PHASE':sec>0?'IGNITION ARMED':'LIFTOFF COMPLETE'}if(left<=0){if(!finished){finished=true;document.body.classList.remove('urgent');document.body.classList.add('done');explode()}return}raf=requestAnimationFrame(frame)}
function begin(){cancelAnimationFrame(raf);finished=false;last=-1;document.body.className='';sparks.innerHTML='';deadline=performance.now()+10000;frame()}restart.onclick=begin;begin();
</script></body></html>
