<!-- 设计说明：
     创建了一个霓虹风格的倒计时页面，包含大号数字、环形进度条，
     每秒有节奏反馈，倒计时结束后有爆发式视觉反馈，支持重新开始 -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最炫倒计时</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        .countdown-container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .neon-number {
            font-size: 200px;
            font-weight: bold;
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #0ff;
            margin: 0;
            line-height: 1;
            transition: all 0.3s ease;
        }

        .progress-container {
            width: 300px;
            height: 300px;
            margin: 40px auto;
            position: relative;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-background {
            stroke: #333;
            stroke-width: 8;
            fill: transparent;
        }

        .progress-bar {
            stroke: #0ff;
            stroke-width: 8;
            fill: transparent;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s linear;
        }

        .counter-text {
            font-size: 24px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            margin-top: 20px;
        }

        .restart-btn {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #0ff;
        }

        .restart-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .completion-message {
            font-size: 48px;
            color: #f1c40f;
            text-shadow: 0 0 20px #f1c40f;
            margin-top: 30px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }

        .active {
            opacity: 1;
            transform: scale(1);
        }

        .pulse {
            animation: pulse 0.5s infinite alternate;
        }

        .flash {
            animation: flash 0.2s;
        }

        @keyframes pulse {
            from { text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #0ff; }
            to { text-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #0ff,
                0 0 80px #0ff,
                0 0 160px #0ff; }
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #0ff;
            border-radius: 50%;
            opacity: 0;
        }

        .final-explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
        }

        .final-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f1c40f;
            border-radius: 50%;
            opacity: 0;
        }

        .final-text {
            font-size: 80px;
            color: #f1c40f;
            text-shadow: 0 0 30px #f1c40f;
            margin-top: 30px;
            opacity: 0;
            transform: scale(0.5);
        }

        .last-seconds {
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #f39c12,
                0 0 40px #f39c12,
                0 0 80px #f39c12 !important;
        }
    </style>
</head>
<body>
    <div class="glow" id="glow"></div>

    <div class="countdown-container">
        <h1 class="neon-number" id="countdown">10</h1>

        <div class="progress-container">
            <svg class="progress-ring" width="300" height="300">
                <circle class="progress-background" cx="150" cy="150" r="140"></circle>
                <circle class="progress-bar" cx="150" cy="150" r="140"
                    stroke-dasharray="879.2"
                    stroke-dashoffset="879.2">
                </circle>
            </svg>
        </div>

        <div class="counter-text" id="counterText">倒计时进行中...</div>

        <button class="restart-btn" id="restartBtn" style="display: none;">重新开始</button>

        <div class="completion-message" id="completionMessage">完成！</div>
        <div class="final-text" id="finalText">0</div>
    </div>

    <div class="final-explosion" id="finalExplosion"></div>

    <script>
        let countdownValue = 10;
        let countdownInterval;
        let totalTime = 10; // 总共10秒
        let startTime;
        const countdownElement = document.getElementById('countdown');
        const progressBar = document.querySelector('.progress-bar');
        const counterText = document.getElementById('counterText');
        const restartBtn = document.getElementById('restartBtn');
        const completionMessage = document.getElementById('completionMessage');
        const finalText = document.getElementById('finalText');
        const finalExplosion = document.getElementById('finalExplosion');
        const glow = document.getElementById('glow');

        // 初始化倒计时
        function initCountdown() {
            countdownValue = 10;
            countdownElement.textContent = countdownValue;
            countdownElement.className = 'neon-number';
            counterText.textContent = '倒计时进行中...';
            restartBtn.style.display = 'none';
            completionMessage.classList.remove('active');
            finalText.style.opacity = '0';
            finalText.textContent = '0';

            // 重置进度条
            const circumference = 2 * Math.PI * 140;
            progressBar.style.strokeDashoffset = circumference;

            // 隐藏完成信息
            document.querySelectorAll('.final-dot').forEach(dot => dot.remove());
        }

        // 更新倒计时
        function updateCountdown() {
            if (countdownValue <= 0) {
                clearInterval(countdownInterval);
                finishCountdown();
                return;
            }

            // 更新数字
            countdownElement.textContent = countdownValue;

            // 在最后3秒增加紧张感
            if (countdownValue <= 3) {
                countdownElement.classList.add('last-seconds', 'pulse');
                createFlashEffect();
            } else {
                countdownElement.classList.remove('last-seconds', 'pulse');
            }

            // 计算进度
            const elapsed = totalTime - countdownValue;
            const progress = elapsed / totalTime;
            const circumference = 2 * Math.PI * 140;
            const offset = circumference * (1 - progress);
            progressBar.style.strokeDashoffset = offset;

            // 更新文本
            counterText.textContent = `还剩 ${countdownValue} 秒`;

            countdownValue--;
        }

        // 完成倒计时
        function finishCountdown() {
            // 显示完成信息
            countdownElement.textContent = '0';
            finalText.textContent = '0';
            counterText.textContent = '倒计时结束！';
            completionMessage.textContent = '完成！';
            completionMessage.classList.add('active');
            finalText.classList.add('active');
            finalText.style.opacity = '1';

            // 显示重新开始按钮
            restartBtn.style.display = 'inline-block';

            // 创建最终爆炸效果
            createFinalExplosion();
        }

        // 创建闪烁效果
        function createFlashEffect() {
            countdownElement.classList.add('flash');
            setTimeout(() => {
                countdownElement.classList.remove('flash');
            }, 200);

            // 创建光晕效果
            createGlowEffect();
        }

        // 创建光晕效果
        function createGlowEffect() {
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // 随机位置
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 100;
                const x = 50 + Math.cos(angle) * distance;
                const y = 50 + Math.sin(angle) * distance;

                particle.style.left = x + '%';
                particle.style.top = y + '%';

                // 随机颜色
                const colors = ['#0ff', '#f1c40f', '#e74c3c', '#3498db'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                glow.appendChild(particle);

                // 动画
                particle.animate([
                    { opacity: 1, transform: 'scale(1)', top: y + '%', left: x + '%' },
                    { opacity: 0, transform: 'scale(0.5)', top: (y - 10) + '%', left: (x - 10) + '%' }
                ], {
                    duration: 800,
                    easing: 'ease-out'
                });

                // 移除元素
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 800);
            }
        }

        // 创建最终爆炸效果
        function createFinalExplosion() {
            finalExplosion.style.opacity = '1';
            const dotCount = 200;

            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'final-dot';

                // 随机位置
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100;
                const x = 50 + Math.cos(angle) * distance;
                const y = 50 + Math.sin(angle) * distance;

                dot.style.left = x + '%';
                dot.style.top = y + '%';

                // 随机颜色
                const colors = ['#f1c40f', '#e74c3c', '#3498db', '#9b59b6', '#1abc9c'];
                dot.style.background = colors[Math.floor(Math.random() * colors.length)];

                finalExplosion.appendChild(dot);

                // 动画
                dot.animate([
                    { opacity: 1, transform: 'translate(0, 0) scale(1)', width: '10px', height: '10px' },
                    { opacity: 0, transform: `translate(${Math.cos(angle)*200}px, ${Math.sin(angle)*200}px) scale(0.2)`, width: '2px', height: '2px' }
                ], {
                    duration: 2000,
                    easing: 'ease-out'
                });

                // 移除元素
                setTimeout(() => {
                    if (dot.parentNode) {
                        dot.parentNode.removeChild(dot);
                    }
                }, 2000);
            }

            // 几秒后淡出爆炸效果
            setTimeout(() => {
                finalExplosion.style.opacity = '0';
            }, 2000);
        }

        // 开始倒计时
        function startCountdown() {
            initCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        // 重新开始事件
        restartBtn.addEventListener('click', startCountdown);

        // 初始化
        startCountdown();
    </script>
</body>
</html>
