<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Countdown</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .countdown-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .neon-number {
            font-size: 220px;
            font-weight: bold;
            color: #fff;
            text-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #0ff,
                0 0 80px #0ff,
                0 0 120px #0ff;
            margin: 0;
            line-height: 1;
            transition: all 0.2s ease;
        }

        .progress-container {
            width: 300px;
            height: 300px;
            margin: 40px auto;
            position: relative;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-background {
            stroke: rgba(0, 255, 255, 0.2);
            stroke-width: 8;
            fill: transparent;
        }

        .progress-bar {
            stroke: #0ff;
            stroke-width: 8;
            fill: transparent;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s linear;
            filter: drop-shadow(0 0 10px #0ff);
        }

        .pulse {
            animation: pulse 0.5s infinite alternate;
        }

        .flash {
            animation: flash 0.15s;
        }

        @keyframes pulse {
            from { text-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #0ff,
                0 0 80px #0ff,
                0 0 120px #0ff; }
            to { text-shadow:
                0 0 15px #fff,
                0 0 30px #fff,
                0 0 60px #0ff,
                0 0 120px #0ff,
                0 0 180px #0ff; }
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #0ff;
            border-radius: 50%;
            opacity: 0;
        }

        .final-explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
        }

        .final-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f1c40f;
            border-radius: 50%;
            opacity: 0;
        }

        .last-seconds {
            text-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #f39c12,
                0 0 80px #f39c12,
                0 0 120px #f39c12 !important;
        }
    </style>
</head>
<body>
    <div class="glow" id="glow"></div>

    <div class="countdown-container">
        <h1 class="neon-number" id="countdown">10</h1>

        <div class="progress-container">
            <svg class="progress-ring" width="300" height="300">
                <circle class="progress-background" cx="150" cy="150" r="140"></circle>
                <circle class="progress-bar" cx="150" cy="150" r="140"
                    stroke-dasharray="879.2"
                    stroke-dashoffset="879.2">
                </circle>
            </svg>
        </div>
    </div>

    <div class="final-explosion" id="finalExplosion"></div>

    <script>
        let countdownValue = 10;
        let countdownInterval;
        let totalTime = 10; // 总共10秒
        const countdownElement = document.getElementById('countdown');
        const progressBar = document.querySelector('.progress-bar');
        const glow = document.getElementById('glow');

        // 初始化倒计时
        function initCountdown() {
            countdownValue = 10;
            countdownElement.textContent = countdownValue;
            countdownElement.className = 'neon-number';

            // 重置进度条
            const circumference = 2 * Math.PI * 140;
            progressBar.style.strokeDashoffset = circumference;
        }

        // 更新倒计时
        function updateCountdown() {
            if (countdownValue <= 0) {
                clearInterval(countdownInterval);
                finishCountdown();
                return;
            }

            // 更新数字
            countdownElement.textContent = countdownValue;

            // 在最后3秒增加紧张感
            if (countdownValue <= 3) {
                countdownElement.classList.add('last-seconds', 'pulse');
                createFlashEffect();
            } else {
                countdownElement.classList.remove('last-seconds', 'pulse');
            }

            // 计算进度
            const elapsed = totalTime - countdownValue;
            const progress = elapsed / totalTime;
            const circumference = 2 * Math.PI * 140;
            const offset = circumference * (1 - progress);
            progressBar.style.strokeDashoffset = offset;

            countdownValue--;
        }

        // 完成倒计时
        function finishCountdown() {
            countdownElement.textContent = '0';
            countdownElement.classList.add('pulse');

            // 创建最终爆炸效果
            createFinalExplosion();
        }

        // 创建闪烁效果
        function createFlashEffect() {
            countdownElement.classList.add('flash');
            setTimeout(() => {
                countdownElement.classList.remove('flash');
            }, 150);

            // 创建光晕效果
            createGlowEffect();
        }

        // 创建光晕效果
        function createGlowEffect() {
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // 随机位置
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 80;
                const x = 50 + Math.cos(angle) * distance;
                const y = 50 + Math.sin(angle) * distance;

                particle.style.left = x + '%';
                particle.style.top = y + '%';

                // 随机颜色
                const colors = ['#0ff', '#f1c40f', '#e74c3c', '#3498db'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                glow.appendChild(particle);

                // 动画
                particle.animate([
                    { opacity: 1, transform: 'scale(1)', top: y + '%', left: x + '%' },
                    { opacity: 0, transform: 'scale(0.3)', top: (y - 8) + '%', left: (x - 8) + '%' }
                ], {
                    duration: 600,
                    easing: 'ease-out'
                });

                // 移除元素
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 600);
            }
        }

        // 创建最终爆炸效果
        function createFinalExplosion() {
            const finalExplosion = document.getElementById('finalExplosion');
            finalExplosion.style.opacity = '1';
            const dotCount = 180;

            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'final-dot';

                // 随机位置
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100;
                const x = 50 + Math.cos(angle) * distance;
                const y = 50 + Math.sin(angle) * distance;

                dot.style.left = x + '%';
                dot.style.top = y + '%';

                // 随机颜色
                const colors = ['#f1c40f', '#e74c3c', '#3498db', '#9b59b6', '#1abc9c', '#f39c12'];
                dot.style.background = colors[Math.floor(Math.random() * colors.length)];

                finalExplosion.appendChild(dot);

                // 动画
                dot.animate([
                    { opacity: 1, transform: 'translate(0, 0) scale(1)', width: '8px', height: '8px' },
                    { opacity: 0, transform: `translate(${Math.cos(angle)*250}px, ${Math.sin(angle)*250}px) scale(0.1)`, width: '2px', height: '2px' }
                ], {
                    duration: 1800,
                    easing: 'ease-out'
                });

                // 移除元素
                setTimeout(() => {
                    if (dot.parentNode) {
                        dot.parentNode.removeChild(dot);
                    }
                }, 1800);
            }

            // 几秒后淡出爆炸效果
            setTimeout(() => {
                finalExplosion.style.opacity = '0';
            }, 1800);
        }

        // 开始倒计时
        function startCountdown() {
            initCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        // 初始化
        startCountdown();
    </script>
</body>
</html>
