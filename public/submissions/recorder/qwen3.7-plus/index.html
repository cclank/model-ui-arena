<!-- 设计说明：
     创建了一个具有三种状态的录音机界面：开始、暂停、停止，
     具备计时功能、波形动画反馈和录音摘要展示 -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录音机</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .recorder {
            width: 350px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        .display {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 25px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .waveform {
            height: 80px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bar {
            width: 6px;
            height: 10px;
            background: #ddd;
            margin: 0 2px;
            border-radius: 3px;
            transition: height 0.1s ease;
        }

        .recording .bar {
            animation: wave 1.5s infinite ease-in-out;
        }

        @keyframes wave {
            0%, 100% { height: 10px; background: #ddd; }
            50% { height: 40px; background: #e74c3c; }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .record-btn {
            background: #e74c3c;
            color: white;
        }

        .pause-btn {
            background: #f39c12;
            color: white;
        }

        .stop-btn {
            background: #3498db;
            color: white;
        }

        .status {
            margin: 15px 0;
            font-size: 18px;
            color: #666;
            height: 25px;
        }

        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
        }

        .summary-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .summary-content {
            color: #666;
            font-size: 14px;
        }

        .recording-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="recorder">
        <div class="display" id="timer">00:00</div>

        <div class="waveform" id="waveform">
            <!-- Bars will be generated by JavaScript -->
        </div>

        <div class="status" id="status">准备就绪</div>

        <div class="controls">
            <button class="btn record-btn" id="startBtn">●</button>
            <button class="btn pause-btn" id="pauseBtn" disabled>||</button>
            <button class="btn stop-btn" id="stopBtn" disabled>■</button>
        </div>

        <div class="summary">
            <div class="summary-title">录音摘要</div>
            <div class="summary-content" id="summaryContent">尚未开始录音</div>
        </div>
    </div>

    <script>
        let startTime;
        let elapsedTime = 0;
        let timerInterval;
        let isRecording = false;
        let isPaused = false;

        const timerDisplay = document.getElementById('timer');
        const waveformContainer = document.getElementById('waveform');
        const statusDisplay = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const summaryContent = document.getElementById('summaryContent');

        // 初始化波形条
        for (let i = 0; i < 30; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = (Math.random() * 20 + 5) + 'px';
            waveformContainer.appendChild(bar);
        }

        // 格式化时间
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // 更新计时器
        function updateTimer() {
            const currentTime = new Date().getTime();
            elapsedTime = currentTime - startTime;
            timerDisplay.textContent = formatTime(elapsedTime);
        }

        // 开始录音
        function startRecording() {
            if (isPaused) {
                // 如果是从暂停恢复，则调整开始时间
                startTime = new Date().getTime() - elapsedTime;
            } else {
                // 新开始录音
                startTime = new Date().getTime();
                elapsedTime = 0;
            }

            timerInterval = setInterval(updateTimer, 100);
            isRecording = true;
            isPaused = false;

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;

            statusDisplay.innerHTML = '<span class="recording-indicator"></span>录音中...';
            waveformContainer.classList.add('recording');
        }

        // 暂停录音
        function pauseRecording() {
            clearInterval(timerInterval);
            isPaused = true;

            startBtn.disabled = false;
            pauseBtn.disabled = true;

            statusDisplay.textContent = '已暂停';
            waveformContainer.classList.remove('recording');
        }

        // 停止录音
        function stopRecording() {
            clearInterval(timerInterval);
            isRecording = false;
            isPaused = false;

            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;

            statusDisplay.textContent = '已停止';
            waveformContainer.classList.remove('recording');

            // 更新摘要
            summaryContent.textContent = `录音时长: ${formatTime(elapsedTime)}, 状态: 已完成`;
        }

        // 事件监听器
        startBtn.addEventListener('click', startRecording);
        pauseBtn.addEventListener('click', pauseRecording);
        stopBtn.addEventListener('click', stopRecording);
    </script>
</body>
</html>
