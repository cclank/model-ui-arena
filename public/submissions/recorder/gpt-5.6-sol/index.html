<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Field Recorder</title>
<style>
:root{color-scheme:dark;--red:#ff4b3e;--lime:#c7ff4a;--ink:#eff0e8;--muted:#8c938a;--edge:#343936}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d0f0e;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;background-image:linear-gradient(#ffffff03 1px,transparent 1px),linear-gradient(90deg,#ffffff03 1px,transparent 1px);background-size:32px 32px}
.recorder{width:min(760px,94vw);background:#1a1d1b;border:1px solid #404640;border-radius:8px;box-shadow:0 32px 80px #000b,inset 0 1px #ffffff0c;overflow:hidden}.top{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid #080908;color:#9ca29c;font:700 10px ui-monospace,monospace;letter-spacing:.16em}.serial{color:var(--lime)}
.workspace{display:grid;grid-template-columns:1.55fr .85fr}.monitor{padding:28px;border-right:1px solid #080908}.display{background:#080b09;border:1px solid #343b35;border-radius:4px;padding:20px;box-shadow:inset 0 0 28px #000}.status{display:flex;align-items:center;justify-content:space-between;font:700 11px ui-monospace,monospace;letter-spacing:.14em;color:var(--muted)}.state-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#58605a;margin-right:8px}.recording .state-dot{background:var(--red);box-shadow:0 0 12px var(--red);animation:blink 1s infinite}.paused .state-dot{background:#ffc94b}
#time{font:300 clamp(48px,8vw,82px)/1 ui-monospace,SFMono-Regular,monospace;letter-spacing:-.08em;margin:24px 0 18px;font-variant-numeric:tabular-nums}.wave{height:92px;display:flex;align-items:center;gap:3px;border-block:1px solid #273027;overflow:hidden}.bar{flex:1;min-width:2px;height:calc(8% + var(--v)*1%);background:linear-gradient(to top,#4f6e4b,var(--lime));opacity:.32;transition:height .12s}.recording .bar{opacity:.9;animation:level .65s ease-in-out infinite alternate;animation-delay:calc(var(--i)*-31ms)}.paused .bar{height:4%;opacity:.28}
.track{display:flex;justify-content:space-between;margin-top:14px;font:10px ui-monospace,monospace;color:#6f786f}.controls{padding:28px 22px;display:flex;flex-direction:column;justify-content:center;gap:12px}.controls button{height:52px;border:1px solid var(--edge);border-radius:4px;background:#242824;color:var(--ink);font:700 11px ui-monospace,monospace;letter-spacing:.12em;cursor:pointer;box-shadow:inset 0 1px #ffffff0c;transition:.18s}.controls button:hover{border-color:#747d74;transform:translateY(-1px)}.controls button:disabled{opacity:.35;transform:none;cursor:not-allowed}#start{color:var(--red);border-left:3px solid var(--red)}#pause{color:#ffd067}#stop{color:#b9c2b9}.microcopy{font-size:11px;line-height:1.5;color:var(--muted);min-height:34px}
.summary{display:none;margin:0 28px 28px;border-top:1px solid var(--edge);padding-top:18px;grid-template-columns:repeat(3,1fr);gap:16px}.summary.show{display:grid}.summary span{display:block;color:var(--muted);font:10px ui-monospace,monospace;letter-spacing:.1em}.summary b{font:500 15px ui-monospace,monospace}.meter{height:3px;background:#252a26}.meter i{display:block;width:0;height:100%;background:var(--red);box-shadow:0 0 10px var(--red);transition:width .2s}.recording .meter i{width:88%;animation:breathe 1.8s infinite}
@keyframes blink{50%{opacity:.25}}@keyframes level{to{height:calc(18% + var(--v)*.72%)}}@keyframes breathe{50%{width:45%}}@media(max-width:620px){.workspace{grid-template-columns:1fr}.monitor{border-right:0;border-bottom:1px solid #080908;padding:20px}.controls{display:grid;grid-template-columns:repeat(3,1fr);padding:18px}.controls button{height:48px}.microcopy{grid-column:1/-1}.summary{margin:0 20px 20px}#time{margin:18px 0}.wave{height:74px}}
</style></head><body>
<main class="recorder" id="unit"><header class="top"><span>SR-56 FIELD RECORDER</span><span class="serial">48 kHz / 24 BIT</span></header><div class="meter"><i></i></div>
<div class="workspace"><section class="monitor"><div class="display"><div class="status"><span><i class="state-dot"></i><b id="state">READY</b></span><span>CH 01 / STEREO</span></div><div id="time">00:00</div><div class="wave" id="wave"></div><div class="track"><span>-48</span><span>-24</span><span>-12</span><span>-6</span><span>0 dB</span></div></div></section>
<aside class="controls"><button id="start">● START</button><button id="pause" disabled>Ⅱ PAUSE</button><button id="stop" disabled>■ STOP</button><p class="microcopy" id="hint">按下 START 建立新的现场录音。</p></aside></div>
<section class="summary" id="summary"><div><span>TAKE</span><b id="take">REC-001</b></div><div><span>DURATION</span><b id="duration">00:00</b></div><div><span>RESULT</span><b>已安全保存</b></div></section></main>
<script>
const unit=document.querySelector('#unit'),time=document.querySelector('#time'),state=document.querySelector('#state'),hint=document.querySelector('#hint'),start=document.querySelector('#start'),pause=document.querySelector('#pause'),stop=document.querySelector('#stop'),summary=document.querySelector('#summary'),wave=document.querySelector('#wave');
for(let i=0;i<46;i++)wave.insertAdjacentHTML('beforeend',`<i class="bar" style="--i:${i};--v:${10+Math.random()*82}"></i>`);let mode='ready',elapsed=0,began=0,take=0,confirmUntil=0,raf;
const fmt=ms=>`${String(Math.floor(ms/60000)).padStart(2,'0')}:${String(Math.floor(ms/1000)%60).padStart(2,'0')}`;
function paint(){const total=elapsed+(mode==='recording'?performance.now()-began:0);time.textContent=fmt(total);if(mode==='recording')raf=requestAnimationFrame(paint)}
function setMode(next){mode=next;unit.className=`recorder ${next}`;state.textContent={ready:'READY',recording:'RECORDING',paused:'PAUSED',stopped:'COMPLETE'}[next];start.disabled=next==='recording'||next==='paused';pause.disabled=next!=='recording'&&next!=='paused';stop.disabled=next!=='recording'&&next!=='paused';pause.textContent=next==='paused'?'▶ RESUME':'Ⅱ PAUSE'}
start.onclick=()=>{cancelAnimationFrame(raf);elapsed=0;began=performance.now();take++;summary.classList.remove('show');hint.textContent='正在捕捉信号，电平保持在安全范围。';setMode('recording');paint()};
pause.onclick=()=>{if(mode==='recording'){elapsed+=performance.now()-began;cancelAnimationFrame(raf);hint.textContent='录音已暂停，继续操作不会丢失当前片段。';setMode('paused')}else{began=performance.now();hint.textContent='继续录音中。';setMode('recording');paint()}};
stop.onclick=()=>{const now=Date.now();if(now>confirmUntil){confirmUntil=now+2400;hint.textContent='再次按 STOP 确认结束并保存。';stop.textContent='■ CONFIRM';return}if(mode==='recording')elapsed+=performance.now()-began;cancelAnimationFrame(raf);time.textContent=fmt(elapsed);document.querySelector('#duration').textContent=fmt(elapsed);document.querySelector('#take').textContent=`REC-${String(take).padStart(3,'0')}`;summary.classList.add('show');hint.textContent='本次录音已封装，可开始下一条。';stop.textContent='■ STOP';setMode('stopped')};
</script></body></html>
