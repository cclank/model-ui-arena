<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recorder</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#321232,#090b12 65%);color:#fff;font-family:system-ui}.app{width:min(92vw,430px);padding:20px;border-radius:28px;background:rgba(255,255,255,.06);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1)}.title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;color:#ffb0c1}.dot{width:11px;height:11px;border-radius:50%;background:#666}.dot.on{background:#ff465a;box-shadow:0 0 0 0 rgba(255,70,90,.45);animation:p 1.2s infinite}@keyframes p{0%{box-shadow:0 0 0 0 rgba(255,70,90,.45)}70%{box-shadow:0 0 0 14px rgba(255,70,90,0)}100%{box-shadow:0 0 0 0 rgba(255,70,90,0)}}.timer{font-size:56px;font-weight:900;letter-spacing:.05em;text-align:center;margin:8px 0 12px}.wave{height:88px;display:flex;gap:6px;align-items:center;justify-content:center;margin:8px 0}.bar{width:8px;border-radius:999px;background:linear-gradient(180deg,#ff8fb0,#ff5e76);height:12px;transform-origin:center bottom;animation:wave .8s ease-in-out infinite alternate}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}button{border:0;border-radius:16px;padding:14px 10px;font-weight:700;color:#fff;background:#2b3148}button.primary{background:linear-gradient(135deg,#ff5c7c,#ff8d66)}button:disabled{opacity:.35}.summary{margin-top:14px;padding:14px;border-radius:18px;background:rgba(0,0,0,.18);color:#d8ddff;min-height:74px;line-height:1.5}.safe{margin-top:10px;font-size:12px;color:#ffcfda;opacity:.8}@keyframes wave{from{transform:scaleY(.3);opacity:.45}to{transform:scaleY(1.25);opacity:1}}@media (max-width:390px){.timer{font-size:48px}}</style></head><body><div class="app"><div class="title"><strong>模拟录音机</strong><span class="dot" id="dot"></span></div><div class="timer" id="timer">00:00</div><div class="wave" id="wave"></div><div class="controls"><button id="start" class="primary">Start</button><button id="pause" disabled>Pause</button><button id="stop" disabled>Stop</button></div><div class="safe">Stop 会二次确认，防误触</div><div class="summary" id="sum">等待开始录音…</div></div><script>const w=document.getElementById('wave'),dot=document.getElementById('dot'),t=document.getElementById('timer'),sum=document.getElementById('sum');for(let i=0;i<24;i++)w.insertAdjacentHTML('beforeend',`<i class=bar style="height:${10+Math.random()*54}px;animation-delay:-${Math.random()}s"></i>`);let s='idle',ms=0,tm=null,confirmStop=false;const fmt=n=>String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0');function render(){t.textContent=fmt(Math.floor(ms/1000));dot.className='dot'+(s==='rec'?' on':'');start.disabled=s==='rec';pause.disabled=s==='idle';stop.disabled=s==='idle';pause.textContent=s==='pause'?'Resume':'Pause'}function tick(){ms+=200;render();tm=setTimeout(tick,200)}start.onclick=()=>{if(s==='rec')return;s='rec';confirmStop=false;sum.textContent='录音中…';if(!tm)tick();render()};pause.onclick=()=>{if(s==='idle')return;s=s==='pause'?'rec':'pause';sum.textContent=s==='pause'?'已暂停，等待继续…':'录音继续中…';if(s==='rec'&&!tm)tick();else if(s==='pause'&&tm){clearTimeout(tm);tm=null}render()};stop.onclick=()=>{if(!confirmStop){confirmStop=true;sum.textContent='再点一次确认停止';setTimeout(()=>confirmStop=false,1500);return}if(tm){clearTimeout(tm);tm=null}s='idle';sum.innerHTML=`录音已结束<br>时长：${fmt(Math.floor(ms/1000))}<br>状态：已停止`;ms=0;confirmStop=false;render()};render()</script></body></html>
