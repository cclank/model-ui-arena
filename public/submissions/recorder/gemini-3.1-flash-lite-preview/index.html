<!DOCTYPE html>
<html><body>
<h1>语音记录</h1>
<button id="btn">点击录音</button>
<p id="status">就绪</p>
<script>
document.getElementById('btn').onclick = () => {
    document.getElementById('status').innerText = '录音中...';
    setTimeout(() => document.getElementById('status').innerText = '已保存', 2000);
}
</script>
</body></html>
