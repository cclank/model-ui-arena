<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed-2.0-Pro Recorder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1e1e 0%, #3a3a3a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
        }
        .recorder {
            width: 360px;
            background: #2d2d2d;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            transition: all 0.3s ease;
        }
        .status-dot.recording {
            background: #ff3b30;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .timer {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }
        .waveform {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 2rem;
        }
        .wave-bar {
            width: 4px;
            background: #007aff;
            border-radius: 2px;
            transition: height 0.1s ease;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-start {
            background: #34c759;
            color: #fff;
        }
        .btn-start:hover:not(:disabled) {
            background: #28a745;
            transform: translateY(-2px);
        }
        .btn-pause {
            background: #ff9500;
            color: #fff;
        }
        .btn-pause:hover:not(:disabled) {
            background: #e68900;
            transform: translateY(-2px);
        }
        .btn-stop {
            background: #ff3b30;
            color: #fff;
        }
        .btn-stop:hover:not(:disabled) {
            background: #e03024;
            transform: translateY(-2px);
        }
        .summary {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            display: none;
        }
        .summary.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .summary h3 {
            margin-bottom: 1rem;
            color: #007aff;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .summary-item .label {
            opacity: 0.7;
        }
        @media (max-width: 390px) {
            .recorder {
                width: 95vw;
                padding: 1.5rem;
            }
            .timer {
                font-size: 2.5rem;
            }
            .controls {
                gap: 0.5rem;
            }
            .btn {
                padding: 0.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="recorder">
        <div class="header">
            <div class="status-dot"></div>
            <div class="title">录音机</div>
            <div style="width: 12px;"></div>
        </div>
        <div class="timer">00:00</div>
        <div class="waveform"></div>
        <div class="controls">
            <button class="btn btn-start">开始</button>
            <button class="btn btn-pause" disabled>暂停</button>
            <button class="btn btn-stop" disabled>停止</button>
        </div>
        <div class="summary">
            <h3>录音完成</h3>
            <div class="summary-item">
                <span class="label">总时长</span>
                <span class="value" id="summary-duration">00:00</span>
            </div>
            <div class="summary-item">
                <span class="label">状态</span>
                <span class="value" id="summary-status">已保存</span>
            </div>
            <div class="summary-item">
                <span class="label">文件大小</span>
                <span class="value">~1.2MB</span>
            </div>
        </div>
    </div>
    <script>
        let seconds = 0;
        let timer = null;
        let isRecording = false;
        let isPaused = false;
        const statusDot = document.querySelector('.status-dot');
        const timerEl = document.querySelector('.timer');
        const waveformEl = document.querySelector('.waveform');
        const startBtn = document.querySelector('.btn-start');
        const pauseBtn = document.querySelector('.btn-pause');
        const stopBtn = document.querySelector('.btn-stop');
        const summaryEl = document.querySelector('.summary');
        const summaryDuration = document.getElementById('summary-duration');
        // 生成波形条
        for (let i = 0; i < 30; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            bar.style.height = `${Math.random() * 60 + 10}px`;
            waveformEl.appendChild(bar);
        }
        const bars = document.querySelectorAll('.wave-bar');
        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerEl.textContent = `${mins}:${secs}`;
        }
        function animateWaveform() {
            if (!isRecording || isPaused) return;
            bars.forEach(bar => {
                bar.style.height = `${Math.random() * 70 + 10}px`;
            });
            requestAnimationFrame(animateWaveform);
        }
        startBtn.addEventListener('click', () => {
            isRecording = true;
            isPaused = false;
            statusDot.classList.add('recording');
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            summaryEl.classList.remove('show');
            if (!timer) {
                timer = setInterval(updateTimer, 1000);
            }
            animateWaveform();
        });
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
            statusDot.style.animationPlayState = isPaused ? 'paused' : 'running';
            if (!isPaused) animateWaveform();
        });
        stopBtn.addEventListener('click', () => {
            if (confirm('确定要停止录音吗？')) {
                isRecording = false;
                clearInterval(timer);
                timer = null;
                statusDot.classList.remove('recording');
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
                pauseBtn.textContent = '暂停';
                summaryDuration.textContent = timerEl.textContent;
                summaryEl.classList.add('show');
                seconds = 0;
                timerEl.textContent = '00:00';
            }
        });
    </script>
</body>
</html>
