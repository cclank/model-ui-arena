<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Studio Memo Deck</title>
<style>
:root{--bg:#120e14;--panel:#201722;--metal:#f3e4c6;--ink:#f7f3ea;--red:#ff5d5d;--gold:#f4c56f;--cyan:#87e6ff}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{display:grid;place-items:center;padding:18px;font-family:"Gill Sans","PingFang SC",sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 10%,rgba(244,197,111,.18),transparent 30%),linear-gradient(145deg,#0f0b12,#25192a 55%,#120d14)}
.deck{width:min(94vw,450px);padding:20px;border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.12));border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 80px rgba(0,0,0,.45)}
.head,.sub,.actions,.chips{display:flex;justify-content:space-between;align-items:center;gap:10px}.head b{font-size:12px;letter-spacing:.24em;text-transform:uppercase}.status{display:flex;align-items:center;gap:8px;font-size:12px}.dot{width:10px;height:10px;border-radius:50%;background:#716267}.live .dot{background:var(--red);box-shadow:0 0 14px rgba(255,93,93,.9);animation:blink 1s infinite}
.machine{position:relative;margin:16px 0;padding:18px;border-radius:24px;background:linear-gradient(180deg,#16141d,#221d2b);border:1px solid rgba(255,255,255,.08)}
.reels{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}.reel{position:relative;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#5a4456 0 18%,#d0bfaa 19% 21%,#2a2433 22% 54%,#d6c5ae 55% 58%,#1a1620 59%);box-shadow:inset 0 0 20px rgba(0,0,0,.45)}.reel:before,.reel:after{content:"";position:absolute;inset:14%;border-radius:50%;border:2px dashed rgba(255,255,255,.22)}.spoke{position:absolute;left:50%;top:50%;width:12%;height:40%;background:rgba(255,255,255,.28);transform-origin:50% 100%;border-radius:99px;translate:-50% -100%}.tape{position:absolute;left:18%;right:18%;top:50%;height:10px;translate:0 -50%;border-radius:999px;background:linear-gradient(90deg,var(--gold) calc(var(--fill,0)*1%),rgba(255,255,255,.1) 0)}
.screen{margin-top:16px;padding:16px;border-radius:18px;background:linear-gradient(180deg,#09161b,#122930);border:1px solid rgba(135,230,255,.16)}.timer{font-size:52px;letter-spacing:.12em;text-align:center;font-variant-numeric:tabular-nums}.sub{margin-top:8px;font-size:13px;color:#bcd6dd}.wave{display:flex;align-items:end;gap:4px;height:70px;margin-top:14px}.bar{flex:1;border-radius:12px 12px 4px 4px;background:linear-gradient(180deg,var(--cyan),var(--gold));height:18%;transition:.24s}
.actions{margin-top:16px}button{flex:1;border:0;border-radius:16px;padding:14px 10px;font:700 15px inherit;cursor:pointer;background:#eadabd;color:#271a19}button[data-kind="start"]{background:var(--red);color:#fff}button[data-kind="pause"]{background:#ffe09d}button:disabled{opacity:.42;cursor:not-allowed}
.summary{margin-top:16px;padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}.summary b{display:block;margin-bottom:10px;font-size:14px}.chips{flex-wrap:wrap;justify-content:flex-start}.chip{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px}
.deck.recording .reel{animation:spin 2.2s linear infinite}.deck.paused .reel{animation-play-state:paused}.deck.recording .machine{box-shadow:0 0 0 1px rgba(255,93,93,.12),0 0 36px rgba(255,93,93,.12)}@keyframes spin{to{rotate:1turn}}@keyframes blink{50%{opacity:.3}}@media (max-width:390px){.timer{font-size:42px}.deck{padding:16px}.reels{gap:18px}}
</style>
</head>
<body>
<section class="deck" id="deck">
  <div class="head"><b>Studio Memo</b><div class="status" id="status"><span class="dot"></span><span id="label">待机</span></div></div>
  <div class="machine">
    <div class="reels"><div class="reel" id="left"></div><div class="reel" id="right"></div></div><div class="tape" id="tape"></div>
    <div class="screen"><div class="timer" id="timer">00:00</div><div class="sub"><span id="mode">准备记录片段</span><span id="note">Session 01</span></div><div class="wave" id="wave"></div></div>
  </div>
  <div class="actions"><button data-kind="start" id="start">Start</button><button data-kind="pause" id="pause" disabled>Pause</button><button id="stop" disabled>Stop</button></div>
  <div class="summary"><b>本次录音摘要</b><div class="chips" id="summary"><span class="chip">尚未录制内容</span></div></div>
</section>
<script>
const deck=document.getElementById('deck'),wave=document.getElementById('wave');for(let i=0;i<24;i++){const b=document.createElement('i');b.className='bar';wave.appendChild(b)}const bars=[...wave.children];
const ids=id=>document.getElementById(id),timer=ids('timer'),label=ids('label'),mode=ids('mode'),summary=ids('summary'),tape=ids('tape'),status=ids('status');
let state='idle',secs=0,frame=0,loop;const fmt=n=>`${String(n/60|0).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`;
function reel(id,a){const el=ids(id);el.innerHTML='';for(let i=0;i<3;i++){const s=document.createElement('i');s.className='spoke';s.style.transform=`translate(-50%,-100%) rotate(${a+i*120}deg)`;el.appendChild(s)}}
function render(){timer.textContent=fmt(secs);label.textContent={idle:'待机',recording:'录音中',paused:'已暂停',stopped:'已停止'}[state];mode.textContent={idle:'准备记录片段',recording:'磁带正在走带',paused:'暂停中，保留当前位置',stopped:'可以回看本次摘要'}[state];deck.className='deck '+(state==='recording'?'recording':state==='paused'?'paused':'');status.className='status'+(state==='recording'?' live':'');ids('start').disabled=state==='recording';ids('pause').disabled=state!=='recording';ids('stop').disabled=state==='idle'||state==='stopped';tape.style.setProperty('--fill',Math.min(secs*2,100));bars.forEach((bar,i)=>{const live=state==='recording',base=live?28+Math.abs(Math.sin((frame+i)*.55))*62:state==='paused'?18+(i%4)*6:10+(i%5)*4;bar.style.height=base+'%';bar.style.opacity=live?1:.65});reel('left',frame*10);reel('right',-frame*12)}
function start(){if(state==='idle'||state==='paused'){state='recording';clearInterval(loop);loop=setInterval(()=>{secs++;frame++;render()},1000);render()}}
function pause(){if(state==='recording'){state='paused';clearInterval(loop);render()}}
function stop(){if(state==='idle')return;if(state==='recording'&&secs>3&&!confirm('结束本次录音并生成摘要？'))return;clearInterval(loop);state='stopped';render();const quality=secs<20?'灵感快照':secs<45?'结构完整':'长段记录';summary.innerHTML=`<span class="chip">时长 ${fmt(secs)}</span><span class="chip">状态 ${quality}</span><span class="chip">波形 ${secs%2?'平稳':'活跃'}</span><span class="chip">${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})} 保存</span>`}
ids('start').onclick=start;ids('pause').onclick=pause;ids('stop').onclick=stop;render();
</script>
</body>
</html>
