<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>数据仪表盘</title>
<style>
:root{--bg:#0f1219;--card:#181e2a;--border:#2a3345;--text:#e8ecf4;--muted:#8694aa;--up:#4ade80;--down:#f87171;--accent:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,"PingFang SC",sans-serif;padding:20px}
h1{font-size:20px;margin-bottom:4px}
.sub{color:var(--muted);font-size:12px;margin-bottom:16px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tabs button{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font:inherit;cursor:pointer;transition:.15s}
.tabs button.active{border-color:var(--accent);color:var(--accent)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.kpi-label{color:var(--muted);font-size:12px;margin-bottom:6px}
.kpi-val{font-size:28px;font-weight:700;transition:opacity .3s}
.kpi-trend{font-size:13px;margin-top:4px}
.kpi-trend.up{color:var(--up)}
.kpi-trend.down{color:var(--down)}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-title{color:var(--muted);font-size:12px;margin-bottom:10px}
svg.chart{width:100%;height:180px;display:block}
.axis{stroke:var(--border);stroke-width:1}
.line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.dot{fill:var(--accent);cursor:pointer;transition:r .12s}
.dot:hover{r:8}
.area{fill:url(#aG);opacity:.3}
@media(max-width:640px){.kpis{grid-template-columns:1fr}body{padding:12px}h1{font-size:17px}}
</style>
</head>
<body>
<h1>业务监控面板</h1>
<p class="sub">实时数据概览 · 全部 Mock 数据</p>
<div class="tabs" id="tabs"></div>
<div class="kpis" id="kpis"></div>
<div class="chart-wrap">
  <p class="chart-title" id="cT">日活趋势</p>
  <svg class="chart" viewBox="0 0 700 180" preserveAspectRatio="none">
    <defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient></defs>
    <line class="axis" x1="0" y1="179" x2="700" y2="179"/>
    <path class="area" id="ar"/><polyline class="line" id="ln"/><g id="ds"></g>
  </svg>
</div>
<script>
(function(){
var D={
'7d':{kpis:[{l:'用户总数',v:'12.4 万',d:'+3.2%',u:1},{l:'日活收入',v:'58.6 万',d:'+7.1%',u:1},{l:'转化率',v:'4.2%',d:'-0.3%',u:0}],pts:[48,52,55,51,58,62,59],t:'近 7 天日活（万）'},
'30d':{kpis:[{l:'用户总数',v:'11.8 万',d:'+2.1%',u:1},{l:'日活收入',v:'52.3 万',d:'+5.4%',u:1},{l:'转化率',v:'4.5%',d:'+0.2%',u:1}],pts:[35,38,42,40,44,48,52],t:'近 30 天周活（万）'},
'90d':{kpis:[{l:'用户总数',v:'10.2 万',d:'+8.7%',u:1},{l:'日活收入',v:'45.1 万',d:'+12.3%',u:1},{l:'转化率',v:'3.9%',d:'-0.8%',u:0}],pts:[22,28,31,35,40,45,51],t:'近 90 天月活（万）'}
};
var ps=['7d','30d','90d'],cur='7d';
function render(){
  var d=D[cur],h='';
  d.kpis.forEach(function(k){
    h+='<div class="kpi"><p class="kpi-label">'+k.l+'</p><div class="kpi-val">'+k.v+'</div><p class="kpi-trend '+(k.u?'up':'down')+'">'+(k.u?'↑':'↓')+' '+k.d+'</p></div>';
  });
  document.getElementById('kpis').innerHTML=h;
  document.getElementById('cT').textContent=d.t;
  var p=d.pts,mx=Math.max.apply(null,p),mn=Math.min.apply(null,p),r=mx-mn||1;
  var c=p.map(function(v,i){return[i*700/(p.length-1),170-(v-mn)/r*160];});
  var pl=c.map(function(a){return a[0]+','+a[1];}).join(' ');
  document.getElementById('ln').setAttribute('points',pl);
  document.getElementById('ar').setAttribute('d','M0,179 L'+c.map(function(a){return a[0]+','+a[1];}).join(' L')+' L700,179Z');
  var dh='';c.forEach(function(a,i){dh+='<circle class="dot" cx="'+a[0]+'" cy="'+a[1]+'" r="5.5"><title>'+p[i]+'</title></circle>';});
  document.getElementById('ds').innerHTML=dh;
}
function init(){
  var h='';ps.forEach(function(p){h+='<button data-p="'+p+'"'+(p===cur?' class="active"':'')+'>'+p+'</button>';});
  var t=document.getElementById('tabs');t.innerHTML=h;
  t.onclick=function(e){var b=e.target.closest('button');if(!b)return;cur=b.dataset.p;
    t.querySelectorAll('button').forEach(function(x){x.className=x.dataset.p===cur?'active':'';});render();};
}
init();render();
})();
</script>
</body>
</html>
