  .sheen{animation:sheen 3.4s ease-in-out infinite}

  .blink{animation:blink 1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:.25}}
  .grass-bit{animation:kick 1.1s ease-out infinite}
  .grass-bit.g2{animation-delay:.36s}.grass-bit.g3{animation-delay:.7s}
  @keyframes kick{0%{opacity:0;transform:translate(0,0) rotate(0)}
    18%{opacity:1}100%{opacity:0;transform:translate(-52px,-50px) rotate(-160deg)}}
  .conf i{position:absolute;top:-6%;border-radius:2px;opacity:.95;animation:fall linear infinite}
  @keyframes fall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(118vh) rotate(660deg)}}
  .stage{position:relative}
  .conf{position:absolute;inset:0;overflow:hidden;pointer-events:none}

  const conf=document.querySelector(".conf");
  for(let i=0;i<26;i++){
    const c=document.createElement("i");
    const gold=Math.random()<.7;
    c.style.left=Math.random()*100+"%";
    c.style.width=(4+Math.random()*5)+"px";
    c.style.height=(10+Math.random()*12)+"px";
    c.style.background=gold?`hsl(${44+Math.random()*14},90%,${58+Math.random()*18}%)`:"#f3f6ff";
    c.style.animationDuration=(3.4+Math.random()*4)+"s";
    c.style.animationDelay=(-Math.random()*6)+"s";
    conf.appendChild(c);
  }
</script>
</body>
</html>
