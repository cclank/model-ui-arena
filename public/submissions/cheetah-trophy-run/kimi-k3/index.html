<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猎豹托举大力神杯 · 补时绝杀冠军冲刺</title>
<style>
  :root{
    --gold:#f4c430;
    --gold-deep:#b8860b;
    --night:#070b1d;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:radial-gradient(120% 90% at 50% 0%, #101a3f 0%, #070b1d 55%, #04060f 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:"Avenir Next","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
    overflow:hidden;
  }
  .stage{
    width:min(1200px,100vw);
    padding:clamp(4px,1.5vw,18px);
  }
  svg#poster{
    width:100%;height:auto;display:block;
    border-radius:18px;
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(244,196,48,.12);
  }

  /* ---------- 动效 ---------- */
  @keyframes confettiFall{
    0%{transform:translateY(-8%) rotate(0deg);}
    100%{transform:translateY(920px) rotate(420deg);}
  }
  .confetti-piece{
    transform-box:fill-box;transform-origin:center;
    animation:confettiFall linear infinite;
    will-change:transform;
  }
  @keyframes dashSlide{
    from{stroke-dashoffset:0;}
    to{stroke-dashoffset:-220;}
  }
  .speedline{
    stroke-dasharray:46 26;
    animation:dashSlide 1.1s linear infinite;
  }
  @keyframes trophyPulse{
    0%,100%{opacity:.35;transform:scale(1);}
    50%{opacity:.65;transform:scale(1.06);}
  }
  #trophy-glow{
    transform-box:fill-box;transform-origin:center;
    animation:trophyPulse 2.6s ease-in-out infinite;
  }
  @keyframes sparkBlink{
    0%,100%{opacity:.15;transform:scale(.6) rotate(0deg);}
    50%{opacity:1;transform:scale(1.15) rotate(25deg);}
  }
  .spark{
    transform-box:fill-box;transform-origin:center;
    animation:sparkBlink 1.8s ease-in-out infinite;
  }
  @keyframes ballBob{
    0%,100%{transform:translate(0,0) rotate(0deg);}
    50%{transform:translate(10px,-7px) rotate(14deg);}
  }
  #ball-spin{
    transform-box:fill-box;transform-origin:center;
    animation:ballBob 1.4s ease-in-out infinite;
  }
  @keyframes ghostBreathe{
    0%,100%{opacity:.16;}
    50%{opacity:.24;}
  }
  .ghost{animation:ghostBreathe 1.8s ease-in-out infinite;}
  @keyframes beamSway{
    0%,100%{opacity:.5;}
    50%{opacity:.75;}
  }
  .beam{animation:beamSway 4s ease-in-out infinite;}
  @keyframes boardTick{
    0%,49%{opacity:1;}
    50%,100%{opacity:.25;}
  }
  .tick{animation:boardTick 1s steps(1) infinite;}
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;}
  }
</style>
</head>
<body>
<main class="stage">
<svg id="poster" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="拟人化猎豹在补时绝杀后高举大力神杯在球场冲刺庆祝">
  <title>cheetah-trophy-run — 猎豹托举大力神杯冲刺</title>

  <defs>
    <!-- ======== 渐变 ======== -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1030"/>
      <stop offset=".45" stop-color="#15245c"/>
      <stop offset=".8" stop-color="#241a4e"/>
      <stop offset="1" stop-color="#1a1238"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff8d6" stop-opacity=".9"/>
      <stop offset=".4" stop-color="#ffe98a" stop-opacity=".35"/>
      <stop offset="1" stop-color="#ffe98a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbe8" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fffbe8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pitchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fa34e"/>
      <stop offset=".55" stop-color="#1e7d38"/>
      <stop offset="1" stop-color="#0e5222"/>
    </linearGradient>
    <linearGradient id="furGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6bd5c"/>
      <stop offset=".5" stop-color="#eda63c"/>
      <stop offset="1" stop-color="#d08124"/>
    </linearGradient>
    <linearGradient id="furFar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d99a3a"/>
      <stop offset="1" stop-color="#b06f1e"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9e2b2"/>
      <stop offset="1" stop-color="#f2cd8f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a5a00"/>
      <stop offset=".18" stop-color="#f7d154"/>
      <stop offset=".38" stop-color="#fff3b0"/>
      <stop offset=".55" stop-color="#f4c430"/>
      <stop offset=".78" stop-color="#c99412"/>
      <stop offset="1" stop-color="#7a4d00"/>
    </linearGradient>
    <radialGradient id="globeGrad" cx=".38" cy=".3" r=".85">
      <stop offset="0" stop-color="#fff6c4"/>
      <stop offset=".45" stop-color="#f4c430"/>
      <stop offset=".8" stop-color="#c08a08"/>
      <stop offset="1" stop-color="#8a5a00"/>
    </radialGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#159a52"/>
      <stop offset=".5" stop-color="#0d6e3a"/>
      <stop offset="1" stop-color="#074626"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx=".35" cy=".3" r=".9">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".7" stop-color="#e8e8e8"/>
      <stop offset="1" stop-color="#b9b9b9"/>
    </radialGradient>
    <radialGradient id="vignette" cx=".5" cy=".46" r=".75">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset=".72" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".5"/>
    </radialGradient>

    <!-- ======== 滤镜 ======== -->
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blurGhost" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="blurSpeed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="shadowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>

    <clipPath id="ballClip"><circle cx="0" cy="0" r="27"/></clipPath>
  </defs>

  <!-- ================= 背景：夜空 ================= -->
  <g id="bg-sky">
    <rect x="0" y="0" width="1200" height="800" fill="url(#skyGrad)"/>
    <circle cx="150" cy="90" r="1.6" fill="#fff" opacity=".7"/>
    <circle cx="300" cy="50" r="1.2" fill="#fff" opacity=".5"/>
    <circle cx="520" cy="80" r="1.8" fill="#fff" opacity=".65"/>
    <circle cx="880" cy="60" r="1.4" fill="#fff" opacity=".55"/>
    <circle cx="1050" cy="110" r="1.7" fill="#fff" opacity=".7"/>
    <circle cx="700" cy="40" r="1.1" fill="#fff" opacity=".45"/>
    <circle cx="960" cy="30" r="1.3" fill="#fff" opacity=".5"/>
  </g>

  <!-- ================= 背景灯光：球场照明塔 ================= -->
  <g id="stadium-lights">

    <g id="light-tower-left">
      <polygon class="beam" points="92,112 340,560 -60,560" fill="url(#beamGrad)" opacity=".55"/>
      <rect x="86" y="118" width="10" height="190" rx="3" fill="#1c2440"/>
      <rect x="58" y="88" width="66" height="30" rx="7" fill="#232d4d" stroke="#3a4670" stroke-width="2"/>
      <circle cx="70" cy="103" r="6" fill="#fff6d0" filter="url(#softGlow)"/>
      <circle cx="91" cy="103" r="6" fill="#fff6d0" filter="url(#softGlow)"/>

      <ellipse cx="91" cy="103" rx="46" ry="30" fill="url(#lightGlow)" opacity=".6"/>
    </g>
    <!-- 右灯塔 -->
    <g id="light-tower-right">
      <polygon class="beam" points="1108,112 1260,560 860,560" fill="url(#beamGrad)" opacity=".5" style="animation-delay:1.2s"/>
      <rect x="1104" y="118" width="10" height="190" rx="3" fill="#1c2440"/>
      <rect x="1076" y="88" width="66" height="30" rx="7" fill="#232d4d" stroke="#3a4670" stroke-width="2"/>
      <circle cx="1088" cy="103" r="6" fill="#fff6d0" filter="url(#softGlow)"/>
      <circle cx="1109" cy="103" r="6" fill="#fff6d0" filter="url(#softGlow)"/>
      <circle cx="1130" cy="103" r="6" fill="#fff6d0" filter="url(#softGlow)"/>
      <ellipse cx="1109" cy="103" rx="46" ry="30" fill="url(#lightGlow)" opacity=".6"/>
    </g>
    <!-- 中央顶光 -->
    <ellipse class="beam" cx="640" cy="300" rx="380" ry="260" fill="url(#lightGlow)" opacity=".28"/>
  </g>

  <!-- ================= 观众席 ================= -->
  <g id="crowd-stands">
    <rect x="0" y="168" width="1200" height="392" fill="#111a36"/>
    <rect x="0" y="168" width="1200" height="10" fill="#0a0f24"/>
    <g id="crowd-dots"><!-- JS 生成观众点阵 --></g>
    <rect x="0" y="520" width="1200" height="40" fill="#0b1226" opacity=".8"/>
    <g id="crowd-flags" opacity=".9">
      <rect x="180" y="150" width="26" height="16" rx="2" fill="#f4c430" transform="rotate(-6 193 158)"/>
      <rect x="980" y="146" width="26" height="16" rx="2" fill="#43a047" transform="rotate(5 993 154)"/>
      <rect x="420" y="140" width="22" height="14" rx="2" fill="#ffffff" transform="rotate(-4 431 147)"/>
      <rect x="760" y="150" width="24" height="15" rx="2" fill="#f4c430" transform="rotate(7 772 157)"/>
    </g>
  </g>

  <!-- ================= 比分牌 ================= -->
  <g id="scoreboard" transform="translate(58,54)">
    <rect x="0" y="0" width="252" height="112" rx="12" fill="#080d1c" stroke="#f4c430" stroke-width="3"/>
    <rect x="0" y="0" width="252" height="26" rx="12" fill="#101a38"/>
    <text x="126" y="18" text-anchor="middle" font-size="12" letter-spacing="3.5"
          fill="#f4c430" font-weight="600">CHAMPIONS FINAL</text>
    <circle cx="38" cy="66" r="12" fill="#e8b23a"/>
    <circle cx="214" cy="66" r="12" fill="#3f6fd1"/>
    <text x="78" y="78" font-size="42" font-weight="800" fill="#ffffff"
          font-family="Menlo,Consolas,monospace">3</text>
    <text x="126" y="76" text-anchor="middle" font-size="30" font-weight="700" fill="#8ea0c9">:</text>
    <text x="152" y="78" font-size="42" font-weight="800" fill="#ffffff"
          font-family="Menlo,Consolas,monospace">2</text>
    <g transform="translate(196,40)">
      <rect x="-6" y="0" width="62" height="22" rx="5" fill="#2a0d12" stroke="#ff5252" stroke-width="1.5"/>
      <text x="25" y="16" text-anchor="middle" font-size="15" font-weight="700"
            fill="#ff5252" font-family="Menlo,Consolas,monospace">90+7<tspan class="tick">'</tspan></text>
    </g>
    <text x="225" y="94" text-anchor="middle" font-size="9" letter-spacing="2" fill="#7d8db3">STOPPAGE TIME</text>
  </g>

  <!-- ================= 球场草皮 ================= -->
  <g id="pitch">
    <rect x="0" y="560" width="1200" height="240" fill="url(#pitchGrad)"/>
    <g id="mow-stripes" opacity=".16">
      <polygon points="0,560 150,560 60,800 0,800" fill="#ffffff"/>
      <polygon points="300,560 450,560 420,800 270,800" fill="#ffffff"/>
      <polygon points="600,560 750,560 780,800 630,800" fill="#ffffff"/>
      <polygon points="900,560 1050,560 1140,800 990,800" fill="#ffffff"/>
    </g>
    <rect x="0" y="560" width="1200" height="6" fill="#0a3d1c" opacity=".6"/>
    <!-- 中线圆弧 -->
    <path d="M 600 560 L 600 800" stroke="#ffffff" stroke-width="4" opacity=".25"/>
    <ellipse cx="600" cy="700" rx="150" ry="46" fill="none" stroke="#ffffff" stroke-width="4" opacity=".22"/>
    <g id="grass-blades"><!-- JS 生成近景草叶 --></g>
  </g>

  <!-- ================= 速度残影 ================= -->
  <g id="speed-ghosts">
    <g class="ghost" transform="translate(-190,26)" opacity=".12" filter="url(#blurGhost)">
      <path fill="#eda63c" d="M 560 500 C 600 445, 680 420, 740 440 C 780 452, 800 480, 790 505
        C 760 540, 680 560, 620 550 C 570 542, 545 525, 560 500 Z"/>
      <path fill="#eda63c" d="M 565 495 C 480 500, 400 520, 350 495 C 325 482, 318 460, 332 448
        C 345 470, 380 480, 430 478 C 480 476, 530 480, 565 495 Z"/>
      <ellipse cx="790" cy="445" rx="34" ry="26" fill="#eda63c"/>
    </g>
    <g class="ghost" transform="translate(-95,12)" opacity=".2" filter="url(#blurGhost)" style="animation-delay:.5s">
      <path fill="#f2b04a" d="M 560 500 C 600 445, 680 420, 740 440 C 780 452, 800 480, 790 505
        C 760 540, 680 560, 620 550 C 570 542, 545 525, 560 500 Z"/>
      <path fill="#f2b04a" d="M 565 495 C 480 500, 400 520, 350 495 C 325 482, 318 460, 332 448
        C 345 470, 380 480, 430 478 C 480 476, 530 480, 565 495 Z"/>
      <ellipse cx="790" cy="445" rx="34" ry="26" fill="#f2b04a"/>
      <path d="M 620 545 C 590 590, 560 630, 545 668 L 585 668 C 605 625, 630 585, 660 550 Z" fill="#f2b04a"/>
    </g>
  </g>

  <!-- ================= 速度线 ================= -->
  <g id="speed-lines" filter="url(#blurSpeed)">
    <line class="speedline" x1="40"  y1="392" x2="330" y2="392" stroke="#ffe98a" stroke-width="5" stroke-linecap="round" opacity=".8"/>
    <line class="speedline" x1="90"  y1="438" x2="300" y2="438" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".6" style="animation-delay:.2s"/>
    <line class="speedline" x1="20"  y1="486" x2="280" y2="486" stroke="#ffe98a" stroke-width="6" stroke-linecap="round" opacity=".7" style="animation-delay:.45s"/>
    <line class="speedline" x1="120" y1="536" x2="330" y2="536" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity=".55" style="animation-delay:.1s"/>
    <line class="speedline" x1="60"  y1="590" x2="300" y2="590" stroke="#ffd54a" stroke-width="5" stroke-linecap="round" opacity=".65" style="animation-delay:.3s"/>
    <line class="speedline" x1="150" y1="636" x2="340" y2="636" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".5" style="animation-delay:.55s"/>
  </g>

  <!-- ================= 地面阴影 ================= -->
  <g id="ground-shadow">
    <ellipse cx="560" cy="694" rx="200" ry="22" fill="#03180b" opacity=".5" filter="url(#shadowSoft)"/>
    <ellipse cx="330" cy="742" rx="52" ry="9" fill="#03180b" opacity=".45" filter="url(#shadowSoft)"/>
  </g>

  <!-- ================= 猎豹主体 ================= -->
  <g id="cheetah">
    <!-- 长尾：向后动势弧线 -->
    <g id="tail">
      <path fill="url(#furGrad)" d="M 512 468
        C 430 478, 348 502, 296 478
        C 268 465, 258 440, 272 424
        C 280 415, 292 416, 298 426
        C 292 446, 300 458, 318 464
        C 360 478, 440 466, 520 492 Z"/>
      <path fill="#2b1c10" d="M 272 424 C 280 415, 292 416, 298 426 C 294 440, 296 450, 304 458
        C 292 456, 278 448, 272 438 Z" opacity=".9"/>
      <ellipse cx="330" cy="470" rx="7" ry="5" fill="#2b1c10" transform="rotate(12 330 470)"/>
      <ellipse cx="368" cy="473" rx="6" ry="4.5" fill="#2b1c10" transform="rotate(8 368 473)"/>
      <ellipse cx="408" cy="472" rx="6" ry="4" fill="#2b1c10"/>
      <ellipse cx="448" cy="470" rx="7" ry="4.5" fill="#2b1c10" transform="rotate(-6 448 470)"/>
    </g>

    <!-- 远侧后腿（暗部，弯曲蓄力） -->
    <g id="hind-leg-far">
      <path fill="url(#furFar)" d="M 548 492
        C 572 532, 584 568, 578 600
        C 573 626, 560 652, 552 674
        L 530 680 C 523 684, 521 691, 529 694
        L 566 693 C 576 662, 592 628, 598 596
        C 605 560, 594 524, 578 498 Z"/>
      <ellipse cx="575" cy="540" rx="6" ry="4" fill="#241809" transform="rotate(40 575 540)"/>
      <ellipse cx="583" cy="580" rx="5.5" ry="4" fill="#241809" transform="rotate(60 583 580)"/>
      <ellipse cx="572" cy="622" rx="5" ry="3.6" fill="#241809" transform="rotate(70 572 622)"/>
    </g>

    <!-- 躯干：流线型、前倾 -->
    <g id="torso">
      <path fill="url(#furGrad)" d="M 500 468
        C 540 420, 612 392, 668 412
        C 702 424, 718 452, 704 480
        C 686 516, 620 540, 552 528
        C 516 521, 494 498, 500 468 Z"/>
      <!-- 腹部浅色 -->
      <path fill="url(#bellyGrad)" d="M 540 512
        C 580 528, 650 520, 690 486
        C 700 478, 704 468, 700 460
        C 690 494, 630 516, 570 510
        C 556 508, 546 508, 540 512 Z" opacity=".95"/>
      <!-- 背部肌肉线 -->
      <path d="M 520 452 C 560 422, 616 404, 660 414" fill="none" stroke="#b06f1e"
            stroke-width="3" stroke-linecap="round" opacity=".55"/>
      <path d="M 560 486 C 600 496, 650 490, 682 470" fill="none" stroke="#b06f1e"
            stroke-width="2.4" stroke-linecap="round" opacity=".4"/>
      <!-- 肩部肌群 -->
      <path d="M 656 424 C 676 432, 688 448, 686 466" fill="none" stroke="#a8641c"
            stroke-width="2.6" stroke-linecap="round" opacity=".5"/>
      <!-- 躯干斑点 -->
      <g id="torso-spots" fill="#2b1c10">
        <ellipse cx="528" cy="452" rx="7" ry="5" transform="rotate(-18 528 452)"/>
        <ellipse cx="556" cy="436" rx="6" ry="4.5" transform="rotate(-10 556 436)"/>
        <ellipse cx="586" cy="424" rx="7" ry="5" transform="rotate(-6 586 424)"/>
        <ellipse cx="618" cy="418" rx="6.5" ry="5"/>
        <ellipse cx="648" cy="420" rx="6" ry="4.5" transform="rotate(8 648 420)"/>
        <ellipse cx="672" cy="434" rx="6.5" ry="5" transform="rotate(18 672 434)"/>
        <ellipse cx="688" cy="456" rx="6" ry="4.5" transform="rotate(30 688 456)"/>
        <ellipse cx="520" cy="482" rx="6.5" ry="5" transform="rotate(-24 520 482)"/>
        <ellipse cx="548" cy="468" rx="6" ry="4.5" transform="rotate(-14 548 468)"/>
        <ellipse cx="578" cy="456" rx="7" ry="5" transform="rotate(-8 578 456)"/>
        <ellipse cx="610" cy="450" rx="6" ry="4.6"/>
        <ellipse cx="640" cy="450" rx="6.5" ry="4.8" transform="rotate(10 640 450)"/>
        <ellipse cx="664" cy="466" rx="6" ry="4.4" transform="rotate(22 664 466)"/>
        <ellipse cx="540" cy="496" rx="5.5" ry="4" transform="rotate(-16 540 496)"/>
        <ellipse cx="572" cy="488" rx="6" ry="4.4" transform="rotate(-8 572 488)"/>
        <ellipse cx="604" cy="482" rx="6.5" ry="4.6"/>
        <ellipse cx="636" cy="478" rx="6" ry="4.4" transform="rotate(12 636 478)"/>
        <ellipse cx="512" cy="466" rx="5" ry="4" transform="rotate(-20 512 466)"/>
      </g>
    </g>

    <!-- 近侧后腿：向后蹬地 -->
    <g id="hind-leg-near">
      <path fill="url(#furGrad)" d="M 530 478
        C 500 516, 474 552, 458 588
        C 447 614, 441 644, 433 670
        L 412 677 C 403 681, 400 689, 409 693
        L 449 693 C 456 668, 464 638, 479 608
        C 494 578, 520 544, 550 514
        C 560 504, 560 488, 548 480
        C 542 476, 535 475, 530 478 Z"/>
      <!-- 大腿肌肉张力线 -->
      <path d="M 512 506 C 496 530, 482 556, 474 580" fill="none" stroke="#a8641c"
            stroke-width="3" stroke-linecap="round" opacity=".55"/>
      <path d="M 528 518 C 512 544, 498 570, 490 592" fill="none" stroke="#a8641c"
            stroke-width="2.2" stroke-linecap="round" opacity=".4"/>
      <!-- 爪趾 -->
      <path d="M 414 684 L 408 692 M 424 684 L 420 693 M 434 684 L 432 693"
            stroke="#2b1c10" stroke-width="2" stroke-linecap="round"/>
      <g fill="#2b1c10">
        <ellipse cx="508" cy="520" rx="6.5" ry="4.6" transform="rotate(-38 508 520)"/>
        <ellipse cx="490" cy="548" rx="6" ry="4.4" transform="rotate(-48 490 548)"/>
        <ellipse cx="474" cy="578" rx="6" ry="4.2" transform="rotate(-58 474 578)"/>
        <ellipse cx="462" cy="610" rx="5.4" ry="4" transform="rotate(-66 462 610)"/>
        <ellipse cx="452" cy="640" rx="5" ry="3.8" transform="rotate(-72 452 640)"/>
        <ellipse cx="524" cy="494" rx="6" ry="4.6" transform="rotate(-28 524 494)"/>
      </g>
    </g>

    <!-- 颈部 -->
    <g id="neck">
      <path fill="url(#furGrad)" d="M 660 426
        C 682 398, 698 372, 706 348
        L 740 358 C 732 388, 716 416, 700 438

<script>
(function(){
  var NS = "http://www.w3.org/2000/svg";
  function el(name, attrs, parent){
    var n = document.createElementNS(NS, name);
    for(var k in attrs){ n.setAttribute(k, attrs[k]); }
    parent.appendChild(n);
    return n;
  }

  /* ---- 观众席点阵 ---- */
  var crowd = document.getElementById("crowd-dots");
  var crowdColors = ["#33415e","#3d4a6b","#2a3350","#46538a","#c9a227","#8b6b2a","#5a679b"];
  for(var y = 186; y < 548; y += 15){
    for(var x = 8; x < 1200; x += 17){
      if(Math.random() < 0.12) continue; // 空位
      var c = crowdColors[(Math.random()*crowdColors.length)|0];
      el("circle", {
        cx: x + (Math.random()*6-3),
        cy: y + (Math.random()*5-2.5),
        r: 3.4 + Math.random()*1.6,
        fill: c,
        opacity: (0.5 + Math.random()*0.5).toFixed(2)
      }, crowd);
    }
  }

  /* ---- 金色彩带纸屑 ---- */
  var confetti = document.getElementById("confetti");
  var confColors = ["#ffd54a","#ffb300","#fff8e1","#f4c430","#43a047","#ffffff","#ffe98a"];
  for(var i = 0; i < 52; i++){
    var w = 5 + Math.random()*5, h = 8 + Math.random()*8;
    var piece = el("rect", {
      x: Math.random()*1200,
      y: -40 - Math.random()*320,
      width: w.toFixed(1),
      height: h.toFixed(1),
      rx: 1.5,
      fill: confColors[(Math.random()*confColors.length)|0],
      opacity: (0.7 + Math.random()*0.3).toFixed(2),
      "class": "confetti-piece",
      transform: "rotate(" + (Math.random()*360|0) + " 0 0)"
    }, confetti);
    piece.style.animationDuration = (3.2 + Math.random()*3.5).toFixed(2) + "s";
    piece.style.animationDelay = (-Math.random()*6).toFixed(2) + "s";
  }

  /* ---- 近景草叶 ---- */
  var blades = document.getElementById("grass-blades");
  var bladeColors = ["#2fa34e","#27903f","#3fae5c","#1e7d38"];
  for(var j = 0; j < 90; j++){
    var bx = Math.random()*1200;
    var by = 700 + Math.random()*96;
    var bh = 6 + Math.random()*12;
    var lean = Math.random()*10 - 5;
    el("path", {
      d: "M " + bx.toFixed(1) + " " + by.toFixed(1) +
         " L " + (bx+lean).toFixed(1) + " " + (by-bh).toFixed(1),
      stroke: bladeColors[(Math.random()*bladeColors.length)|0],
      "stroke-width": (1.4 + Math.random()*1.4).toFixed(1),
      "stroke-linecap": "round",
      opacity: (0.5 + Math.random()*0.5).toFixed(2)
    }, blades);
  }

  /* ---- 比分牌红光呼吸（补时氛围） ---- */
  var board = document.getElementById("scoreboard");
  var glowOn = false;
  setInterval(function(){
    glowOn = !glowOn;
    board.style.filter = glowOn ? "drop-shadow(0 0 6px rgba(255,82,82,.45))" : "none";
  }, 1600);
})();
</script>
