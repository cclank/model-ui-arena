<!DOCTYPE html>
<!--
  《绝杀之夜》· 猎豹托举大力神杯冲刺
  设计说明：午夜球场电影海报 —— 深蓝夜色 + 金橙主色 + 孔雀石绿底座，统一顶光光源。
  分层：夜空/看台 → 灯架光锥 → 透视草皮 → 残影速度线 → 猎豹主体 → 大力神杯 → 金色彩带 → 海报字。
  纯内联 SVG + CSS 动画 + 轻量 Canvas 尘埃；零外部依赖，可双击直接打开。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>绝杀之夜 · 金豹擎杯 — SVG 冠军海报</title>
<style>
  :root{
    --night:#050A18; --night-2:#0A1530; --panel:#070D1E;
    --gold:#FFD45E; --gold-deep:#C9922A; --gold-dark:#7A4E0C;
    --amber:#FFB020; --red:#E23B3B; --coral:#FF6B5A;
    --cheetah:#F0A036; --cream:#FFEFD4;
    --turf:#1B9152; --ink:#E9EDF7; --dim:#8FA3C8; --line:#35507F;
    --f-display:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Source Han Sans SC","Noto Sans CJK SC",system-ui,sans-serif;
    --f-body:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    --f-mono:ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    min-height:100vh; background-color:var(--night);
    color:var(--ink); font-family:var(--f-body);
    display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
  }
  /* 三层氛围渐变挂在固定伪元素上：规避 iOS Safari 忽略 background-attachment:fixed、部分安卓滚动掉帧 */
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image:
      radial-gradient(1100px 700px at 50% -12%, rgba(23,52,104,.55), transparent 70%),
      radial-gradient(900px 560px at 88% 112%, rgba(11,64,38,.38), transparent 72%),
      radial-gradient(760px 480px at 6% 96%, rgba(90,56,8,.22), transparent 70%);
  }
  #dust{position:fixed; inset:0; z-index:0; pointer-events:none}
  .arena{position:relative; z-index:1; width:100%; max-width:820px; padding:28px 22px 46px}
  header{display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap;
    font-family:var(--f-mono); font-size:11px; letter-spacing:.22em; color:rgba(255,212,94,.72)}
  header .h-right{color:#6F86B8}
  .kicker{margin:20px 0 0; font-family:var(--f-mono); font-size:11px; letter-spacing:.34em; color:#6F86B8}
  .kicker b{color:var(--gold); font-weight:600}

  /* ---------- stage / poster frame ---------- */
  .stage{
    position:relative; margin:14px auto 0; padding:12px; cursor:pointer; outline:none;
    background:var(--panel); border:1px solid rgba(255,212,94,.20);
    box-shadow:
      0 46px 100px -24px rgba(0,0,0,.78),
      0 0 0 6px rgba(6,12,28,.6),
      0 0 90px rgba(255,190,80,.06);
    transition:box-shadow .8s ease, transform .8s ease;
  }
  .stage:hover{
    box-shadow:
      0 54px 110px -24px rgba(0,0,0,.82),
      0 0 0 6px rgba(6,12,28,.6),
      0 0 130px rgba(255,200,90,.12);
  }
  .stage:focus-visible{outline:2px solid var(--gold); outline-offset:4px}
  .stage svg{display:block; width:100%; height:auto}
  .tick{position:absolute; width:22px; height:22px; pointer-events:none; opacity:.85}
  .tick.tl{top:-5px; left:-5px; border-top:3px solid var(--gold); border-left:3px solid var(--gold)}
  .tick.tr{top:-5px; right:-5px; border-top:3px solid var(--gold); border-right:3px solid var(--gold)}
  .tick.bl{bottom:-5px; left:-5px; border-bottom:3px solid var(--gold); border-left:3px solid var(--gold)}
  .tick.br{bottom:-5px; right:-5px; border-bottom:3px solid var(--gold); border-right:3px solid var(--gold)}

  .caption{margin-top:18px; display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap}
  .palette{display:flex; gap:8px; padding-top:4px}
  .palette i{width:13px; height:13px; border-radius:50%; display:block; box-shadow:0 0 0 1px rgba(255,255,255,.14) inset}
  .note{flex:1; min-width:240px; font-size:12.5px; line-height:1.8; color:var(--dim)}
  .note em{color:var(--gold); font-style:normal}
  .hint{margin-top:10px; font-family:var(--f-mono); font-size:10.5px; letter-spacing:.18em; color:#56719F}

  /* ---------- SVG 动效 ---------- */
  .cone{transition:opacity .9s ease}
  /* hover 聚光增强：先移除呼吸动画对 opacity 的接管，再由级联设定亮度，不用 !important 硬刚 keyframe */
  .stage:hover .coneAnim,
  .stage:hover .coneAnimB{animation:none}
  .stage:hover #coneR{opacity:.20}
  .stage:hover #coneL{opacity:.16}
  .stage:hover .coneWash{opacity:.085}
  #cheetah{transition:transform 1s cubic-bezier(.22,.9,.32,1)}
  .stage:hover #cheetah{transform:translate(6px,-5px)}
  .t-glow{transition:opacity .8s ease}
  .stage:hover .t-glow{animation:none; opacity:.95}

  .tw{animation:tw var(--d,2.6s) ease-in-out var(--dl,0s) infinite alternate}
  @keyframes tw{from{opacity:.12}to{opacity:.95}}

  .cam{opacity:0; animation:camF var(--d,7s) linear var(--dl,0s) infinite;
       filter:drop-shadow(0 0 6px rgba(255,255,255,.9))}
  @keyframes camF{0%,11.4%{opacity:0}12%{opacity:1}13.6%{opacity:.15}15.5%,100%{opacity:0}}

  .lamp{animation:lampF 6.5s linear var(--dl,0s) infinite}
  @keyframes lampF{0%,100%{opacity:1}46%{opacity:.82}52%{opacity:.97}58%{opacity:.88}64%{opacity:1}}

  .coneAnim{animation:coneS 5.4s ease-in-out infinite alternate}
  @keyframes coneS{from{opacity:.09}to{opacity:.155}}
  .coneAnimB{animation:coneS2 6.6s ease-in-out infinite alternate}
  @keyframes coneS2{from{opacity:.07}to{opacity:.125}}

  .flare{animation:flareP 3.8s ease-in-out var(--dl,0s) infinite alternate}
  @keyframes flareP{from{opacity:.25}to{opacity:.75}}

  .led{filter:drop-shadow(0 0 5px rgba(255,176,32,.85)) drop-shadow(0 0 15px rgba(255,120,40,.35))}
  .led-red{filter:drop-shadow(0 0 5px rgba(255,90,70,.8)) drop-shadow(0 0 14px rgba(255,60,40,.3))}
  .ledTime{animation:ledPulse 2.1s ease-in-out infinite alternate}
  @keyframes ledPulse{from{opacity:.82}to{opacity:1}}
  .colon{animation:colonB 1s steps(2,start) infinite}
  @keyframes colonB{0%,49%{opacity:1}50%,100%{opacity:.15}}
  .liveDot{animation:liveB 1.2s ease-in-out infinite alternate}
  @keyframes liveB{from{opacity:.25}to{opacity:1}}

  .dash{stroke-dashoffset:0; animation:dashF var(--d,1.8s) linear infinite}
  @keyframes dashF{to{stroke-dashoffset:-232}}

  .ghost{animation:ghostD 3.4s ease-in-out var(--dl,0s) infinite alternate}
  @keyframes ghostD{from{transform:translateX(0)}to{transform:translateX(-9px)}}

  .fall{animation:fall var(--fd,9s) linear var(--fdl,0s) infinite}
  @keyframes fall{0%{transform:translateY(0)}78%{opacity:1}100%{transform:translateY(1330px);opacity:0}}
  .sway{animation:sway var(--sd,3.2s) ease-in-out var(--sdl,0s) infinite alternate}
  @keyframes sway{from{transform:translateX(-14px)}to{transform:translateX(14px)}}
  .spinCf{animation:spinCf var(--rd,3s) linear var(--rdl,0s) infinite;
           transform-box:fill-box; transform-origin:center}
  @keyframes spinCf{to{transform:rotate(560deg)}}

  .sweep{animation:sweep 5.4s cubic-bezier(.55,.06,.35,.95) infinite}
  @keyframes sweep{0%{transform:translateX(-165px) skewX(-18deg)}58%{transform:translateX(205px) skewX(-18deg)}100%{transform:translateX(205px) skewX(-18deg)}}

  .t-glow{animation:glowP 4.4s ease-in-out infinite alternate}
  @keyframes glowP{from{opacity:.48}to{opacity:.72}}

  .twk{opacity:0; animation:twk 3.6s ease-in-out var(--dl,0s) infinite}
  @keyframes twk{0%,100%{opacity:0}12%{opacity:.95}26%{opacity:0}}

  .ball-spin{animation:ballR 2.7s linear infinite; transform-box:view-box; transform-origin:708px 1046px}
  @keyframes ballR{to{transform:rotate(360deg)}}

  .puff{animation:puff 1.7s ease-out var(--dl,0s) infinite}
  @keyframes puff{0%{opacity:.7; transform:translate(0,0)}100%{opacity:0; transform:translate(-8px,-20px)}}

  #flash-rect{opacity:0; pointer-events:none}
  svg.flash-on #flash-rect{animation:flashPop .6s ease-out}
  @keyframes flashPop{0%{opacity:0}9%{opacity:.85}100%{opacity:0}}
  svg.flash-on #scoreboard .sb-inner{animation:popS .5s ease-out; transform-box:fill-box; transform-origin:center}
  @keyframes popS{0%{transform:scale(1)}30%{transform:scale(1.04)}100%{transform:scale(1)}}

  @media (max-width:460px){
    .arena{padding:16px 10px 34px}
    header{font-size:10px; letter-spacing:.16em}
    .note{font-size:11.5px}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none !important; transition:none !important}
  }
</style>
</head>
<body>
<canvas id="dust" aria-hidden="true"></canvas>

<div class="arena">
  <header>
    <span>MODEL UI ARENA · CHEETAH TROPHY RUN</span>
    <span class="h-right">SINGLE FILE · INLINE SVG · ZERO DEPS</span>
  </header>
  <p class="kicker">午夜决赛 · <b>90+7′</b> · 金色彩带落下的一刻</p>

  <div class="stage" id="stage" role="button" tabindex="0"
       aria-label="海报互动：触发一次看台相机闪光">
    <i class="tick tl"></i><i class="tick tr"></i><i class="tick bl"></i><i class="tick br"></i>

    <svg viewBox="0 0 900 1200" role="img" id="poster"
         aria-label="猎豹球员在午夜球场高举金色大力神杯冲刺，比分牌显示补时90+7分钟，比分3比2">
      <title>绝杀之夜 · 金豹擎杯</title>

      <defs>
        <!-- 渐变 -->
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#030714"/>
          <stop offset=".42" stop-color="#081330"/>
          <stop offset=".72" stop-color="#0E2148"/>
          <stop offset="1" stop-color="#173468"/>
        </linearGradient>
        <linearGradient id="crowdGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#0E1A36"/><stop offset="1" stop-color="#070D1C"/>
        </linearGradient>
        <linearGradient id="pitchGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1B9152"/>
          <stop offset=".45" stop-color="#117A42"/>
          <stop offset="1" stop-color="#07452A"/>
        </linearGradient>
        <linearGradient id="goldMetal" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#7A4E0C"/><stop offset=".22" stop-color="#C9922A"/>
          <stop offset=".45" stop-color="#FFE9A0"/><stop offset=".62" stop-color="#F0BE4A"/>
          <stop offset=".82" stop-color="#B37E18"/><stop offset="1" stop-color="#6E4408"/>
        </linearGradient>
        <linearGradient id="goldMetalV" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#8A5A10"/><stop offset=".35" stop-color="#F4CE6B"/>
          <stop offset=".55" stop-color="#FFE9A0"/><stop offset="1" stop-color="#9C6A14"/>
        </linearGradient>
        <radialGradient id="goldGlobe" cx=".38" cy=".3" r=".95">
          <stop offset="0" stop-color="#FFF3C8"/><stop offset=".35" stop-color="#F7CE62"/>
          <stop offset=".65" stop-color="#C9922A"/><stop offset=".9" stop-color="#8A5A10"/>
          <stop offset="1" stop-color="#6E4408"/>
        </radialGradient>
        <linearGradient id="malachite" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#0B5C39"/><stop offset=".3" stop-color="#128A55"/>
          <stop offset=".5" stop-color="#0A5132"/><stop offset=".75" stop-color="#149B60"/>
          <stop offset="1" stop-color="#0B5C39"/>
        </linearGradient>
        <linearGradient id="furGrad" x1="0" y1="0" x2=".25" y2="1">
          <stop offset="0" stop-color="#FFC866"/>
          <stop offset=".45" stop-color="#F0A036"/>
          <stop offset="1" stop-color="#C9741C"/>
        </linearGradient>
        <linearGradient id="creamGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFF6E0"/><stop offset="1" stop-color="#F2D9A6"/>
        </linearGradient>
        <linearGradient id="coneGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity=".55"/>
          <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
          <stop offset="1" stop-color="#CFE0FF" stop-opacity=".14"/>
        </linearGradient>
        <linearGradient id="botGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#030712" stop-opacity="0"/>
          <stop offset="1" stop-color="#030712" stop-opacity=".84"/>
        </linearGradient>
        <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
          <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".8"/>
          <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="ballShade" cx=".35" cy=".3" r=".9">
          <stop offset="0" stop-color="#FFFFFF"/><stop offset=".5" stop-color="#E9EDF2"/>
          <stop offset=".85" stop-color="#B9C2CE"/><stop offset="1" stop-color="#97A2B0"/>
        </radialGradient>
        <radialGradient id="trophyGlowRad" cx=".5" cy=".5" r=".5">
          <stop offset="0" stop-color="#FFECAA" stop-opacity=".7"/>
          <stop offset=".5" stop-color="#FFD66E" stop-opacity=".26"/>
          <stop offset="1" stop-color="#FFD66E" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="vigGrad" cx=".5" cy=".46" r=".75">
          <stop offset=".55" stop-color="#02050C" stop-opacity="0"/>
          <stop offset="1" stop-color="#02050C" stop-opacity=".6"/>
        </radialGradient>

        <!-- 图案 -->
        <pattern id="crowdDots" width="18" height="12" patternUnits="userSpaceOnUse">
          <circle cx="3" cy="3" r="1.5" fill="#41598F"/>
          <circle cx="12" cy="7" r="1.5" fill="#5A70A6"/>
          <circle cx="7" cy="10" r="1.3" fill="#33477C"/>
        </pattern>
        <pattern id="crowdWarm" width="26" height="18" patternUnits="userSpaceOnUse">
          <circle cx="6" cy="5" r="1.3" fill="#FFB020"/>
          <circle cx="19" cy="13" r="1.2" fill="#FF8A50"/>
        </pattern>
        <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="4" height="2" fill="#04060D"/>
        </pattern>
        <pattern id="grassTick" width="46" height="30" patternUnits="userSpaceOnUse">
          <path d="M6 26 l3 -8" stroke="#0A4D2B" stroke-width="1.6" stroke-linecap="round" opacity=".5"/>
          <path d="M26 22 l4 -7" stroke="#2FA35F" stroke-width="1.4" stroke-linecap="round" opacity=".4"/>
          <path d="M38 28 l2 -6" stroke="#0A4D2B" stroke-width="1.4" stroke-linecap="round" opacity=".45"/>
        </pattern>

        <!-- 滤镜 -->
        <filter id="b3" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3"/></filter>
        <filter id="b5" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5"/></filter>
        <filter id="b7" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="7"/></filter>
        <filter id="b10" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10"/></filter>
        <filter id="fGlow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="4" result="g"/>
          <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- 裁剪 -->
        <clipPath id="trophyClip">
          <circle cx="600" cy="160" r="54"/>
          <rect x="560" y="200" width="80" height="112"/>
          <path d="M556 306 h88 v50 h-88 z"/>
        </clipPath>
        <clipPath id="ballClip"><circle cx="708" cy="1046" r="40"/></clipPath>

        <!-- 猎豹剪影（无填充，供残影 use 继承色） -->
        <g id="sil">
          <path d="M500 462 C478 480 464 500 458 526 C448 556 428 570 410 590 C386 616 368 640 348 654
                   C330 664 306 660 298 668 C288 678 290 692 300 700 C310 712 320 716 330 720
                   C356 712 384 706 410 696 C434 686 448 662 460 638 C472 614 490 592 506 572
                   C520 554 530 532 534 510 C538 490 542 472 546 458 C560 452 574 446 584 436
                   C592 430 596 422 594 414 C592 404 584 398 578 392 C572 378 566 368 554 362
                   C542 356 526 354 516 358 C504 362 496 374 494 388 C492 412 496 438 500 462 Z"/>
          <path d="M298 664 C260 654 224 640 198 614 C170 586 152 550 154 518 C155 496 166 480 182 476
                   C194 473 205 480 207 492 C208 502 202 512 192 514 C180 517 172 530 172 548
                   C172 576 190 602 216 622 C242 641 272 652 300 682 Z"/>
          <path d="M306 676 C282 706 262 744 248 780 C232 816 210 850 190 878 C172 902 152 930 134 954
                   C124 968 114 982 106 996 L122 1006 C134 996 148 980 160 962 C176 938 194 910 208 886
                   C226 856 246 820 260 790 C276 756 296 724 318 700 C322 690 316 680 306 676 Z"/>
          <path d="M340 686 C368 702 402 726 428 750 C442 764 450 776 448 788 C444 810 426 834 408 852
                   C400 860 396 868 398 878 C402 894 410 908 424 922 C430 928 434 934 434 940 L416 944
                   C404 936 394 924 388 910 C380 892 376 874 372 860 C362 834 370 806 388 788
                   C398 778 400 770 392 764 C372 746 350 726 338 710 C332 700 334 692 340 686 Z"/>
          <path d="M480 528 C506 486 528 450 546 416 C558 394 566 372 572 354 L556 348
                   C548 368 540 388 528 408 C512 438 494 472 474 506 Z"/>
          <path d="M468 512 C520 486 572 458 612 428 C630 414 642 394 647 372 L633 368
                   C626 386 614 402 596 416 C562 442 516 468 466 492 Z"/>
          <circle cx="576" cy="338" r="13"/>
          <circle cx="646" cy="352" r="11"/>
        </g>
      </defs>

      <!-- ════════ 背景：夜空 + 顶棚 + 看台观众 ════════ -->
      <g id="bg-sky">
        <rect x="0" y="0" width="900" height="802" fill="url(#skyGrad)"/>

        <!-- 顶棚 -->
        <rect x="0" y="596" width="900" height="46" fill="#04070F"/>
        <path d="M0 596 H900" stroke="#2C4570" stroke-width="2" opacity=".8"/>
        <path d="M30 640 L60 606 L90 640 L120 606 L150 640 L180 606 L210 640 L240 606 L270 640
                 L300 606 L330 640 L360 606 L390 640 L420 606 L450 640 L480 606 L510 640
                 L540 606 L570 640 L600 606 L630 640 L660 606 L690 640 L720 606 L750 640
                 L780 606 L810 640 L840 606 L870 640"
              fill="none" stroke="#101B33" stroke-width="3" opacity=".75"/>

        <!-- 双层看台 -->
        <rect x="0" y="642" width="900" height="80" fill="url(#crowdGrad)"/>
        <rect x="0" y="726" width="900" height="72" fill="url(#crowdGrad)"/>
        <rect x="0" y="722" width="900" height="4" fill="#050910"/>
        <g stroke="#050910" stroke-width="6" opacity=".55">
          <path d="M120 642 V798"/><path d="M280 642 V798"/><path d="M450 642 V798"/>
          <path d="M620 642 V798"/><path d="M790 642 V798"/>
        </g>
        <!-- 点阵人群 -->
        <rect x="0" y="642" width="900" height="156" fill="url(#crowdDots)" opacity=".8"/>
        <rect x="0" y="642" width="900" height="156" fill="url(#crowdWarm)" opacity=".5"/>
        <rect x="0" y="772" width="900" height="28" fill="url(#haze)"/>

        <!-- 观众席暖光闪烁 -->
        <g fill="#FFD98A">
          <circle class="tw" style="--d:2.1s;--dl:-.4s"  cx="90"  cy="668" r="2.4"/>
          <circle class="tw" style="--d:3.1s;--dl:-1.2s" cx="170" cy="700" r="2"/>
          <circle class="tw" style="--d:2.6s;--dl:-.8s"  cx="255" cy="662" r="2.6"/>
          <circle class="tw" style="--d:1.9s;--dl:-1.6s" cx="330" cy="712" r="2"/>
          <circle class="tw" style="--d:3.4s;--dl:-.2s"  cx="398" cy="676" r="2.3"/>
          <circle class="tw" style="--d:2.3s;--dl:-2s"   cx="470" cy="706" r="2"/>
          <circle class="tw" style="--d:2.9s;--dl:-.9s"  cx="545" cy="664" r="2.5"/>
          <circle class="tw" style="--d:2s;--dl:-1.4s"   cx="612" cy="700" r="2"/>
          <circle class="tw" style="--d:3.2s;--dl:-.6s"  cx="688" cy="672" r="2.4"/>
          <circle class="tw" style="--d:2.4s;--dl:-1.8s" cx="752" cy="710" r="2"/>
          <circle class="tw" style="--d:2.7s;--dl:-.3s"  cx="828" cy="666" r="2.5"/>
          <circle class="tw" style="--d:2.2s;--dl:-1s"   cx="60"  cy="748" r="2"/>
          <circle class="tw" style="--d:3s;--dl:-2.2s"   cx="210" cy="764" r="2.3"/>

<script>
(function () {
  'use strict';

  /* ---------- 环境尘埃（Canvas：DPR 上限 2 / resize / 隐藏暂停 / 数量上限） ---------- */
  var cv = document.getElementById('dust');
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (cv && cv.getContext && !reduced) {
    var ctx = cv.getContext('2d');
    if (ctx) {
      var DPR = Math.min(window.devicePixelRatio || 1, 2);
      var W = 0, H = 0, parts = [], rafId = 0, running = false;
      var COLORS = ['255,212,94', '255,239,212', '240,160,54', '233,237,247'];
      var MAX = 70;

      function seed() {
        var n = Math.min(MAX, Math.round(W * H / 26000));
        parts = [];
        for (var i = 0; i < n; i++) {
          parts.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: 0.6 + Math.random() * 1.4,
            s: 0.12 + Math.random() * 0.3,
            a: 0.06 + Math.random() * 0.26,
            ph: Math.random() * 6.283,
            c: COLORS[(Math.random() * COLORS.length) | 0]
          });
        }
      }
      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth; H = window.innerHeight;
        cv.width = Math.round(W * DPR);
        cv.height = Math.round(H * DPR);
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        seed();
      }
      function frame(t) {
        if (!running) return;
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          p.y -= p.s;
          p.x += Math.sin(t * 0.001 + p.ph) * 0.15;
          if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
          if (p.x < -4) p.x = W + 4; else if (p.x > W + 4) p.x = -4;
          var tw = 0.7 + 0.3 * Math.sin(t * 0.002 + p.ph * 2);
          ctx.globalAlpha = p.a * tw;
          ctx.fillStyle = 'rgb(' + p.c + ')';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, 6.283);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        rafId = window.requestAnimationFrame(frame);
      }
      function start() { if (!running) { running = true; rafId = window.requestAnimationFrame(frame); } }
      function stop() { running = false; if (rafId) window.cancelAnimationFrame(rafId); }

      window.addEventListener('resize', resize);
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) stop(); else start();
      });
      resize();
      start();
    }
  }

  /* ---------- 点击 / 键盘：看台相机闪光 ---------- */
  var stage = document.getElementById('stage');
  var poster = document.getElementById('poster');
  var flashTimer = 0;
  function fireFlash() {
    if (!poster) return;
    poster.classList.remove('flash-on');
    void poster.getBoundingClientRect(); /* 重触发动画 */
    poster.classList.add('flash-on');
    if (flashTimer) window.clearTimeout(flashTimer);
    flashTimer = window.setTimeout(function () { poster.classList.remove('flash-on'); }, 650);
  }
  if (stage) {
    stage.addEventListener('click', fireFlash);
    stage.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fireFlash(); }
    });
  }

  /* ---------- 指针视差（仅精准指针，rAF 节流） ---------- */
  var flood = document.getElementById('floodlights');
  if (flood && !reduced && window.matchMedia && window.matchMedia('(pointer: fine)').matches && stage) {
    var queued = false, nx = 0, ny = 0;
    stage.addEventListener('pointermove', function (e) {
      var r = stage.getBoundingClientRect();
      nx = ((e.clientX - r.left) / r.width - 0.5) * 2;
      ny = ((e.clientY - r.top) / r.height - 0.5) * 2;
      if (!queued) {
        queued = true;
        window.requestAnimationFrame(function () {
          flood.style.transform = 'translate(' + (nx * 7).toFixed(1) + 'px,' + (ny * 4).toFixed(1) + 'px)';
          queued = false;
        });
      }
    });
    stage.addEventListener('pointerleave', function () {
      flood.style.transform = 'translate(0px,0px)';
    });
  }
})();
</script>
