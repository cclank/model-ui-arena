<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .weather-container {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .city-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .city-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .city-btn.active {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .temperature {
            font-size: 80px;
            font-weight: 300;
            color: white;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            line-height: 1;
        }

        .weather-desc {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .weather-details {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .detail-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .forecast {
            margin-top: 30px;
        }

        .forecast-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .forecast-day {
            text-align: center;
            flex: 1;
        }

        .forecast-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 20px;
            margin: 8px 0;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        .forecast-temp {
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .temp-graph {
            height: 50px;
            margin: 25px 0 15px;
            position: relative;
        }

        .temp-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            bottom: 20px;
        }

        .temp-path {
            position: absolute;
            height: 2px;
            background: rgba(255, 255, 255, 0.7);
            bottom: 20px;
            transition: width 0.5s ease;
        }

        .temp-point {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            transform: translateX(-50%);
            bottom: 18px;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }

        .raindrop {
            position: absolute;
            width: 1px;
            height: 8px;
            background: rgba(116, 185, 255, 0.7);
            opacity: 0;
        }

        .sun-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fdd835;
            border-radius: 50%;
            opacity: 0;
        }

        @keyframes rainFall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 0.9; }
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="weather-card">
            <div class="city-selector">
                <button class="city-btn active" data-city="beijing">北京</button>
                <button class="city-btn" data-city="shanghai">上海</button>
                <button class="city-btn" data-city="guangzhou">广州</button>
            </div>

            <h2 id="cityName" style="color: white; margin: 0 0 10px; font-size: 24px;"></h2>
            <div class="temperature" id="currentTemp">22°</div>
            <div class="weather-desc" id="currentDesc">多云</div>

            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-value" id="windSpeed">12</div>
                    <div class="detail-label">风速</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="humidity">65</div>
                    <div class="detail-label">湿度</div>
                </div>
            </div>

            <div class="temp-graph" id="tempGraph">
            </div>

            <div class="forecast">
                <div class="forecast-container" id="forecastContainer">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 天气数据
        const weatherData = {
            beijing: {
                current: { temp: 22, desc: "⛅", wind: 12, humidity: 65 },
                forecast: [
                    { date: "6/2", high: 24, low: 18, icon: "⛅" },
                    { date: "6/3", high: 26, low: 19, icon: "☀️" },
                    { date: "6/4", high: 23, low: 17, icon: "🌧️" },
                    { date: "6/5", high: 25, low: 20, icon: "🌤️" },
                    { date: "6/6", high: 27, low: 21, icon: "☀️" }
                ],
                weatherType: "cloudy"
            },
            shanghai: {
                current: { temp: 25, desc: "☀️", wind: 8, humidity: 70 },
                forecast: [
                    { date: "6/2", high: 27, low: 22, icon: "☀️" },
                    { date: "6/3", high: 28, low: 23, icon: "🌤️" },
                    { date: "6/4", high: 26, low: 21, icon: "⛅" },
                    { date: "6/5", high: 24, low: 19, icon: "🌦️" },
                    { date: "6/6", high: 25, low: 20, icon: "🌧️" }
                ],
                weatherType: "sunny"
            },
            guangzhou: {
                current: { temp: 30, desc: "🌧️", wind: 15, humidity: 85 },
                forecast: [
                    { date: "6/2", high: 31, low: 26, icon: "🌧️" },
                    { date: "6/3", high: 29, low: 25, icon: "🌦️" },
                    { date: "6/4", high: 28, low: 24, icon: "🌧️" },
                    { date: "6/5", high: 27, low: 23, icon: "⛅" },
                    { date: "6/6", high: 28, low: 24, icon: "🌤️" }
                ],
                weatherType: "rainy"
            }
        };

        // DOM元素
        const cityNameEl = document.getElementById('cityName');
        const currentTempEl = document.getElementById('currentTemp');
        const currentDescEl = document.getElementById('currentDesc');
        const windSpeedEl = document.getElementById('windSpeed');
        const humidityEl = document.getElementById('humidity');
        const forecastContainer = document.getElementById('forecastContainer');
        const tempGraph = document.getElementById('tempGraph');
        const cityButtons = document.querySelectorAll('.city-btn');

        let currentCity = 'beijing';

        // 更新天气显示
        function updateWeather(city) {
            currentCity = city;
            const data = weatherData[city];

            // 更新当前天气
            cityNameEl.textContent = city === 'beijing' ? '北京' :
                                     city === 'shanghai' ? '上海' : '广州';
            currentTempEl.textContent = data.current.temp + '°';
            currentDescEl.textContent = data.current.desc;
            windSpeedEl.textContent = data.current.wind;
            humidityEl.textContent = data.current.humidity;

            // 更新预报
            forecastContainer.innerHTML = '';
            data.forecast.forEach((day, index) => {
                const forecastItem = document.createElement('div');
                forecastItem.className = 'forecast-day';
                forecastItem.innerHTML = `
                    <div class="forecast-date">${day.date}</div>
                    <div class="forecast-icon">${day.icon}</div>
                    <div class="forecast-temp">${day.high}°</div>
                `;
                forecastContainer.appendChild(forecastItem);
            });

            // 绘制温度曲线
            drawTempGraph(data.forecast);

            // 更新背景和动画效果
            updateBackground(data.weatherType);

            // 更新按钮状态
            cityButtons.forEach(btn => {
                if (btn.dataset.city === city) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 绘制温度曲线
        function drawTempGraph(forecast) {
            tempGraph.innerHTML = '';

            const maxValue = Math.max(...forecast.map(d => d.high));
            const minValue = Math.min(...forecast.map(d => d.low));
            const range = maxValue - minValue || 1;

            const graphWidth = tempGraph.clientWidth;
            const graphHeight = 40;

            // 创建路径
            const path = document.createElement('div');
            path.className = 'temp-path';
            tempGraph.appendChild(path);

            // 添加点
            forecast.forEach((day, index) => {
                const x = (graphWidth / (forecast.length - 1)) * index;

                // 高温点
                const highY = graphHeight - ((day.high - minValue) / range) * graphHeight;
                const highPoint = document.createElement('div');
                highPoint.className = 'temp-point';
                highPoint.style.left = x + 'px';
                highPoint.style.bottom = (highY + 10) + 'px';
                tempGraph.appendChild(highPoint);
            });

            // 动画效果
            setTimeout(() => {
                path.style.width = '100%';
            }, 10);
        }

        // 更新背景和动画效果
        function updateBackground(weatherType) {
            const body = document.body;

            if (weatherType === 'sunny') {
                body.style.background = 'linear-gradient(135deg, #ff9a9e, #fad0c4)';
                createSunParticles();
                clearRain();
            } else if (weatherType === 'cloudy') {
                body.style.background = 'linear-gradient(135deg, #a1c4fd, #c2e9fb)';
                clearSunParticles();
                clearRain();
            } else if (weatherType === 'rainy') {
                body.style.background = 'linear-gradient(135deg, #434343, #1a1a1a)';
                createRain();
                clearSunParticles();
            }
        }

        // 创建阳光粒子效果
        function createSunParticles() {
            clearAnimations();
            const body = document.body;

            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'sun-particle';

                    // 随机位置
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';

                    // 动画
                    particle.style.animation = `sunPulse ${2 + Math.random() * 2}s infinite`;
                    particle.style.opacity = '0';

                    body.appendChild(particle);

                    // 渐显
                    setTimeout(() => {
                        particle.style.opacity = '0.6';
                    }, 10);

                    // 移除元素
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, 4000);
                }, i * 200);
            }
        }

        // 创建雨滴效果
        function createRain() {
            clearAnimations();
            const body = document.body;

            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const raindrop = document.createElement('div');
                    raindrop.className = 'raindrop';

                    // 随机位置和大小
                    raindrop.style.left = Math.random() * 100 + '%';
                    raindrop.style.height = 8 + Math.random() * 8 + 'px';
                    raindrop.style.opacity = '0';

                    // 动画
                    const duration = 0.3 + Math.random() * 0.4;
                    raindrop.style.animation = `rainFall ${duration}s linear forwards`;

                    body.appendChild(raindrop);

                    // 渐显
                    setTimeout(() => {
                        raindrop.style.opacity = 0.7;
                    }, 10);

                    // 移除元素
                    setTimeout(() => {
                        if (raindrop.parentNode) {
                            raindrop.parentNode.removeChild(raindrop);
                        }
                    }, duration * 1000 + 100);
                }, i * 70);
            }
        }

        // 清除动画元素
        function clearAnimations() {
            const particles = document.querySelectorAll('.sun-particle, .raindrop');
            particles.forEach(p => {
                if (p.parentNode) {
                    p.parentNode.removeChild(p);
                }
            });
        }

        // 清除阳光粒子
        function clearSunParticles() {
            const particles = document.querySelectorAll('.sun-particle');
            particles.forEach(p => {
                if (p.parentNode) {
                    p.parentNode.removeChild(p);
                }
            });
        }

        // 清除雨滴
        function clearRain() {
            const raindrops = document.querySelectorAll('.raindrop');
            raindrops.forEach(drop => {
                if (drop.parentNode) {
                    drop.parentNode.removeChild(drop);
                }
            });
        }

        // 城市切换事件
        cityButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const city = btn.dataset.city;
                updateWeather(city);
            });
        });

        // 初始化
        updateWeather(currentCity);

        // 响应式处理
        window.addEventListener('resize', () => {
            const data = weatherData[currentCity];
            drawTempGraph(data.forecast);
        });
    </script>
</body>
</html>
