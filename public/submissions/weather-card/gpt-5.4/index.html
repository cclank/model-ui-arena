<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atmosphere Card</title>
<style>
:root{--sky1:#4f86ff;--sky2:#9be2ff;--text:#fffdf8;--soft:rgba(255,255,255,.78);--glass:rgba(255,255,255,.15)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{display:grid;place-items:center;padding:18px;overflow:hidden;color:var(--text);font-family:"Optima","PingFang SC",sans-serif;background:radial-gradient(circle at 15% 15%,rgba(255,255,255,.18),transparent 22%),radial-gradient(circle at 80% 10%,rgba(255,255,255,.12),transparent 18%),linear-gradient(165deg,var(--sky1),var(--sky2))}
.card{width:min(94vw,440px);padding:22px;border-radius:32px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));backdrop-filter:blur(16px);box-shadow:0 28px 70px rgba(20,32,74,.28)}
.tabs,.stats,.days{display:flex;gap:8px;flex-wrap:wrap}.tab{padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.24);background:transparent;color:inherit;cursor:pointer}.tab.active{background:rgba(255,255,255,.2)}
.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;align-items:center;margin:18px 0}.city{font-size:34px;font-weight:700}.temp{font-size:70px;line-height:1}.desc{margin-top:6px;color:var(--soft);line-height:1.6}.stats{margin-top:12px}.stat,.trend{padding:12px 14px;border-radius:18px;background:var(--glass);border:1px solid rgba(255,255,255,.12)}.stat b,.trend b{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.72;margin-bottom:8px}.stat span{font-size:22px;font-weight:700}
.scene{position:relative;height:190px;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.02));overflow:hidden}.sun,.moon,.cloud,.rain,.spark{position:absolute}.sun,.moon{right:26px;top:18px;width:52px;height:52px;border-radius:50%}.sun{background:#ffd35d;box-shadow:0 0 30px rgba(255,211,93,.8)}.moon{background:#fff5d0;box-shadow:-12px 0 0 0 #b7d2ff inset}.cloud{left:24px;top:66px;width:96px;height:34px;border-radius:999px;background:#fff;box-shadow:34px -16px 0 8px #fff,62px 2px 0 2px #fff;animation:float 6s ease-in-out infinite}.cloud.back{left:auto;right:24px;top:94px;scale:.78;opacity:.72;animation-delay:-2s}.rain i{position:absolute;width:3px;height:22px;border-radius:99px;background:#bfefff;animation:rain 1s linear infinite}.spark{left:18px;right:18px;bottom:16px;height:64px;display:flex;align-items:end;gap:6px}.spark i{flex:1;border-radius:14px 14px 4px 4px;background:linear-gradient(180deg,#fff,#c5f2ff)}.days{margin-top:16px;justify-content:space-between;font-size:12px;color:var(--soft)}
.card.night .sun{opacity:0}.card.night .moon{opacity:1}.card.sunny .rain{opacity:0}.card.rainy .rain{opacity:1}.card.rainy .sun{opacity:.3}.card.cloudy .sun{opacity:0}.card.sunny .cloud.back{opacity:.45}.moon{opacity:0}.rain{inset:0 20px auto auto;height:100%}
@keyframes float{50%{transform:translateY(-8px)}}@keyframes rain{to{transform:translateY(22px);opacity:0}}@media (max-width:390px){.card{padding:18px}.hero{grid-template-columns:1fr}.scene{height:168px}.temp{font-size:58px}.city{font-size:30px}}
</style>
</head>
<body>
<section class="card sunny" id="card">
  <div class="tabs" id="tabs"></div>
  <div class="hero">
    <div><div class="city" id="city">上海</div><div class="temp" id="temp">25°</div><div class="desc" id="desc">海风把云层推开，体感明亮。</div><div class="stats"><div class="stat"><b>湿度</b><span id="humidity">63%</span></div><div class="stat"><b>风速</b><span id="wind">3.4m/s</span></div></div></div>
    <div class="scene"><div class="sun"></div><div class="moon"></div><div class="cloud"></div><div class="cloud back"></div><div class="rain" id="rain"></div><div class="spark" id="spark"></div></div>
  </div>
  <div class="trend"><b>本周体感</b><div class="days" id="days"></div></div>
</section>
<script>
const data=[{city:'上海',temp:25,desc:'海风把云层推开，体感明亮。',humidity:'63%',wind:'3.4m/s',mode:'sunny',night:false,bg:['#5e90ff','#a5e6ff'],trend:[46,58,72,60,68],days:['晴 26°','云 24°','晴 27°','风 25°','晴 28°']},{city:'成都',temp:19,desc:'云层压低，空气湿润但很安静。',humidity:'82%',wind:'1.8m/s',mode:'cloudy',night:false,bg:['#63728b','#b8c7d3'],trend:[44,42,46,48,45],days:['阴 19°','阴 20°','雾 18°','云 21°','阴 19°']},{city:'深圳',temp:28,desc:'短时阵雨活跃，出门建议带伞。',humidity:'88%',wind:'5.6m/s',mode:'rainy',night:true,bg:['#40547b','#6fc3de'],trend:[36,54,48,66,58],days:['雨 29°','雷 27°','雨 28°','晴 30°','雨 27°']}];
const ids=id=>document.getElementById(id),tabs=ids('tabs'),spark=ids('spark'),days=ids('days'),rain=ids('rain');for(let i=0;i<14;i++){const d=document.createElement('i');d.style.left=24+i*18+'px';d.style.top=60+(i%5)*8+'px';d.style.animationDelay=i*.08+'s';rain.appendChild(d)}
data.forEach((item,i)=>{const b=document.createElement('button');b.className='tab'+(!i?' active':'');b.textContent=item.city;b.onclick=()=>paint(i);tabs.appendChild(b)});
function paint(i){const d=data[i],card=ids('card');[...tabs.children].forEach((t,n)=>t.classList.toggle('active',n===i));card.className='card '+d.mode+(d.night?' night':'');document.documentElement.style.setProperty('--sky1',d.bg[0]);document.documentElement.style.setProperty('--sky2',d.bg[1]);ids('city').textContent=d.city;ids('temp').textContent=d.temp+'°';ids('desc').textContent=d.desc;ids('humidity').textContent=d.humidity;ids('wind').textContent=d.wind;spark.innerHTML='';d.trend.forEach(v=>{const bar=document.createElement('i');bar.style.height=v+'%';spark.appendChild(bar)});days.innerHTML=d.days.map(x=>`<span>${x}</span>`).join('')}
paint(0)
</script>
</body>
</html>
