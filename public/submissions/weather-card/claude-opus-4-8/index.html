<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气卡片</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:system-ui,sans-serif; background:#0e1320; padding:20px; }
  .card{ width:100%; max-width:340px; border-radius:28px; padding:26px; color:#fff;
    position:relative; overflow:hidden; transition:background 1s ease;
    box-shadow:0 24px 60px rgba(0,0,0,.45); min-height:440px; }
  .sunny{ background:linear-gradient(160deg,#4a9eff,#8ec9ff 60%,#ffd86b); }
  .rainy{ background:linear-gradient(160deg,#3a4a66,#5a6b8a); }
  .cloudy{ background:linear-gradient(160deg,#6a7a95,#9aa8c0); }
  .tabs{ display:flex; gap:8px; position:relative; z-index:3; }
  .tabs button{ flex:1; padding:8px; border:none; border-radius:12px; font-size:13px; cursor:pointer;
    background:rgba(255,255,255,.18); color:#fff; transition:.2s; backdrop-filter:blur(4px); }
  .tabs button.on{ background:rgba(255,255,255,.9); color:#1a2740; font-weight:700; }
  .city{ margin-top:28px; font-size:22px; font-weight:600; position:relative; z-index:3; }
  .desc{ opacity:.85; font-size:14px; margin-top:2px; }
  .temp{ font-size:78px; font-weight:300; line-height:1; margin-top:18px; position:relative; z-index:3; }
  .temp sup{ font-size:28px; vertical-align:super; opacity:.8; }
  .icon{ position:absolute; top:70px; right:24px; font-size:64px; z-index:2;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.2)); animation:float 4s ease-in-out infinite; }
  @keyframes float{ 50%{ transform:translateY(-10px); } }
  .meta{ display:flex; gap:10px; margin-top:24px; position:relative; z-index:3; }
  .meta div{ flex:1; background:rgba(255,255,255,.16); border-radius:14px; padding:12px; text-align:center; }
  .meta .v{ font-size:18px; font-weight:600; } .meta .k{ font-size:11px; opacity:.75; margin-top:2px; }
  .trend{ margin-top:20px; position:relative; z-index:3; }
  .trend svg{ width:100%; height:54px; }
  .trend .lbl{ display:flex; justify-content:space-between; font-size:10px; opacity:.7; margin-top:4px; }
  .rain{ position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0; transition:opacity .6s; }
  .rainy .rain{ opacity:1; }
  .rain i{ position:absolute; top:-20px; width:2px; height:16px; background:rgba(255,255,255,.5);
    border-radius:2px; animation:drop linear infinite; }
  @keyframes drop{ to{ transform:translateY(480px); } }
</style>
</head>
<body>
  <div class="card sunny" id="card">
    <div class="rain" id="rain"></div>
    <div class="tabs" id="tabs"></div>
    <div class="city" id="city"></div>
    <div class="desc" id="desc"></div>
    <div class="icon" id="icon"></div>
    <div class="temp" id="temp"></div>
    <div class="meta">
      <div><div class="v" id="wind"></div><div class="k">风速 km/h</div></div>
      <div><div class="v" id="humid"></div><div class="k">湿度</div></div>
      <div><div class="v" id="feel"></div><div class="k">体感</div></div>
    </div>
    <div class="trend">
      <svg viewBox="0 0 280 54" id="chart"></svg>
      <div class="lbl"><span>06</span><span>10</span><span>14</span><span>18</span><span>22</span></div>
    </div>
  </div>
<script>
  const data=[
    {city:'上海',cls:'sunny',icon:'☀️',desc:'晴朗',temp:26,wind:12,humid:'45%',feel:28,trend:[22,25,28,27,23]},
    {city:'北京',cls:'cloudy',icon:'⛅',desc:'多云转阴',temp:19,wind:18,humid:'60%',feel:17,trend:[15,18,20,19,16]},
    {city:'广州',cls:'rainy',icon:'🌧',desc:'中雨',temp:23,wind:24,humid:'88%',feel:25,trend:[21,22,24,23,22]},
  ];
  const card=document.getElementById('card'), tabs=document.getElementById('tabs');
  const rain=document.getElementById('rain');
  for(let i=0;i<22;i++){ const r=document.createElement('i');
    r.style.left=Math.random()*100+'%'; r.style.animationDuration=(.5+Math.random()*.5)+'s';
    r.style.animationDelay=Math.random()+'s'; rain.appendChild(r); }
  data.forEach((d,i)=>{ const b=document.createElement('button'); b.textContent=d.city;
    b.onclick=()=>render(i); tabs.appendChild(b); });
  function chart(arr){
    const max=Math.max(...arr),min=Math.min(...arr),rng=max-min||1;
    const pts=arr.map((v,i)=>`${10+i*65},${48-((v-min)/rng)*38}`).join(' ');
    return `<polyline fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>`+
      arr.map((v,i)=>`<circle cx="${10+i*65}" cy="${48-((v-min)/rng)*38}" r="3" fill="#fff"/>`).join('');
  }
  function render(i){
    const d=data[i];
    card.className='card '+d.cls;
    document.getElementById('city').textContent=d.city;
    document.getElementById('desc').textContent=d.desc;
    document.getElementById('icon').textContent=d.icon;
    document.getElementById('temp').innerHTML=d.temp+'<sup>°C</sup>';
    document.getElementById('wind').textContent=d.wind;
    document.getElementById('humid').textContent=d.humid;
    document.getElementById('feel').textContent=d.feel+'°';
    document.getElementById('chart').innerHTML=chart(d.trend);
    [...tabs.children].forEach((b,j)=>b.classList.toggle('on',j===i));
  }
  render(0);
</script>
</body>
</html>
