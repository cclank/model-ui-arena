<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glm-5.2 · 天气卡片</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;transition:background 1s ease}
  .wrap{width:390px;max-width:100%;position:relative;border-radius:34px;overflow:hidden;
    box-shadow:0 40px 90px rgba(0,0,0,.5);color:#fff}
  .scene{position:absolute;inset:0;transition:background 1s ease;z-index:0}
  .fx{position:absolute;inset:0;pointer-events:none;z-index:1}
  .glow{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(circle at 30% 10%,rgba(255,255,255,.18),transparent 50%)}
  .content{position:relative;z-index:2;padding:30px 26px;
    background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.28))}
  .tabs{display:flex;gap:8px;margin-bottom:22px}
  .tab{flex:1;padding:10px 0;text-align:center;border-radius:22px;font-size:13px;cursor:pointer;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);transition:.3s;font-weight:600}
  .tab.on{background:rgba(255,255,255,.95);color:#1a1a2e}
  .cur{display:flex;align-items:flex-start;gap:18px;margin-bottom:26px}
  .temp{font-size:78px;font-weight:200;line-height:.9;font-variant-numeric:tabular-nums;
    text-shadow:0 4px 20px rgba(0,0,0,.25)}
  .info{padding-top:14px;flex:1}
  .info .desc{font-size:21px;font-weight:700}
  .info .sub{font-size:12px;opacity:.8;margin-top:3px;letter-spacing:.5px}
  .meta{display:flex;gap:10px;margin-top:14px}
  .pill{flex:1;background:rgba(255,255,255,.12);border-radius:14px;padding:10px 12px;font-size:12px;
    border:1px solid rgba(255,255,255,.14)}
  .pill .v{font-size:16px;font-weight:700;display:block;margin-top:2px}
  .forecast{background:rgba(0,0,0,.22);border-radius:20px;padding:16px 14px;
    border:1px solid rgba(255,255,255,.1)}
  .chart{height:74px;width:100%;display:block;margin-bottom:10px}
  .days{display:flex;justify-content:space-between;font-size:11px}
  .days div{text-align:center;flex:1;opacity:.92}
  .days .dn{font-weight:700;margin-bottom:5px;opacity:1}
  .toggle{margin-top:14px;text-align:center;font-size:12px;opacity:.9;cursor:pointer;
    background:rgba(255,255,255,.14);padding:9px;border-radius:16px;border:1px solid rgba(255,255,255,.2)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="scene" id="scene"></div>
    <canvas class="fx" id="fx"></canvas>
    <div class="glow"></div>
    <div class="content">
      <div class="tabs" id="tabs"></div>
      <div class="cur"><div class="temp" id="temp">--°</div>
        <div class="info"><div class="desc" id="desc">--</div>
        <div class="sub" id="sub"></div>
        <div class="meta">
          <div class="pill"><span class="k">风速</span><span class="v" id="wind">--</span></div>
          <div class="pill"><span class="k">湿度</span><span class="v" id="hum">--</span></div>
        </div></div>
      </div>
      <div class="forecast">
        <svg class="chart" id="chart" viewBox="0 0 300 74" preserveAspectRatio="none"></svg>
        <div class="days" id="days"></div>
      </div>
      <div class="toggle" id="unit">切换单位 °C / °F</div>
    </div>
  </div>
<script>
  const cities=[{n:'北京',t:14,w:'sunny',ws:'东南 3级',h:38,d:[{t:14,w:'sunny'},{t:16,w:'sunny'},{t:12,w:'cloud'},{t:9,w:'rain'},{t:11,w:'cloud'}]},
    {n:'上海',t:21,w:'rain',ws:'东风 4级',h:82,d:[{t:21,w:'rain'},{t:19,w:'rain'},{t:22,w:'cloud'},{t:24,w:'sunny'},{t:23,w:'cloud'}]},
    {n:'哈尔滨',t:-3,w:'snow',ws:'北风 5级',h:67,d:[{t:-3,w:'snow'},{t:-1,w:'cloud'},{t:2,w:'cloud'},{t:0,w:'snow'},{t:-4,w:'snow'}]}];
  const W={sunny:{c1:'#2a7ad4',c2:'#9ad0ff',icon:'☀',label:'晴',sym:'sun'},
    cloud:{c1:'#5a6b8a',c2:'#8fa0c4',icon:'☁',label:'多云',sym:'cloud'},
    rain:{c1:'#3a4a66',c2:'#62748f',icon:'🌧',label:'小雨',sym:'rain'},
    snow:{c1:'#6a7a9a',c2:'#bcd4ec',icon:'❄',label:'小雪',sym:'snow'}};
  let cur=0,unit='C',particles=[],cv,ctx,W_=0,H_=0;
  const $=id=>document.getElementById(id);
  function cv_(n){return unit==='C'?n:Math.round(n*9/5+32)}
  function buildTabs(){const t=$('tabs');t.innerHTML='';cities.forEach((c,i)=>{
    const e=document.createElement('div');e.className='tab'+(i===cur?' on':'');e.textContent=c.n;
    e.onclick=()=>{cur=i;render(true)};t.appendChild(e)})}
  function render(anim){const c=cities[cur];const W_=W[c.w];
    $('scene').style.background=`linear-gradient(160deg,${W_.c1},${W_.c2})`;
    countUp($('temp'),cv_(c.t),anim);$('desc').textContent=W_.label;
    $('sub').textContent=`${c.n} · 今日体感`;
    $('wind').textContent=c.ws;$('hum').textContent=c.h+'%';
    buildTabs();drawChart(c.d);buildDays(c.d);initParticles(c.w);$('unit').textContent=`切换单位 °${unit}`}
  function countUp(el,to,doAnim){const from=parseFloat(el.textContent)||0;
    if(!doAnim){el.textContent=to+'°';return}const st=Date.now(),dur=550;
    function f(){let p=(Date.now()-st)/dur;if(p>1)p=1;p=1-Math.pow(1-p,3);
      el.textContent=Math.round(from+(to-from)*p)+'°';if(p<1)requestAnimationFrame(f)}f()}
  function drawChart(d){const svg=$('chart');svg.innerHTML='';
    const NS='http://www.w3.org/2000/svg';const pts=d.map((day,i)=>[10+i*72,64-((day.t+10)/40)*52]);
    // area
    let area=`0,74 ${pts.map(p=>p.join(',')).join(' ')} 298,74`;
    const grad=document.createElementNS(NS,'linearGradient');grad.setAttribute('id','ag');grad.setAttribute('x1',0);grad.setAttribute('y1',0);grad.setAttribute('x2',0);grad.setAttribute('y2',1);
    grad.innerHTML='<stop offset="0%" stop-color="rgba(255,255,255,.45)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/>';
    svg.appendChild(grad);
    const pg=document.createElementNS(NS,'polygon');pg.setAttribute('points',area);pg.setAttribute('fill','url(#ag)');svg.appendChild(pg);
    pts.forEach((p,i)=>{if(i){const l=document.createElementNS(NS,'polyline');
      l.setAttribute('points',`${pts[i-1][0]},${pts[i-1][1]} ${p[0]},${p[1]}`);
      l.setAttribute('stroke','#fff');l.setAttribute('fill','none');l.setAttribute('stroke-width',2.4);
      l.setAttribute('stroke-linejoin','round');svg.appendChild(l)}
      const c=document.createElementNS(NS,'circle');c.setAttribute('cx',p[0]);c.setAttribute('cy',p[1]);
      c.setAttribute('r',3.8);c.setAttribute('fill','#fff');c.setAttribute('stroke','rgba(0,0,0,.15)');svg.appendChild(c)})}
  function buildDays(d){const el=$('days');el.innerHTML='';const wk=['今','明','后','四','五'];
    d.forEach((day,i)=>{const div=document.createElement('div');
      div.innerHTML=`<div class="dn">${wk[i]}</div>${W[day.w].icon}<br><b style="font-size:13px">${cv_(day.t)}°</b>`;el.appendChild(div)})}
  function initParticles(w){cv=$('fx');ctx=cv.getContext('2d');resize();particles=[];
    if(w==='rain'){for(let i=0;i<130;i++)particles.push({type:'rain',x:Math.random()*W_,y:Math.random()*H_,l:Math.random()*14+10,sp:Math.random()*4+7})}
    else if(w==='snow'){for(let i=0;i<75;i++)particles.push({type:'snow',x:Math.random()*W_,y:Math.random()*H_,r:Math.random()*2.5+1,sp:Math.random()*1.2+.5,d:Math.random()*6})}
    else if(w==='sunny'){for(let i=0;i<30;i++)particles.push({type:'sun',x:Math.random()*W_,y:Math.random()*H_,r:Math.random()*3+1,sp:Math.random()*.4+.1})}
    else{for(let i=0;i<10;i++)particles.push({type:'cloud',x:Math.random()*W_,y:Math.random()*40+20,r:Math.random()*40+45,sp:Math.random()*.3+.1})}}
  function resize(){if(!cv)return;cv.width=W_=innerWidth;cv.height=H_=Math.max(420,$('.wrap').offsetHeight)}
  function loop(){if(!ctx)return;ctx.clearRect(0,0,W_,H_);particles.forEach(p=>{
    if(p.type==='rain'){ctx.strokeStyle='rgba(190,215,255,.65)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-1.5,p.y+p.l);ctx.stroke();p.y+=p.sp;
      if(p.y>H_){p.y=-p.l;p.x=Math.random()*W_}}
    else if(p.type==='snow'){ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();p.y+=p.sp;p.x+=Math.sin(p.y*.03+p.d)*.6;if(p.y>H_){p.y=-5;p.x=Math.random()*W_}}
    else if(p.type==='sun'){ctx.fillStyle=`rgba(255,245,190,${p.r/9})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*3.5,0,7);ctx.fill();
      p.y-=p.sp;p.x+=p.sp*.3;if(p.y<0){p.y=H_;p.x=Math.random()*W_}}
    else if(p.type==='cloud'){ctx.fillStyle='rgba(255,255,255,.28)';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
      p.x+=p.sp;if(p.x-p.r>W_)p.x=-p.r}});requestAnimationFrame(loop)}
  $('unit').onclick=()=>{unit=unit==='C'?'F':'C';render(false)};
  addEventListener('resize',resize);render(false);loop();
  const hr=new Date().getHours();if(hr<6||hr>=18)$('scene').style.filter='brightness(.72) saturate(1.05)';
</script>
</body>
</html>
