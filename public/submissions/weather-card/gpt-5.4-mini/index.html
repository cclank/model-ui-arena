<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weather</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui;background:#0c1020;color:#fff;transition:.4s}.card{width:min(92vw,430px);padding:20px;border-radius:28px;background:rgba(255,255,255,.08);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1)}.cities{display:flex;gap:8px;flex-wrap:wrap}.cities button{border:0;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.12);color:#fff}.cities .on{background:#fff;color:#111}.hero{display:flex;justify-content:space-between;align-items:flex-end;margin:18px 0 6px}.temp{font-size:68px;font-weight:900;line-height:1}.desc{font-size:18px;color:#e5ebff}.meta{display:flex;gap:10px;margin-top:10px;color:#d6ddff}.scene{height:150px;position:relative;overflow:hidden;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));margin-top:16px}.sun,.cloud,.rain{position:absolute}.sun{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,#fff08a,#ffb400);top:18px;right:26px;box-shadow:0 0 40px rgba(255,200,50,.55)}.cloud{width:96px;height:34px;left:24px;top:42px;border-radius:30px;background:#eef3ff;box-shadow:34px -10px 0 -6px #eef3ff,62px 0 0 -10px #eef3ff}.rain i{position:absolute;width:2px;height:14px;background:#9ad7ff;border-radius:99px;animation:f 1s linear infinite}@keyframes f{to{transform:translateY(150px);opacity:0}}.trend{height:52px;width:100%;margin-top:12px}.note{margin-top:10px;font-size:12px;opacity:.78}.muted{color:#fff7}@media (max-width:390px){.temp{font-size:60px}}</style></head><body id="b"><div class="card"><div class="cities" id="c"></div><div class="hero"><div><div class="temp" id="temp">--°</div><div class="desc" id="desc">--</div></div><div style="text-align:right"><div id="city">--</div><div class="muted" id="extra">--</div></div></div><svg class="trend" viewBox="0 0 320 52" preserveAspectRatio="none"><path id="trend" fill="none" stroke="#9ed4ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="scene" id="scene"></div><div class="note">本地 mock 数据，城市可切换</div></div><script>const data=[{n:'上海',t:28,d:'晴',m:'湿度 62%',s:'sun',p:[22,24,26,28,29,30,28]},{n:'杭州',t:24,d:'小雨',m:'风速 3m/s',s:'rain',p:[25,24,23,22,24,25,24]},{n:'北京',t:19,d:'多云',m:'湿度 41%',s:'cloud',p:[18,19,20,19,18,19,20]}],c=document.getElementById('c'),scene=document.getElementById('scene');let cur=0;data.forEach((x,i)=>c.insertAdjacentHTML('beforeend',`<button class="${i?'':'on'}" onclick="setC(${i})">${x.n}</button>`));function draw(p){const min=Math.min(...p),max=Math.max(...p),w=320,h=52;return p.map((v,i)=>`${i?'L':'M'}${(i*(w/(p.length-1))).toFixed(1)},${(h-6-((v-min)/(max-min||1))*40).toFixed(1)}`).join(' ')}function setC(i){cur=i;const x=data[i];document.body.style.background=x.s==='sun'?'linear-gradient(180deg,#1b3c7c,#09101d)':'linear-gradient(180deg,#2d3255,#0c1020)';temp.textContent=x.t+'°';desc.textContent=x.d;city.textContent=x.n;extra.textContent=x.m;trend.setAttribute('d',draw(x.p));scene.innerHTML=x.s==='sun'?'<div class=sun></div>':'<div class=cloud></div>'+(x.s==='rain'?'<div class=rain>'+Array.from({length:12},(_,i)=>`<i style="left:${8+i*24}px;top:62px;animation-delay:-${i*.12}s"></i>`).join('')+'</div>':''):[...c.children].forEach((b,idx)=>b.className=idx===i?'on':'') }setC(0)</script></body></html>
