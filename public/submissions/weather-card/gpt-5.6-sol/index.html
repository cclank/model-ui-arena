<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weather Atlas</title>
<style>
:root{color-scheme:dark;--sky:#1778b8;--sky2:#75c8e5;--accent:#ffe38a;--ink:#f8fbff;--faint:#ffffffa6}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#10161c;font-family:ui-sans-serif,system-ui,sans-serif;color:var(--ink);overflow-x:hidden}.app{width:min(880px,94vw);border:1px solid #ffffff26;border-radius:8px;overflow:hidden;position:relative;background:linear-gradient(145deg,var(--sky),var(--sky2));box-shadow:0 30px 80px #0008;transition:background .6s ease}.app.rain{--sky:#33485e;--sky2:#71839a;--accent:#9fe7ff}.app.cloud{--sky:#536d7c;--sky2:#98aeb5;--accent:#eaf3ef}.app.night{filter:saturate(.82) brightness(.76)}
.weather-fx{position:absolute;inset:0;overflow:hidden;pointer-events:none}.sun{position:absolute;width:220px;height:220px;border-radius:50%;right:-32px;top:-42px;background:radial-gradient(circle,#fff7c8 0 8%,#ffd66d 35%,#ffd66d00 70%);animation:sun 6s ease-in-out infinite}.cloud-shape{position:absolute;width:210px;height:52px;right:5%;top:120px;background:#ffffff38;border-radius:50%;filter:blur(1px);animation:drift 9s ease-in-out infinite}.cloud-shape:before,.cloud-shape:after{content:"";position:absolute;background:inherit;border-radius:50%}.cloud-shape:before{width:90px;height:90px;left:38px;top:-42px}.cloud-shape:after{width:110px;height:75px;right:22px;top:-30px}.drop{display:none;position:absolute;top:-15%;width:1px;height:52px;background:linear-gradient(#bcefff00,#bcefff);transform:rotate(12deg);animation:rain 1.1s linear infinite}.rain .drop{display:block}.rain .sun,.cloud .sun{opacity:0}.cloud .cloud-shape{opacity:.85}
.head{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:22px 26px;border-bottom:1px solid #ffffff24}.cities{display:flex;gap:6px}.cities button,.unit{border:0;background:#ffffff12;color:#ffffffb7;padding:9px 13px;border-radius:4px;font-weight:650;cursor:pointer;transition:.25s}.cities button.active{background:#fff;color:#1b4055}.unit{border:1px solid #ffffff30;padding-inline:11px}.current{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;padding:42px 52px 32px;align-items:end}.place{font-size:13px;letter-spacing:.13em;color:var(--faint);text-transform:uppercase}.temp{font-size:clamp(76px,13vw,132px);font-weight:250;line-height:.9;letter-spacing:-.07em}.temp sup{font-size:.28em;vertical-align:top;margin-left:8px}.description{text-align:right}.description h1{font-size:clamp(28px,5vw,50px);font-weight:420;margin:0 0 12px}.facts{display:flex;justify-content:flex-end;gap:24px}.facts span{font-size:12px;color:var(--faint)}.facts b{display:block;color:#fff;font-size:16px;margin-top:4px}.forecast{position:relative;z-index:2;margin-top:auto;background:#101923dd;border-top:1px solid #ffffff2a;padding:22px 28px 26px}.forecast-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.forecast-head b{font-size:12px;letter-spacing:.12em}.forecast-head span{font-size:11px;color:#ffffff75}.chart{height:62px;width:100%;display:block;overflow:visible}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.day{text-align:center;border-right:1px solid #ffffff12}.day:last-child{border:0}.day b,.day span{display:block}.day b{font-size:12px}.day span{font-size:10px;color:#ffffff76;margin:5px 0}.range{font:650 12px ui-monospace,monospace!important;color:#fff!important}.fade .current,.fade .forecast{animation:swap .45s ease}
@keyframes sun{50%{transform:scale(1.08);filter:brightness(1.12)}}@keyframes drift{50%{transform:translateX(-28px)}}@keyframes rain{to{transform:translate(70px,720px) rotate(12deg)}}@keyframes swap{from{opacity:.2;transform:translateY(7px)}}@media(max-width:620px){.app{width:100vw;height:100vh;border:0;border-radius:0;display:flex;flex-direction:column}.head{padding:16px 14px;flex:none}.cities button{padding:8px 9px;font-size:12px}.current{grid-template-columns:1fr;padding:34px 24px 24px;flex:1;align-content:center}.description{text-align:left;margin-top:22px}.facts{justify-content:flex-start}.forecast{padding:20px 10px 24px;flex:none}.temp{font-size:100px}.day span{font-size:9px}.cloud-shape{top:240px;right:-30px}}
</style></head><body><main class="app" id="app"><div class="weather-fx"><i class="sun"></i><i class="cloud-shape"></i><div id="drops"></div></div><header class="head"><nav class="cities" id="cities"></nav><button class="unit" id="unit">°C</button></header><section class="current"><div><div class="place" id="place"></div><div class="temp"><span id="temp">--</span><sup id="unitMark">°C</sup></div></div><div class="description"><h1 id="desc"></h1><div class="facts"><span>湿度<b id="humidity"></b></span><span>风速<b id="wind"></b></span></div></div></section><section class="forecast"><div class="forecast-head"><b>未来 5 天</b><span>最高 / 最低温</span></div><svg class="chart" viewBox="0 0 500 62" preserveAspectRatio="none"><path id="area" fill="#ffffff12"></path><polyline id="line" fill="none" stroke="#ffe38a" stroke-width="3" vector-effect="non-scaling-stroke"></polyline><g id="dots"></g></svg><div class="grid" id="days"></div></section></main>
<script>
const data=[{name:'台北',place:'Taipei / Zhongshan',type:'rain',desc:'午后阵雨',t:27,h:82,w:4.2,days:[['今天','阵雨',29,24],['周六','雷雨',28,23],['周日','多云',30,24],['周一','晴间云',32,25],['周二','晴',33,26]]},{name:'东京',place:'Tokyo / Shibuya',type:'cloud',desc:'薄云漫射',t:23,h:61,w:2.8,days:[['今天','多云',25,18],['周六','晴',27,19],['周日','晴',28,20],['周一','小雨',24,18],['周二','多云',26,19]]},{name:'新加坡',place:'Singapore / Bay',type:'sun',desc:'炽热晴空',t:31,h:70,w:3.6,days:[['今天','晴',33,27],['周六','阵雨',32,26],['周日','晴',34,27],['周一','雷雨',31,26],['周二','多云',32,27]]}];
const app=document.querySelector('#app'),cities=document.querySelector('#cities'),drops=document.querySelector('#drops');for(let i=0;i<26;i++)drops.insertAdjacentHTML('beforeend',`<i class="drop" style="left:${Math.random()*100}%;animation-delay:${-Math.random()*1.2}s;animation-duration:${.7+Math.random()*.7}s"></i>`);data.forEach((d,i)=>cities.insertAdjacentHTML('beforeend',`<button data-i="${i}">${d.name}</button>`));let active=0,celsius=true,shown=0;
const cv=n=>celsius?n:Math.round(n*9/5+32);function render(){const d=data[active];app.className=`app ${d.type} fade ${new Date().getHours()<6||new Date().getHours()>=18?'night':''}`;[...cities.children].forEach((b,i)=>b.classList.toggle('active',i===active));document.querySelector('#place').textContent=d.place;document.querySelector('#desc').textContent=d.desc;document.querySelector('#humidity').textContent=d.h+'%';document.querySelector('#wind').textContent=d.w+' m/s';const from=shown,to=cv(d.t),start=performance.now();function count(now){const p=Math.min(1,(now-start)/380);shown=Math.round(from+(to-from)*(1-(1-p)**3));document.querySelector('#temp').textContent=shown;if(p<1)requestAnimationFrame(count)}requestAnimationFrame(count);document.querySelector('#unitMark').textContent=celsius?'°C':'°F';document.querySelector('#unit').textContent=celsius?'°F':'°C';document.querySelector('#days').innerHTML=d.days.map(x=>`<div class="day"><b>${x[0]}</b><span>${x[1]}</span><span class="range">${cv(x[2])}° / ${cv(x[3])}°</span></div>`).join('');const hi=d.days.map(x=>cv(x[2])),min=Math.min(...hi)-2,max=Math.max(...hi)+2,pts=hi.map((v,i)=>`${25+i*112.5},${52-(v-min)/(max-min)*42}`);document.querySelector('#line').setAttribute('points',pts.join(' '));document.querySelector('#area').setAttribute('d',`M${pts.join(' L')} L475,62 L25,62Z`);document.querySelector('#dots').innerHTML=pts.map(p=>{const[x,y]=p.split(',');return`<circle cx="${x}" cy="${y}" r="4" fill="#fff"/>`}).join('');setTimeout(()=>app.classList.remove('fade'),500)}
cities.onclick=e=>{if(e.target.dataset.i){active=+e.target.dataset.i;render()}};document.querySelector('#unit').onclick=()=>{celsius=!celsius;shown=cv(data[active].t);render()};render();
</script></body></html>
