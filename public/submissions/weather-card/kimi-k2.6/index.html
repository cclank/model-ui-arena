<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weather Card</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .6s}
.card{width:350px;max-width:92vw;background:rgba(255,255,255,.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;padding:28px;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.15);transition:transform .3s}
.card:hover{transform:translateY(-4px)}
.cities{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cities button{padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:20px;background:transparent;color:inherit;font-size:13px;cursor:pointer;transition:all .3s}
.cities button.active{background:rgba(255,255,255,.3);border-color:transparent;font-weight:600}
.weather-icon{font-size:64px;text-align:center;margin:8px 0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.temp{font-size:56px;font-weight:200;text-align:center;line-height:1.1}
.desc{text-align:center;font-size:15px;opacity:.85;margin:4px 0 16px}
.details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.detail{text-align:center;padding:10px 4px;background:rgba(255,255,255,.1);border-radius:14px}
.detail span{display:block;font-size:11px;opacity:.7;margin-bottom:2px}
.detail strong{font-size:15px;font-weight:500}
.trend-label{font-size:11px;opacity:.6;margin-bottom:6px}
svg{width:100%;height:60px}
.line{fill:none;stroke:rgba(255,255,255,.7);stroke-width:2;stroke-linecap:round}
.dot{fill:#fff;r:3}
.dot-bg{fill:rgba(255,255,255,.15)}
.rain{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;border-radius:28px}
.drop{position:absolute;width:2px;background:rgba(255,255,255,.4);animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-10px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(400px);opacity:0}}
.card-wrap{position:relative}
</style></head><body>
<div class="card-wrap"><div class="card" id="card">
<div class="cities" id="cities"></div>
<div class="weather-icon" id="icon"></div>
<div class="temp" id="temp"></div>
<div class="desc" id="desc"></div>
<div class="details">
<div class="detail"><span>风速</span><strong id="wind"></strong></div>
<div class="detail"><span>湿度</span><strong id="humid"></strong></div>
<div class="detail"><span>体感</span><strong id="feel"></strong></div>
</div>
<div class="trend-label">24h 温度趋势</div>
<svg id="trend" viewBox="0 0 294 60"></svg>
<div class="rain" id="rain"></div>
</div></div>
<script>
const DATA={北京:{t:28,desc:'晴朗',icon:'☀️',w:'12 km/h',h:'35%',f:30,weather:'sunny',trend:[18,17,16,15,16,18,21,23,25,27,28,28]},东京:{t:22,desc:'多云',icon:'⛅',w:'18 km/h',h:'62%',f:21,weather:'cloudy',trend:[19,18,18,17,18,20,21,22,22,23,22,21]},伦敦:{t:14,desc:'小雨',icon:'🌧️',w:'24 km/h',h:'88%',f:11,weather:'rain',trend:[12,11,11,10,11,12,13,14,14,15,14,13]},悉尼:{t:31,desc:'晴转多云',icon:'🌤️',w:'8 km/h',h:'28%',f:34,weather:'sunny',trend:[22,21,20,19,21,24,27,29,31,32,31,30]}};
const BG={sunny:'linear-gradient(135deg,#f093fb,#f5576c)',cloudy:'linear-gradient(135deg,#667eea,#764ba2)',rain:'linear-gradient(135deg,#373B44,#4286f4)'};
let current='北京';
function render(city){const d=DATA[city];current=city;
document.body.style.background=BG[d.weather];
document.getElementById('icon').textContent=d.icon;
document.getElementById('temp').textContent=d.t+'°';
document.getElementById('desc').textContent=d.desc;
document.getElementById('wind').textContent=d.w;
document.getElementById('humid').textContent=d.h;
document.getElementById('feel').textContent=d.f+'°';
document.querySelectorAll('.cities button').forEach(b=>b.classList.toggle('active',b.dataset.city===city));
const rain=document.getElementById('rain');rain.innerHTML='';
if(d.weather==='rain'){for(let i=0;i<30;i++){const drop=document.createElement('div');drop.className='drop';drop.style.left=Math.random()*100+'%';drop.style.height=8+Math.random()*16+'px';drop.style.animationDuration=.4+Math.random()*.6+'s';drop.style.animationDelay=Math.random()*1+'s';rain.appendChild(drop)}}
const svg=document.getElementById('trend');const tr=d.trend;const mn=Math.min(...tr),mx=Math.max(...tr),rng=mx-mn||1;
const pts=tr.map((v,i)=>`${i*26},${55-(v-mn)/rng*45}`).join(' ');const area=pts+` ${tr.length*26},60 0,60`;
svg.innerHTML=`<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.3)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient></defs><polygon points="${area}" fill="url(#g)"/><polyline class="line" points="${pts}"/>`+tr.map((v,i)=>`<circle class="dot" cx="${i*26}" cy="${55-(v-mn)/rng*45}"/>`).join('')+svg.innerHTML}
const cEl=document.getElementById('cities');Object.keys(DATA).forEach(city=>{const b=document.createElement('button');b.textContent=city;b.dataset.city=city;b.onclick=()=>render(city);cEl.appendChild(b)});render('北京');
</script></body></html>
