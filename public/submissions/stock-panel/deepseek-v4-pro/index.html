<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Panel - DeepSeek V4 Pro</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0d1117, #161b22, #0d1117);
  color: #c9d1d9;
}

.panel {
  width: 380px; padding: 1.5rem;
  background: rgba(22,27,34,0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(240,246,252,0.1);
  border-radius: 16px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.4);
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.2rem; padding-bottom: 0.6rem;
  border-bottom: 1px solid rgba(240,246,252,0.08);
}
.header h2 { font-size: 1rem; font-weight: 600; letter-spacing: 1px; color: #e6edf3; }
.header .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 8px #3fb950; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

.stock-row {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.7rem 0; border-bottom: 1px solid rgba(240,246,252,0.04);
  cursor: pointer; transition: background 0.15s;
}
.stock-row:hover { background: rgba(255,255,255,0.02); }
.stock-row:last-child { border-bottom: none; }

.stick-info { flex: 1; min-width: 0; }
.stick-symbol { font-weight: 700; font-size: 0.95rem; color: #e6edf3; }
.stick-name { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }

.stock-price { text-align: right; font-weight: 600; font-size: 0.95rem; min-width: 70px; color: #e6edf3; }

.stock-change {
  text-align: right; font-size: 0.8rem; font-weight: 600;
  padding: 0.2rem 0.5rem; border-radius: 6px; min-width: 65px;
}
.stock-change.up { color: #3fb950; background: rgba(63,185,80,0.1); }
.stock-change.down { color: #f85149; background: rgba(248,81,73,0.1); }

/* Mini chart */
.mini-chart { width: 60px; height: 32px; }
.mini-chart svg { width: 60px; height: 32px; }

/* Selected detail */
.detail {
  margin-top: 1rem; padding: 1rem;
  background: rgba(255,255,255,0.03); border-radius: 10px;
  display: none;
}
.detail.show { display: block; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(-8px); } }
.detail-title { font-size: 0.8rem; color: #8b949e; margin-bottom: 0.3rem; }
.detail-values { display: flex; gap: 1.2rem; }
.detail-values span { font-size: 0.85rem; }
.up-color { color: #3fb950; }
.down-color { color: #f85149; }

@media (max-width: 390px) {
  .panel { width: 100%; margin: 0.5rem; border-radius: 12px; padding: 1rem; }
  .stock-price { min-width: 55px; font-size: 0.85rem; }
  .mini-chart { width: 46px; height: 26px; }
  .mini-chart svg { width: 46px; height: 26px; }
}
</style>
</head>
<body>
<div class="panel">
  <div class="header">
    <h2>MARKET MONITOR</h2>
    <div class="live-dot"></div>
  </div>
  <div id="stocks"></div>
  <div class="detail" id="detail"></div>
</div>

<script>
const stocks = [
  { symbol:'AAPL', name:'Apple Inc.', price: 187.32, change: 2.15, changePct: 1.16, history: [178,180,182,179,183,185,187,184,186,187.32] },
  { symbol:'TSLA', name:'Tesla Inc.', price: 243.80, change: -5.40, changePct: -2.17, history: [252,248,250,246,247,243,241,244,245,243.8] },
  { symbol:'NVDA', name:'NVIDIA Corp.', price: 875.20, change: 12.35, changePct: 1.43, history: [850,860,855,865,858,870,868,872,878,875.2] },
];

let selectedIdx = 0;

function drawSparkline(history, changePct, container) {
  const w = 60, h = 32, pad = 3;
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const points = history.map((v, i) => {
    const x = pad + (i / (history.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return `${x},${y}`;
  }).join(' ');
  const color = changePct >= 0 ? '#3fb950' : '#f85149';
  container.innerHTML = `<svg viewBox="0 0 ${w} ${h}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderStocks() {
  const container = document.getElementById('stocks');
  container.innerHTML = '';
  stocks.forEach((s, i) => {
    const dir = s.changePct >= 0 ? 'up' : 'down';
    const sign = s.changePct >= 0 ? '+' : '';
    const row = document.createElement('div');
    row.className = 'stock-row';
    row.innerHTML = `
      <div class="stick-info"><div class="stick-symbol">${s.symbol}</div><div class="stick-name">${s.name}</div></div>
      <div class="mini-chart"></div>
      <div class="stock-price">$${s.price.toFixed(2)}</div>
      <div class="stock-change ${dir}">${sign}${s.changePct.toFixed(2)}%</div>
    `;
    row.addEventListener('click', () => showDetail(i));
    container.appendChild(row);
    drawSparkline(s.history, s.changePct, row.querySelector('.mini-chart'));
  });
  showDetail(0);
}

function showDetail(idx) {
  selectedIdx = idx;
  const s = stocks[idx];
  const dir = s.changePct >= 0;
  const sign = dir ? '+' : '';
  const cls = dir ? 'up-color' : 'down-color';
  const el = document.getElementById('detail');
  el.className = 'detail show';
  el.innerHTML = `
    <div class="detail-title">${s.symbol} · ${s.name}</div>
    <div class="detail-values">
      <span>涨跌额 <span class="${cls}">${sign}${s.change.toFixed(2)}</span></span>
      <span>涨跌幅 <span class="${cls}">${sign}${s.changePct.toFixed(2)}%</span></span>
      <span>最新价 <span>$${s.price.toFixed(2)}</span></span>
    </div>
  `;
}

// Simulate live price flicker
setInterval(() => {
  stocks.forEach((s, i) => {
    const jitter = (Math.random() - 0.5) * s.price * 0.002;
    s.price += jitter;
    s.change = s.price - s.history[0];
    s.changePct = (s.change / s.history[0]) * 100;
  });
  renderStocks();
}, 3000);

renderStocks();
</script>
</body>
</html>
