<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glm-5.2 · 股票面板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;
    background:radial-gradient(ellipse at 50% 0%,#141a26,#0a0d14);color:#e6e6e6;padding:20px;
    display:flex;justify-content:center}
  .app{width:420px;max-width:100%}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .head h1{font-size:17px;letter-spacing:1px}
  .live{font-size:11px;color:#5cdb5c;background:rgba(92,219,92,.12);padding:4px 10px;border-radius:20px;font-weight:600}
  .live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:#5cdb5c;
    margin-right:6px;animation:blink 1.2s infinite;vertical-align:middle}
  @keyframes blink{50%{opacity:.3}}
  .list{display:flex;flex-direction:column;gap:10px}
  .stock{background:linear-gradient(160deg,#161b22,#10141a);border:1px solid #21262d;border-radius:16px;padding:14px 16px;
    cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .stock:hover{transform:translateY(-2px);border-color:#30363d}
  .stock.sel{border-color:#58a6ff;box-shadow:0 0 0 1px #58a6ff,inset 4px 0 0 #58a6ff}
  .top{display:flex;justify-content:space-between;align-items:center}
  .name{font-weight:600;font-size:15px}.code{color:#7d8590;font-size:11px;margin-left:6px}
  .price{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;transition:color .3s}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:9px;gap:10px}
  .chg{font-size:12px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap}
  .up{color:#ff5252;background:rgba(255,82,82,.13)}.down{color:#26a69a;background:rgba(38,166,154,.13)}
  .up .arr::before{content:"▲ "}.down .arr::before{content:"▼ "}
  svg.spark{width:110px;height:34px;flex-shrink:0}
  .panel{margin-top:16px;background:linear-gradient(160deg,#161b22,#10141a);
    border:1px solid #21262d;border-radius:16px;padding:18px}
  .ptop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .ptitle{font-size:14px;font-weight:600}.pcode{color:#7d8590;font-size:11px;margin-bottom:14px}
  .pprice{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
  .pchart{height:140px;width:100%;display:block}
  .stats{display:flex;gap:10px;margin-top:14px}
  .stat{flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:10px;font-size:11px}
  .stat .v{font-size:16px;font-weight:700;display:block;margin-top:3px}
  .v.up{color:#ff5252!important}.v.down{color:#26a69a!important}
</style>
</head>
<body>
  <div class="app">
    <div class="head"><h1>📊 实时行情</h1><span class="live">流式更新</span></div>
    <div class="list" id="list"></div>
    <div class="panel" id="panel"></div>
  </div>
<script>
  const stocks=[
    {name:'智云科技',code:'ZYKJ',price:128.50,prev:128.50,data:gen(128.50)},
    {name:'芯原半导体',code:'XYBD',price:42.30,prev:42.30,data:gen(42.30)},
    {name:'北辰能源',code:'BCNY',price:87.65,prev:87.65,data:gen(87.65)},
    {name:'星海物流',code:'XHWL',price:15.82,prev:15.82,data:gen(15.82)}
  ];
  function gen(base){const a=[base];for(let i=0;i<39;i++)a.push(Math.max(.5,a[i]+(Math.random()-.48)*base*.025));return a}
  const $=id=>document.getElementById(id);let sel=0;const NS='http://www.w3.org/2000/svg';
  function fmt(n){return n.toFixed(2)}
  function path(pts){return pts.map(x=>x.join(',')).join(' ')}
  function spark(d,up){const min=Math.min(...d),max=Math.max(...d),rng=(max-min)||1;
    const pts=d.map((v,i)=>[i/(d.length-1)*110,34-((v-min)/rng)*30]);
    const svg=document.createElementNS(NS,'svg');svg.setAttribute('class','spark');svg.setAttribute('viewBox','0 0 110 34');
    const pl=document.createElementNS(NS,'polyline');pl.setAttribute('points',path(pts));pl.setAttribute('fill','none');
    pl.setAttribute('stroke',up?'#ff5252':'#26a69a');pl.setAttribute('stroke-width',1.8);pl.setAttribute('stroke-linejoin','round');
    svg.appendChild(pl);return svg}
  function render(){const l=$('list');l.innerHTML='';
    stocks.forEach((s,i)=>{const diff=s.price-s.prev,pct=diff/s.prev*100;const u=diff>=0;
      const el=document.createElement('div');el.className='stock'+(i===sel?' sel':'');
      el.innerHTML=`<div class="top"><div><span class="name">${s.name}</span><span class="code">${s.code}</span></div>
        <div class="price" style="color:${u?'#ff5252':'#26a69a'}">${fmt(s.price)}</div></div>
        <div class="row"><div class="chg ${u?'up':'down'}"><span class="arr"></span>${u?'+':''}${fmt(diff)} (${u?'+':''}${pct.toFixed(2)}%)</div></div>`;
      el.querySelector('.row').appendChild(spark(s.data.slice(-16),u));
      el.onclick=()=>{sel=i;render();renderPanel()};l.appendChild(el)})}
  function renderPanel(){const s=stocks[sel];const diff=s.price-s.prev,pct=diff/s.prev*100;const u=diff>=0;
    const min=Math.min(...s.data),max=Math.max(...s.data),rng=(max-min)||1;
    const pts=s.data.map((v,i)=>[i/(s.data.length-1)*380,140-((v-min)/rng)*125]);
    const last=pts[pts.length-1];
    const sd=Math.sqrt(s.data.slice(-15).reduce((a,b,_,arr)=>a+(b-arr.reduce((x,y)=>x+y,0)/15)**2,0)/15);
    const vol=(sd/s.price*100);const peak=Math.max(...s.data)/s.price-1;
    const grad=`<defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${u?'#ff5252':'#26a69a'}" stop-opacity=".4"/>
      <stop offset="100%" stop-color="${u?'#ff5252':'#26a69a'}" stop-opacity="0"/></linearGradient></defs>`;
    $('panel').innerHTML=`<div class="ptop"><div class="ptitle">${s.name} 走势</div>
      <div class="pprice" style="color:${u?'#ff5252':'#26a69a'}">${fmt(s.price)}</div></div>
      <div class="pcode">${s.code} · 近 40 周期 · ${u?'涨':'跌'} ${pct.toFixed(2)}%</div>
      <svg class="pchart" viewBox="0 0 380 140" preserveAspectRatio="none">${grad}
        <polygon points="0,140 ${path(pts)} 380,140" fill="url(#pg)"/>
        <polyline points="${path(pts)}" fill="none" stroke="${u?'#ff5252':'#26a69a'}" stroke-width="2"/>
        <circle cx="${last[0]}" cy="${last[1]}" r="4" fill="#fff" stroke="${u?'#ff5252':'#26a69a'}" stroke-width="2"/></svg>
      <div class="stats">
        <div class="stat">最高 <span class="v">${fmt(Math.max(...s.data))}</span></div>
        <div class="stat">最低 <span class="v">${fmt(Math.min(...s.data))}</span></div>
        <div class="stat">波动率 <span class="v ${vol>2?'up':'down'}">${vol.toFixed(1)}%</span></div>
        <div class="stat">区间涨幅 <span class="v ${peak>=0?'up':'down'}">${(peak*100).toFixed(1)}%</span></div>
      </div>`}
  function tick(){stocks.forEach(s=>{const n=s.price+(Math.random()-.48)*s.price*.005;s.prev=s.price;
    s.price=Math.max(.01,n);s.data.push(s.price);if(s.data.length>40)s.data.shift()});
    render();renderPanel()}
  render();renderPanel();setInterval(tick,1800);
</script>
</body>
</html>
