<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Market Pulse</title>
<style>
:root{color-scheme:dark;--up:#39e6a2;--down:#ff667a;--amber:#ffc85a;--ink:#edf4f1;--muted:#7d8b87;--line:#27312e}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0e0d;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif}.terminal{width:min(980px,96vw);background:#111614;border:1px solid #303a36;border-radius:6px;box-shadow:0 30px 90px #000b;overflow:hidden}.head{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line)}.brand{font:750 12px ui-monospace,monospace;letter-spacing:.14em}.live{font:10px ui-monospace,monospace;color:var(--up)}.live:before{content:"";display:inline-block;width:6px;height:6px;margin-right:7px;border-radius:50%;background:var(--up);box-shadow:0 0 10px var(--up);animation:blink 1.5s infinite}
.layout{display:grid;grid-template-columns:300px 1fr}.watch{border-right:1px solid var(--line)}.watch-title{padding:18px 20px 10px;color:var(--muted);font:10px ui-monospace,monospace;letter-spacing:.14em}.asset{width:100%;display:grid;grid-template-columns:1fr auto;gap:5px;text-align:left;padding:17px 20px;border:0;border-top:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;transition:.18s}.asset:hover,.asset.active{background:#1a221f}.asset.active{box-shadow:inset 3px 0 var(--up)}.asset strong{font:650 14px ui-monospace,monospace}.asset small{display:block;color:var(--muted);font-size:10px;margin-top:4px}.asset .price{text-align:right;font:600 13px ui-monospace,monospace}.change{font:700 10px ui-monospace,monospace}.up{color:var(--up)}.down{color:var(--down)}
.detail{padding:28px}.ticker{font:11px ui-monospace,monospace;color:var(--muted);letter-spacing:.16em}.quote{display:flex;align-items:end;justify-content:space-between;margin:10px 0 24px}.big{font:300 clamp(50px,7vw,78px)/1 ui-monospace,monospace;letter-spacing:-.05em}.delta{font:700 14px ui-monospace,monospace;margin-bottom:8px}.chart-wrap{height:270px;border:1px solid var(--line);position:relative;background:repeating-linear-gradient(0deg,transparent 0 53px,#ffffff08 54px),repeating-linear-gradient(90deg,transparent 0 99px,#ffffff08 100px)}svg{width:100%;height:100%;overflow:visible}.cross{position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(90deg,transparent calc(var(--x) - .5px),#ffffff35 var(--x),transparent calc(var(--x) + .5px))}.chart-wrap:hover .cross{opacity:1}.label{position:absolute;left:12px;top:10px;font:10px ui-monospace,monospace;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);margin-top:18px}.stat{background:#111614;padding:14px}.stat span{display:block;color:var(--muted);font:9px ui-monospace,monospace;letter-spacing:.12em}.stat b{font:600 13px ui-monospace,monospace}.risk{margin-top:16px;color:var(--amber);font-size:11px;display:flex;justify-content:space-between}.pulse{animation:flash .4s}
@keyframes blink{50%{opacity:.35}}@keyframes flash{50%{color:#fff;text-shadow:0 0 18px currentColor}}@media(max-width:700px){.terminal{width:100vw;min-height:100vh;border:0}.layout{grid-template-columns:1fr}.watch{border-right:0;display:grid;grid-template-columns:repeat(3,1fr)}.watch-title{grid-column:1/-1}.asset{padding:13px 10px}.asset small{display:none}.asset .price{font-size:11px}.detail{padding:20px 14px}.chart-wrap{height:250px}.big{font-size:52px}.quote{align-items:center}.stats{grid-template-columns:repeat(3,1fr)}}
</style></head><body><main class="terminal"><header class="head"><span class="brand">PULSE / MARKET DESK</span><span class="live">LIVE SIMULATION</span></header><div class="layout"><aside class="watch"><div class="watch-title">WATCHLIST 03</div><div id="assets"></div></aside><section class="detail"><div class="ticker" id="ticker"></div><div class="quote"><div class="big" id="big"></div><div class="delta" id="delta"></div></div><div class="chart-wrap" id="chart"><span class="label">INTRADAY / 09:30 - 16:00</span><svg viewBox="0 0 600 260" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#39e6a2" stop-opacity=".3"/><stop offset="1" stop-color="#39e6a2" stop-opacity="0"/></linearGradient></defs><path id="area" fill="url(#fill)"></path><polyline id="plot" fill="none" stroke="#39e6a2" stroke-width="3" vector-effect="non-scaling-stroke"></polyline></svg><i class="cross"></i></div><div class="stats"><div class="stat"><span>DAY RANGE</span><b id="range"></b></div><div class="stat"><span>VOLUME</span><b id="vol"></b></div><div class="stat"><span>VOLATILITY</span><b id="vix"></b></div></div><div class="risk"><span id="risk"></span><span>DELAY 0.4s</span></div></section></div></main>
<script>
const stocks=[{s:'NVDA',n:'Nvidia Systems',p:184.62,base:178.4,vol:'42.8M',risk:'波动偏高，注意追价风险',a:[32,35,31,38,43,41,50,54,51,61,66,64,72,79,76,84]},{s:'AAPL',n:'Apple Inc.',p:231.18,base:233.3,vol:'31.2M',risk:'短线承压，价格位于日内均线下方',a:[74,71,68,72,65,61,64,58,54,57,49,45,48,42,39,36]},{s:'TSLA',n:'Tesla Motors',p:348.71,base:337.5,vol:'58.9M',risk:'成交放大，区间突破尚待确认',a:[28,35,30,44,39,51,47,59,55,63,58,70,68,77,72,82]}];let active=0;
const assets=document.querySelector('#assets'),plot=document.querySelector('#plot'),area=document.querySelector('#area');function change(d){return(d.p-d.base)/d.base*100}function render(){assets.innerHTML=stocks.map((d,i)=>`<button class="asset ${i===active?'active':''}" data-i="${i}"><span><strong>${d.s}</strong><small>${d.n}</small></span><span class="price">${d.p.toFixed(2)}<small class="change ${change(d)>=0?'up':'down'}">${change(d)>=0?'▲':'▼'} ${Math.abs(change(d)).toFixed(2)}%</small></span></button>`).join('');const d=stocks[active],ch=change(d),points=d.a.map((v,i)=>`${i*40},${235-v*2.45}`);document.querySelector('#ticker').textContent=`${d.s} / USD · CONTINUOUS`;document.querySelector('#big').textContent=d.p.toFixed(2);document.querySelector('#big').classList.add('pulse');setTimeout(()=>document.querySelector('#big').classList.remove('pulse'),400);const delta=document.querySelector('#delta');delta.className=`delta ${ch>=0?'up':'down'}`;delta.textContent=`${ch>=0?'+':''}${(d.p-d.base).toFixed(2)}  ${ch>=0?'▲':'▼'} ${Math.abs(ch).toFixed(2)}%`;plot.setAttribute('points',points.join(' '));plot.setAttribute('stroke',ch>=0?'#39e6a2':'#ff667a');area.setAttribute('d',`M${points.join(' L')} L600,260 L0,260Z`);document.querySelector('#range').textContent=`${Math.min(d.base,d.p-5).toFixed(2)} - ${Math.max(d.base,d.p+4).toFixed(2)}`;document.querySelector('#vol').textContent=d.vol;document.querySelector('#vix').textContent=Math.abs(ch)>3?'HIGH':'NORMAL';document.querySelector('#risk').textContent=d.risk}
assets.onclick=e=>{const b=e.target.closest('button');if(b){active=+b.dataset.i;render()}};document.querySelector('#chart').onpointermove=e=>{const r=e.currentTarget.getBoundingClientRect();e.currentTarget.style.setProperty('--x',`${e.clientX-r.left}px`)};setInterval(()=>{stocks.forEach(d=>{d.p=Math.max(1,d.p+(Math.random()-.46)*.42);d.a.push(Math.max(10,Math.min(90,d.a.at(-1)+(Math.random()-.48)*8)));d.a.shift()});render()},1600);render();
</script></body></html>
