<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stocks</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#0d1223,#0a0f18);color:#fff;font-family:system-ui}.panel{width:min(92vw,460px);padding:18px;border-radius:28px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(12px)}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.tag{padding:7px 10px;border-radius:999px;background:rgba(120,180,255,.12);color:#bfe0ff;font-size:12px}.list{display:grid;gap:10px}.item{padding:14px;border-radius:20px;background:rgba(255,255,255,.06)}.top{display:flex;justify-content:space-between;align-items:baseline}.sym{font-weight:800;font-size:18px}.price{font-size:24px;font-weight:900}.chg.up{color:#4cff9d}.chg.down{color:#ff6b7a}.mini{margin-top:10px;height:44px;width:100%}.bar{display:flex;align-items:end;gap:4px;height:44px}.bar i{flex:1;border-radius:999px 999px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.4),currentColor)}.risk{margin-top:12px;color:#ffda7a;font-size:12px}.flash{animation:f .28s ease-out}@keyframes f{from{transform:scale(.99);filter:brightness(1.3)}to{transform:scale(1)}}.time{color:#aab6d7;font-size:12px}@media (max-width:390px){.price{font-size:22px}}</style></head><body><div class="panel"><div class="head"><strong>股票监控</strong><span class="tag">LIVE MOCK · <span class="time" id="tm"></span></span></div><div class=list id=list></div><div class=risk>提示：高波动板块正在放大，短线注意回撤。</div></div><script>const stocks=[{s:'AAPL',p:195.24,c:.92,a:'up',h:[4,7,9,8,11,13,14,16,18,17,19]},{s:'TSLA',p:182.08,c:-4.11,a:'down',h:[18,17,16,15,14,13,14,12,11,10,9]},{s:'NVDA',p:887.62,c:15.3,a:'up',h:[12,13,15,16,18,20,22,21,24,26,28]}],list=list=document.getElementById('list');function spark(h,a){return`<div class=mini><div class=bar>${h.map(v=>`<i style="height:${v}px;color:${a==='up'?'#4cff9d':'#ff6b7a'}"></i>`).join('')}</div></div>`}function render(){tm.textContent=new Date().toLocaleTimeString('zh-CN',{hour12:false});list.innerHTML=stocks.map(x=>`<article class=item><div class=top><div><div class=sym>${x.s}</div><div class=time>假实时刷新</div></div><div style="text-align:right"><div class=price>${x.p.toFixed(2)}</div><div class=chg ${x.a}>${x.a==='up'?'+':'-'}${Math.abs(x.c).toFixed(2)} (${(x.c/x.p*100).toFixed(2)}%)</div></div></div>${spark(x.h,x.a)}</article>`).join('');document.body.classList.add('flash');setTimeout(()=>document.body.classList.remove('flash'),280)}setInterval(()=>{stocks.forEach(x=>{const d=(Math.random()-.5)*(x.a==='up'?4:6);x.p=Math.max(1,x.p+d);x.c+=d*.25;x.h=x.h.slice(1).concat(Math.max(6,Math.min(32,x.h.at(-1)+(Math.random()-.45)*6)))}) ;render()},1800);render()</script></body></html>
